<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive Karnaugh Map generator supporting 2-6 variables with SOP/POS minimization, XOR/XNOR detection, and don't-care states.">
  <title>K-Map Generator | p14m.com</title>
  <style>
    * { box-sizing: border-box; }

    }

    a { color: #0066cc; }
    a:visited { color: #551a8b; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #cccccc;
    }
    body.dark .nav-row { border-bottom-color: #444444; }

    .back-link {
      font-size: 14px;
      text-decoration: none;
    }

    .theme-toggle {
      background-color: #f5f5f5;
      border: 1px solid #cccccc;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.95em;
      font-family: inherit;
    }
    .theme-toggle:hover { background-color: #e0e0e0; }
    body.dark .theme-toggle {
      background-color: #333333;
      color: #e0e0e0;
      border-color: #555555;
    }
    body.dark .theme-toggle:hover { background-color: #404040; }

    h1 {
      font-size: 1.8em;
      margin: 0 0 5px 0;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.9em;
      color: #666666;
      margin: 0 0 20px 0;
    }
    body.dark .subtitle { color: #888888; }

    .section {
      border: 1px solid #cccccc;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
    }
    body.dark .section { border-color: #444444; }

    .lbl {
      font-size: 12px;
      font-weight: 600;
      color: #555555;
      margin-bottom: 6px;
      display: block;
    }
    body.dark .lbl { color: #aaaaaa; }
    .lbl-hint {
      font-weight: 400;
      color: #999999;
      font-size: 11px;
    }

    .inp {
      width: 100%;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 6px;
      color: #000000;
      font-family: monospace;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .inp:focus { border-color: #0066cc; }
    .inp::placeholder { color: #aaaaaa; }
    body.dark .inp {
      background: #2a2a2a;
      border-color: #444444;
      color: #e0e0e0;
    }
    body.dark .inp:focus { border-color: #87ceeb; }
    body.dark .inp::placeholder { color: #666666; }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    .btn-go {
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-go:hover { background: #0052a3; }
    body.dark .btn-go { background: #87ceeb; color: #1a1a1a; }
    body.dark .btn-go:hover { background: #6bb8d9; }

    .btn-t {
      background: transparent;
      border: 1px solid #cccccc;
      color: #666666;
      border-radius: 5px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-t:hover { border-color: #999999; color: #333333; }
    .btn-t.on { border-color: #0066cc; color: #0066cc; background: rgba(0, 102, 204, 0.05); }
    body.dark .btn-t { border-color: #444444; color: #888888; }
    body.dark .btn-t:hover { border-color: #666666; color: #cccccc; }
    body.dark .btn-t.on { border-color: #87ceeb; color: #87ceeb; background: rgba(135, 206, 235, 0.1); }

    .btn-copy {
      background: transparent;
      border: 1px solid #cccccc;
      color: #666666;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy:hover { border-color: #999999; color: #333333; }
    body.dark .btn-copy { border-color: #444444; color: #888888; }
    body.dark .btn-copy:hover { border-color: #666666; color: #cccccc; }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    .toggle-btns { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }

    /* Mode selector - segmented control */
    .mode-selector {
      display: inline-flex;
      border: 1px solid #cccccc;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    body.dark .mode-selector { border-color: #444444; }

    .mode-btn {
      background: transparent;
      border: none;
      color: #666666;

      border-right: 1px solid #cccccc;

    .mode-btn:last-child { border-right: none; }
    .mode-btn:hover { background: rgba(0, 102, 204, 0.05); color: #333333; }
    .mode-btn.on { background: #0066cc; color: white; }
    body.dark .mode-btn { color: #888888; border-right-color: #444444; }
    body.dark .mode-btn:hover { background: rgba(135, 206, 235, 0.1); color: #cccccc; }
    body.dark .mode-btn.on { background: #87ceeb; color: #1a1a1a; }

    .km-tbl th, .km-tbl td { text-align: center; padding: 0; }

    .km-cell.v1 { color: #0066cc; }
    .km-cell.v0 { color: #cccccc; }
    .km-cell.vx { color: #e67e22; }
    body.dark .km-cell.v1 { color: #87ceeb; }
    body.dark .km-cell.v0 { color: #444444; }
    body.dark .km-cell.vx { color: #f39c12; }

    .km-cell.click:hover { border-color: #0066cc; background: rgba(0, 102, 204, 0.05) !important; }
    body.dark .km-cell.click:hover { border-color: #87ceeb; background: rgba(135, 206, 235, 0.1) !important; }

    body.dark .tag.xor { background: rgba(243, 156, 18, 0.15); color: #f39c12; }

      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: monospace;
      color: #555555;
      line-height: 1.8;
    }
    body.dark .mint-box { background: #2a2a2a; border-color: #444444; color: #aaaaaa; }
    .mint-box .sym { font-weight: 600; }

    body.dark .mint-box .dc { color: #f39c12; }

    .group-legend {

    .group-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

      color: #e67e22;
      font-weight: 500;
    }
    body.dark .manual-indicator { color: #f39c12; }

    .kmap-header {

      align-items: center;
      justify-content: space-between;

      .toggle-btns { margin-left: 0; margin-top: 10px; width: 100%; justify-content: flex-start; }
      .mode-selector { width: 100%; display: flex; }
      .mode-btn { flex: 1; text-align: center; }
    }

<body>
  <div class="container">
    <div class="nav-row">
      <a href="/" class="back-link">&larr; Back to p14m.com</a>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-text">&#9790;</span>
      </button>
    </div>

    <h1>K-Map Generator</h1>
    <p class="subtitle">Karnaugh Map Solver &amp; Visualizer</p>

    <!-- Input Section -->
    <div class="section">
      <div class="input-row">
        <div>
          <label class="lbl">Variables</label>
          <input class="inp" id="varInput" value="A, B, C" placeholder="A, B, C, D" spellcheck="false">

        </div>
        <div id="mintermsInputRow" style="display: none;">
          <label class="lbl">Minterms <span class="lbl-hint">(comma-separated indices where F=1)</span></label>

        <strong>Keywords:</strong> and, or, not, nand, nor, xor, xnor &middot; <strong>Precedence:</strong> NOT &rarr; AND/NAND &rarr; XOR/XNOR &rarr; OR/NOR

    </div>

  <div id="toast" class="toast" style="display: none;"></div>

<script>
/* ───────────────────────── Theme ───────────────────────── */

function toggleTheme() {
  const body = document.body;
  const themeText = document.getElementById('theme-text');
  if (body.classList.contains('dark')) {
    body.classList.remove('dark');
    themeText.innerHTML = '&#9790;';
    localStorage.setItem('theme', 'light');
  } else {
    body.classList.add('dark');
    themeText.innerHTML = '&#9788;';
    localStorage.setItem('theme', 'dark');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const savedTheme = localStorage.getItem('theme');
  const themeText = document.getElementById('theme-text');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark');
    themeText.innerHTML = '&#9788;';
  }
});

/* ───────────────────────── helpers ───────────────────────── */

const GRAY_CODE = {
  1: ["0", "1"],
  2: ["00", "01", "11", "10"],
  3: ["000", "001", "011", "010", "110", "111", "101", "100"],
  4: ["0000","0001","0011","0010","0110","0111","0101","0100",
      "1100","1101","1111","1110","1010","1011","1001","1000"],
};

function grayOrder(n) { return GRAY_CODE[n] || []; }

/* ────────── expression tokenizer ────────── */

const TOKEN = {
  LPAREN: "(", RPAREN: ")",
  NOT: "NOT", AND: "AND", OR: "OR",
  NAND: "NAND", NOR: "NOR", XOR: "XOR", XNOR: "XNOR",
  VAR: "VAR", LITERAL: "LITERAL",
};

const SYMBOLS = {
  "'": TOKEN.NOT, "!": TOKEN.NOT, "~": TOKEN.NOT,
  "\u00b7": TOKEN.AND, "*": TOKEN.AND, "&": TOKEN.AND, ".": TOKEN.AND,
  "&&": TOKEN.AND,
  "+": TOKEN.OR, "|": TOKEN.OR, "||": TOKEN.OR,
  "\u2295": TOKEN.XOR, "^": TOKEN.XOR,
  "\u22bc": TOKEN.NAND, "%": TOKEN.NAND,
  "@": TOKEN.XNOR, "\u2299": TOKEN.XNOR,
  "#": TOKEN.NOR, "\u22bd": TOKEN.NOR,
};

const KEYWORDS = {
  not: TOKEN.NOT, and: TOKEN.AND, or: TOKEN.OR,
  nand: TOKEN.NAND, nor: TOKEN.NOR, xor: TOKEN.XOR, xnor: TOKEN.XNOR,
};

function isAlpha(ch) { return /[a-zA-Z_]/.test(ch); }
function isAlnum(ch) { return /[a-zA-Z0-9_]/.test(ch); }

function tokenize(expr, varNames) {
  const tokens = [];
  let i = 0;
  const s = expr;
  const sortedVars = [...varNames].sort((a, b) => b.length - a.length);

  while (i < s.length) {
    if (s[i] === " " || s[i] === "\t") { i++; continue; }
    if (s[i] === "(") { tokens.push({ type: TOKEN.LPAREN }); i++; continue; }
    if (s[i] === ")") { tokens.push({ type: TOKEN.RPAREN }); i++; continue; }

    if (s[i] === "'") {
      tokens.push({ type: TOKEN.NOT, postfix: true });
      i++; continue;
    }

    if (i + 1 < s.length && SYMBOLS[s[i] + s[i + 1]]) {
      tokens.push({ type: SYMBOLS[s[i] + s[i + 1]] });
      i += 2; continue;
    }

    if (SYMBOLS[s[i]] && s[i] !== "'") {
      tokens.push({ type: SYMBOLS[s[i]] });
      i++; continue;
    }

    if ((s[i] === "0" || s[i] === "1") && (i + 1 >= s.length || !isAlpha(s[i + 1]))) {
      tokens.push({ type: TOKEN.LITERAL, value: parseInt(s[i]) });
      i++; continue;
    }

    let matched = false;
    for (const v of sortedVars) {
      if (s.substring(i, i + v.length) === v) {
        const after = i + v.length;
        if (after >= s.length || !isAlnum(s[after])) {
          tokens.push({ type: TOKEN.VAR, name: v });
          i += v.length;
          matched = true;
          break;
        }
      }
    }
    if (matched) continue;

    let kwMatch = false;
    for (const [kw, tt] of Object.entries(KEYWORDS)) {
      if (s.substring(i, i + kw.length).toLowerCase() === kw) {
        const after = i + kw.length;
        if (after >= s.length || !isAlnum(s[after])) {
          tokens.push({ type: tt });
          i += kw.length;
          kwMatch = true;
          break;
        }
      }
    }
    if (kwMatch) continue;

    if (isAlpha(s[i])) {
      let start = i;
      while (i < s.length && isAlnum(s[i])) i++;
      throw new Error(`Unknown variable "${s.substring(start, i)}". Declare it in the variables list.`);
    }

    throw new Error(`Unexpected character "${s[i]}" at position ${i + 1}`);
  }
  return tokens;
}

/* ────────── parser ────────── */

function parse(tokens) {
  let pos = 0;
  function peek() { return pos < tokens.length ? tokens[pos] : null; }
  function advance() { return tokens[pos++]; }

  function parseOr() {
    let left = parseXor();
    while (peek() && (peek().type === TOKEN.OR || peek().type === TOKEN.NOR)) {
      const op = advance().type;
      left = { op, left, right: parseXor() };
    }
    return left;
  }

  function parseXor() {
    let left = parseAnd();
    while (peek() && (peek().type === TOKEN.XOR || peek().type === TOKEN.XNOR)) {
      const op = advance().type;
      left = { op, left, right: parseAnd() };
    }
    return left;
  }

  function parseAnd() {
    let left = parseUnary();
    while (peek() && (peek().type === TOKEN.AND || peek().type === TOKEN.NAND)) {
      const op = advance().type;
      left = { op, left, right: parseUnary() };
    }
    return left;
  }

  function parseUnary() {
    if (peek() && peek().type === TOKEN.NOT && !peek().postfix) {
      advance();
      return { op: TOKEN.NOT, operand: parseUnary() };
    }
    return parsePostfix();
  }

  function parsePostfix() {
    let node = parseAtom();
    while (peek() && peek().type === TOKEN.NOT && peek().postfix) {
      advance();
      node = { op: TOKEN.NOT, operand: node };
    }
    return node;
  }

  function parseAtom() {
    const t = peek();
    if (!t) throw new Error("Unexpected end of expression");
    if (t.type === TOKEN.LPAREN) {
      advance();
      const node = parseOr();
      if (!peek() || peek().type !== TOKEN.RPAREN) throw new Error("Missing closing parenthesis");
      advance();
      let result = node;
      while (peek() && peek().type === TOKEN.NOT && peek().postfix) {
        advance();
        result = { op: TOKEN.NOT, operand: result };
      }
      return result;
    }
    if (t.type === TOKEN.VAR) { advance(); return { op: TOKEN.VAR, name: t.name }; }
    if (t.type === TOKEN.LITERAL) { advance(); return { op: TOKEN.LITERAL, value: t.value }; }
    throw new Error(`Unexpected token: ${JSON.stringify(t)}`);
  }

  const ast = parseOr();
  if (pos < tokens.length) throw new Error(`Unexpected token at position ${pos + 1}`);
  return ast;
}

/* ────────── evaluator ────────── */

function evaluate(ast, env) {
  switch (ast.op) {
    case TOKEN.VAR: return env[ast.name] ?? 0;
    case TOKEN.LITERAL: return ast.value;
    case TOKEN.NOT: return evaluate(ast.operand, env) ? 0 : 1;
    case TOKEN.AND: return evaluate(ast.left, env) & evaluate(ast.right, env);
    case TOKEN.OR: return evaluate(ast.left, env) | evaluate(ast.right, env);
    case TOKEN.NOR: return (evaluate(ast.left, env) | evaluate(ast.right, env)) ? 0 : 1;
    case TOKEN.NAND: return (evaluate(ast.left, env) & evaluate(ast.right, env)) ? 0 : 1;
    case TOKEN.XOR: return evaluate(ast.left, env) ^ evaluate(ast.right, env);
    case TOKEN.XNOR: return (evaluate(ast.left, env) ^ evaluate(ast.right, env)) ? 0 : 1;
    default: throw new Error(`Unknown op: ${ast.op}`);
  }
}

/* ────────── truth table & k-map ────────── */

function computeTruthTable(ast, varNames) {
  const n = varNames.length;
  const rows = 1 << n;
  const table = [];
  for (let i = 0; i < rows; i++) {
    const env = {};
    varNames.forEach((v, idx) => { env[v] = (i >> (n - 1 - idx)) & 1; });
    table.push({ env, result: evaluate(ast, env) });
  }
  return table;
}

function buildKmapGrid(truthTable, varNames) {
  const n = varNames.length;
  if (n < 2 || n > 6) return null;

  let rowVars, colVars;
  if (n === 2) { rowVars = [varNames[0]]; colVars = [varNames[1]]; }
  else if (n === 3) { rowVars = [varNames[0]]; colVars = [varNames[1], varNames[2]]; }
  else if (n === 4) { rowVars = [varNames[0], varNames[1]]; colVars = [varNames[2], varNames[3]]; }
  else if (n === 5) { rowVars = [varNames[0], varNames[1]]; colVars = [varNames[2], varNames[3], varNames[4]]; }
  else { rowVars = [varNames[0], varNames[1], varNames[2]]; colVars = [varNames[3], varNames[4], varNames[5]]; }

  const rowCodes = grayOrder(rowVars.length);
  const colCodes = grayOrder(colVars.length);

  const grid = rowCodes.map((rc) =>
    colCodes.map((cc) => {
      const env = {};
      rowVars.forEach((v, i) => { env[v] = parseInt(rc[i]); });
      colVars.forEach((v, i) => { env[v] = parseInt(cc[i]); });
      const row = truthTable.find((r) => varNames.every((v) => r.env[v] === env[v]));
      return row ? row.result : 0;
    })
  );

  return { grid, rowVars, colVars, rowCodes, colCodes };
}

/* ────────── K-map grouping ────────── */

function findKmapGroups(grid, rowCodes, colCodes) {
  const rows = grid.length;
  const cols = grid[0].length;
  const ones = [];
  const onesOrDc = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] === 1) ones.push([r, c]);
      if (grid[r][c] === 1 || grid[r][c] === "X") onesOrDc.push([r, c]);
    }
  }

  if (ones.length === 0) return [];

  const allCovered = onesOrDc.length === rows * cols;
  if (allCovered && ones.length > 0) return [{ cells: onesOrDc, rStart: 0, cStart: 0, rSize: rows, cSize: cols }];

  const groups = [];
  const covered = new Set();
  const cellKey = (r, c) => `${r},${c}`;
  const oneKeys = new Set(ones.map(([r,c]) => cellKey(r,c)));

  const sizes = [];
  for (let rSize = rows; rSize >= 1; rSize = rSize / 2) {
    for (let cSize = cols; cSize >= 1; cSize = cSize / 2) {
      if (rSize * cSize > 0 && Number.isInteger(Math.log2(rSize * cSize))) {
        sizes.push([rSize, cSize]);
      }
    }
  }
  sizes.sort((a, b) => b[0] * b[1] - a[0] * a[1]);

  for (const [rSize, cSize] of sizes) {
    for (let rStart = 0; rStart < rows; rStart++) {
      for (let cStart = 0; cStart < cols; cStart++) {
        const cells = [];
        let allValid = true;
        let hasUncoveredOne = false;

        for (let dr = 0; dr < rSize && allValid; dr++) {
          for (let dc = 0; dc < cSize && allValid; dc++) {
            const r = (rStart + dr) % rows;
            const c = (cStart + dc) % cols;
            if (grid[r][c] !== 1 && grid[r][c] !== "X") { allValid = false; break; }
            cells.push([r, c]);
            if (grid[r][c] === 1 && !covered.has(cellKey(r, c))) hasUncoveredOne = true;
          }
        }

        if (allValid && hasUncoveredOne && cells.length > 0) {
          groups.push({ cells, rStart, cStart, rSize, cSize });
          cells.forEach(([r, c]) => {
            if (oneKeys.has(cellKey(r, c))) covered.add(cellKey(r, c));
          });
        }
      }
    }
  }

  ones.forEach(([r, c]) => {
    if (!covered.has(cellKey(r, c))) {
      groups.push({ cells: [[r, c]], rStart: r, cStart: c, rSize: 1, cSize: 1 });
      covered.add(cellKey(r, c));
    }
  });

  return groups;
}

/* ────────── minterm helper ────────── */

function getMintermIndex(env, varNames) {
  let idx = 0;
  varNames.forEach((v) => { idx = (idx << 1) | env[v]; });
  return idx;
}

/* ═══════════════════════ FUNCTIONS ═══════════════════════ */

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function hideError() {
  errorBox.style.display = 'none';
}

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 1800);
}

function copyText(text, label) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast(`Copied ${label}!`));
  }
}

function setInputMode(mode) {
  state.inputMode = mode;
  hideError();

  // Update mode buttons
  modeExpr.classList.toggle('on', mode === 'expression');
  modeMinterms.classList.toggle('on', mode === 'minterms');
  modeMaxterms.classList.toggle('on', mode === 'maxterms');

  // Show/hide input rows
  exprInputRow.style.display = mode === 'expression' ? 'block' : 'none';
  mintermsInputRow.style.display = mode === 'minterms' ? 'block' : 'none';
  maxtermsInputRow.style.display = mode === 'maxterms' ? 'block' : 'none';

  // Show/hide operator reference (only relevant for expression mode)
  refSection.style.display = mode === 'expression' ? 'block' : 'none';
}

function parseTermList(input, maxVal, termType) {
  const terms = [];
  const seen = new Set();

  if (!input.trim()) return { terms: [], isEmpty: true };

  const parts = input.split(/[,\s]+/).filter(Boolean);

  for (const p of parts) {
    const n = parseInt(p);
    if (isNaN(n)) {
      throw new Error(`Invalid ${termType}: "${p}" is not a number.`);
    }
    if (n < 0) {
      throw new Error(`Invalid ${termType}: ${n}. Must be non-negative.`);
    }
    if (n > maxVal) {
      throw new Error(`${termType} ${n} is out of range. With ${Math.log2(maxVal + 1)} variables, valid range is 0\u2013${maxVal}.`);
    }
    if (seen.has(n)) {
      throw new Error(`Duplicate ${termType}: ${n}`);
    }
    seen.add(n);
    terms.push(n);
  }

  return { terms, isEmpty: false };
}

function getEffectiveResult() {
  if (!state.result) return null;
  if (!state.manualMode || Object.keys(state.manualOverrides).length === 0) return state.result;
  const tt = state.result.truthTable.map((row, i) => ({
    ...row,
    result: state.manualOverrides[i] !== undefined ? state.manualOverrides[i] : row.result,
  }));
  const kmap = buildKmapGrid(tt, state.result.varNames);
  return { ...state.result, truthTable: tt, kmap };
}

function computeSOP(groups, kmap) {
  const { rowVars, colVars, rowCodes, colCodes } = kmap;
  const allVars = [...rowVars, ...colVars];
  const terms = [];

  for (const group of groups) {
    const literals = [];
    for (let vi = 0; vi < allVars.length; vi++) {
      const vals = new Set();
      group.cells.forEach(([r, c]) => {
        const code = vi < rowVars.length ? rowCodes[r][vi] : colCodes[c][vi - rowVars.length];
        vals.add(code);
      });
      if (vals.size === 1) {
        const val = [...vals][0];
        literals.push(val === "1" ? allVars[vi] : allVars[vi] + "'");
      }
    }
    terms.push(literals.length === 0 ? "1" : literals.join("\u00b7"));
  }
  return terms.join(" + ") || "0";
}

function computePOS(truthTable, varNames) {
  const maxterms = [];
  truthTable.forEach((row) => {
    if (row.result === 0) {
      const literals = varNames.map((v) => row.env[v] === 0 ? v : v + "'");
      maxterms.push("(" + literals.join(" + ") + ")");
    }
  });
  if (maxterms.length === 0) return "1";
  if (maxterms.length === (1 << varNames.length)) return "0";
  return maxterms.join(" \u00b7 ");
}

function detectXOR(truthTable, varNames) {
  const n = varNames.length;
  if (n < 2 || n > 6) return null;

  const definedRows = truthTable.filter(r => r.result !== "X");
  if (definedRows.length !== (1 << n)) return null;

  const allIdxs = varNames.map((_, i) => i);

  function matchesXor(varIdxs, complementMap) {
    return truthTable.every(row => {
      const xorVal = varIdxs.reduce((acc, vi) => {
        const raw = row.env[varNames[vi]];
        const val = complementMap[vi] ? (1 - raw) : raw;
        return acc ^ val;
      }, 0);
      return row.result === xorVal;
    });
  }

  function matchesXnor(varIdxs, complementMap) {
    return truthTable.every(row => {
      const xorVal = varIdxs.reduce((acc, vi) => {
        const raw = row.env[varNames[vi]];
        const val = complementMap[vi] ? (1 - raw) : raw;
        return acc ^ val;
      }, 0);
      return row.result === (xorVal ? 0 : 1);
    });
  }

  if (matchesXor(allIdxs, {})) return { type: "XOR", expr: varNames.join(" \u2295 ") };
  if (matchesXnor(allIdxs, {})) return { type: "XNOR", expr: varNames.join(" \u2299 ") };

  if (n === 2) {
    for (let mask = 1; mask < 4; mask++) {
      const cm = {};
      if (mask & 1) cm[0] = true;
      if (mask & 2) cm[1] = true;
      if (matchesXor(allIdxs, cm)) {
        const parts = allIdxs.map(i => cm[i] ? varNames[i] + "'" : varNames[i]);
        return { type: "XOR", expr: parts.join(" \u2295 ") };
      }
      if (matchesXnor(allIdxs, cm)) {
        const parts = allIdxs.map(i => cm[i] ? varNames[i] + "'" : varNames[i]);
        return { type: "XNOR", expr: parts.join(" \u2299 ") };
      }
    }
  }

  if (n >= 3) {
    for (let skip = 0; skip < n; skip++) {
      const subset = allIdxs.filter(i => i !== skip);
      if (matchesXor(subset, {})) {
        return { type: "XOR", expr: subset.map(i => varNames[i]).join(" \u2295 ") + " (independent of " + varNames[skip] + ")" };
      }
    }
  }

  return null;
}

function generateVerilog(sopExpr, xorDetected) {
  if (!sopExpr && !xorDetected) return null;

  // If XOR/XNOR detected, prefer that
  if (xorDetected) {
    // Parse XOR expression like "A ⊕ B ⊕ C"
    const parts = xorDetected.expr.split(/\s*[\u2295\u2299]\s*/).filter(Boolean);
    // Handle complements (A')
    const verilogParts = parts.map(p => {
      if (p.endsWith("'")) return "~" + p.slice(0, -1);
      return p;
    });
    if (xorDetected.type === "XNOR") {
      return `assign F = ~(${verilogParts.join(" ^ ")});`;
    }
    return `assign F = ${verilogParts.join(" ^ ")};`;
  }

  // Convert SOP expression to Verilog
  // SOP format: "A · B + C'" or "A' · B · C + D"
  if (sopExpr === "0") return "assign F = 1'b0;";
  if (sopExpr === "1") return "assign F = 1'b1;";

  // Parse terms separated by " + "
  const terms = sopExpr.split(/\s*\+\s*/).filter(Boolean);
  const verilogTerms = terms.map(term => {
    if (term === "1") return "1'b1";
    // Parse literals separated by " · "
    const literals = term.split(/\s*\u00b7\s*/).filter(Boolean);
    const verilogLits = literals.map(lit => {
      if (lit.endsWith("'")) return "~" + lit.slice(0, -1);
      return lit;
    });
    if (verilogLits.length === 1) return verilogLits[0];
    return "(" + verilogLits.join(" & ") + ")";
  });

  if (verilogTerms.length === 1) return `assign F = ${verilogTerms[0]};`;
  return `assign F = ${verilogTerms.join(" | ")};`;
}

function generateVHDL(sopExpr, xorDetected) {
  if (!sopExpr && !xorDetected) return null;

  // If XOR/XNOR detected, prefer that
  if (xorDetected) {
    const parts = xorDetected.expr.split(/\s*[\u2295\u2299]\s*/).filter(Boolean);
    const vhdlParts = parts.map(p => {
      if (p.endsWith("'")) return "(not " + p.slice(0, -1) + ")";
      return p;
    });
    if (xorDetected.type === "XNOR") {
      return `F <= not (${vhdlParts.join(" xor ")});`;
    }
    return `F <= ${vhdlParts.join(" xor ")};`;
  }

  // Convert SOP expression to VHDL
  if (sopExpr === "0") return "F <= '0';";
  if (sopExpr === "1") return "F <= '1';";

  const terms = sopExpr.split(/\s*\+\s*/).filter(Boolean);
  const vhdlTerms = terms.map(term => {
    if (term === "1") return "'1'";
    const literals = term.split(/\s*\u00b7\s*/).filter(Boolean);
    const vhdlLits = literals.map(lit => {
      if (lit.endsWith("'")) return "(not " + lit.slice(0, -1) + ")";
      return lit;
    });
    if (vhdlLits.length === 1) return vhdlLits[0];
    return "(" + vhdlLits.join(" and ") + ")";
  });

  if (vhdlTerms.length === 1) return `F <= ${vhdlTerms[0]};`;
  return `F <= ${vhdlTerms.join(" or ")};`;
}

function getMintermInfo(truthTable, varNames) {
  const minterms = [], maxterms = [], dontcares = [];
  truthTable.forEach((row) => {
    const idx = getMintermIndex(row.env, varNames);
    if (row.result === 1) minterms.push(idx);
    else if (row.result === "X") dontcares.push(idx);
    else maxterms.push(idx);
  });
  return { minterms, maxterms, dontcares };
}

function generate() {
  hideError();
  state.result = null;
  state.manualOverrides = {};
  kmapPanel.style.display = 'none';

  try {
    // Parse variables
    const raw = varInput.value.split(/[,\s]+/).filter(Boolean);
    if (raw.length < 2) throw new Error("Enter at least 2 variables");
    if (raw.length > 6) throw new Error("Maximum 6 variables supported");
    for (const v of raw) {
      if (/^[0-9]/.test(v)) throw new Error(`Variable "${v}" cannot start with a number`);
      if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(v)) throw new Error(`Invalid variable name "${v}"`);
    }
    if (new Set(raw).size !== raw.length) throw new Error("Duplicate variable names");
    const varNames = raw;
    const n = varNames.length;
    const maxVal = (1 << n) - 1;

    // Parse don't-cares
    const dcResult = parseTermList(dcInput.value, maxVal, "Don't-care");
    const dcSet = new Set(dcResult.terms);

    // Handle based on input mode
    if (state.inputMode === 'expression') {
      // Expression mode
      if (!exprInput.value.trim()) {
        // Manual mode
        const rows = 1 << n;
        const truthTable = [];
        for (let i = 0; i < rows; i++) {
          const env = {};
          varNames.forEach((v, idx) => { env[v] = (i >> (n - 1 - idx)) & 1; });
          truthTable.push({ env, result: dcSet.has(i) ? "X" : 0 });
        }
        const kmap = buildKmapGrid(truthTable, varNames);
        state.result = { varNames, truthTable, kmap };
        state.manualMode = true;
        render();
        return;
      }

      state.manualMode = false;
      const tokens = tokenize(exprInput.value, varNames);
      const ast = parse(tokens);
      const truthTable = computeTruthTable(ast, varNames);

      // Apply don't-cares
      truthTable.forEach((row) => {
        const idx = getMintermIndex(row.env, varNames);
        if (dcSet.has(idx)) row.result = "X";
      });

      const kmap = buildKmapGrid(truthTable, varNames);
      state.result = { varNames, truthTable, kmap };
      render();

    } else if (state.inputMode === 'minterms') {
      // Minterms mode
      const mintermResult = parseTermList(mintermsInput.value, maxVal, "Minterm");

      if (mintermResult.isEmpty) {
        // Empty input - enter manual mode
        const rows = 1 << n;
        const truthTable = [];
        for (let i = 0; i < rows; i++) {
          const env = {};
          varNames.forEach((v, idx) => { env[v] = (i >> (n - 1 - idx)) & 1; });
          truthTable.push({ env, result: dcSet.has(i) ? "X" : 0 });
        }
        const kmap = buildKmapGrid(truthTable, varNames);
        state.result = { varNames, truthTable, kmap };
        state.manualMode = true;
        render();
        return;
      }

      const mintermSet = new Set(mintermResult.terms);

      // Check for overlap with don't-cares
      for (const m of mintermSet) {
        if (dcSet.has(m)) {
          throw new Error(`Minterm ${m} also appears in don't-cares. A value can't be both.`);
        }
      }

      state.manualMode = false;
      const rows = 1 << n;
      const truthTable = [];
      for (let i = 0; i < rows; i++) {
        const env = {};
        varNames.forEach((v, idx) => { env[v] = (i >> (n - 1 - idx)) & 1; });
        let result;
        if (dcSet.has(i)) result = "X";
        else if (mintermSet.has(i)) result = 1;
        else result = 0;
        truthTable.push({ env, result });
      }

      const kmap = buildKmapGrid(truthTable, varNames);
      state.result = { varNames, truthTable, kmap };
      render();

    } else if (state.inputMode === 'maxterms') {
      // Maxterms mode
      const maxtermResult = parseTermList(maxtermsInput.value, maxVal, "Maxterm");

      if (maxtermResult.isEmpty) {
        // Empty input - enter manual mode (all 1s except don't-cares)
        const rows = 1 << n;
        const truthTable = [];
        for (let i = 0; i < rows; i++) {
          const env = {};
          varNames.forEach((v, idx) => { env[v] = (i >> (n - 1 - idx)) & 1; });
          truthTable.push({ env, result: dcSet.has(i) ? "X" : 1 });
        }
        const kmap = buildKmapGrid(truthTable, varNames);
        state.result = { varNames, truthTable, kmap };
        state.manualMode = true;
        render();
        return;
      }

      const maxtermSet = new Set(maxtermResult.terms);

      // Check for overlap with don't-cares
      for (const m of maxtermSet) {
        if (dcSet.has(m)) {
          throw new Error(`Maxterm ${m} also appears in don't-cares. A value can't be both.`);
        }
      }

      state.manualMode = false;
      const rows = 1 << n;
      const truthTable = [];
      for (let i = 0; i < rows; i++) {
        const env = {};
        varNames.forEach((v, idx) => { env[v] = (i >> (n - 1 - idx)) & 1; });
        let result;
        if (dcSet.has(i)) result = "X";
        else if (maxtermSet.has(i)) result = 0;
        else result = 1;
        truthTable.push({ env, result });
      }

      const kmap = buildKmapGrid(truthTable, varNames);
      state.result = { varNames, truthTable, kmap };
      render();
    }
  } catch (e) {
    showError(e.message);
  }
}

function handleCellClick(r, c) {
  const effectiveResult = getEffectiveResult();
  if (!effectiveResult?.kmap || !state.manualMode) return;

  const { varNames, kmap } = effectiveResult;
  const env = {};
  kmap.rowVars.forEach((v, i) => { env[v] = parseInt(kmap.rowCodes[r][i]); });
  kmap.colVars.forEach((v, i) => { env[v] = parseInt(kmap.colCodes[c][i]); });

  const ttIdx = effectiveResult.truthTable.findIndex((row) =>
    varNames.every((v) => row.env[v] === env[v])
  );

  if (ttIdx >= 0) {
    const cur = state.manualOverrides[ttIdx] !== undefined ? state.manualOverrides[ttIdx] : effectiveResult.truthTable[ttIdx].result;
    const next = cur === 0 ? 1 : cur === 1 ? "X" : 0;
    state.manualOverrides[ttIdx] = next;
    render();
  }
}

function render() {
  const effectiveResult = getEffectiveResult();

  if (!effectiveResult?.kmap) {
    kmapPanel.style.display = 'none';
    truthPanel.style.display = 'none';
    return;
  }

  const { varNames, truthTable, kmap } = effectiveResult;
  const groups = findKmapGroups(kmap.grid, kmap.rowCodes, kmap.colCodes);

  const cellGroupMap = {};
  groups.forEach((g, gi) => {
    g.cells.forEach(([r, c]) => {
      const key = `${r},${c}`;
      if (!cellGroupMap[key]) cellGroupMap[key] = [];
      cellGroupMap[key].push(gi);
    });
  });

  let html = `<div class="kmap-header">
    <div class="result-label" style="margin: 0;">Karnaugh Map</div>
    ${state.manualMode ? '<span class="manual-indicator">MANUAL - click cells to cycle 0 &rarr; 1 &rarr; X</span>' : ''}
  </div>`;

  html += '<div style="overflow-x: auto; padding: 2px 0;"><table class="km-tbl"><thead><tr>';
  html += `<th class="km-hdr" style="border-bottom: 2px solid; border-right: 2px solid;">${kmap.rowVars.join('')} \\ ${kmap.colVars.join('')}</th>`;
  kmap.colCodes.forEach(cc => {
    html += `<th class="km-hdr" style="border-bottom: 2px solid;">${cc}</th>`;
  });
  html += '</tr></thead><tbody>';

  kmap.grid.forEach((row, ri) => {
    html += '<tr>';
    html += `<td class="km-hdr" style="border-right: 2px solid;">${kmap.rowCodes[ri]}</td>`;
    row.forEach((val, ci) => {
      const key = `${ri},${ci}`;
      const gIdxs = cellGroupMap[key] || [];
      const bg = state.showGroups && gIdxs.length > 0 ? GROUP_COLORS[gIdxs[0] % GROUP_COLORS.length] : 'transparent';
      const border = state.showGroups && gIdxs.length > 0 ? `2px solid ${GROUP_BORDERS[gIdxs[0] % GROUP_BORDERS.length]}` : '';
      const cls = val === 1 ? 'v1' : val === 'X' ? 'vx' : 'v0';
      const clickCls = state.manualMode ? 'click' : '';
      const borderStyle = border ? `border: ${border};` : '';
      html += `<td class="km-cell ${cls} ${clickCls}" data-r="${ri}" data-c="${ci}" style="background: ${bg}; ${borderStyle}">
        <span>${val === 'X' ? 'X' : val}</span>
      </td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  const sopExpr = groups.length > 0 ? computeSOP(groups, kmap) : null;
  if (sopExpr) {
    html += `<div class="result-label">Minimized SOP<span class="tag">Sum of Products</span></div>
      <div class="expr-box">
        <span class="expr-text">${sopExpr}</span>
        <button class="btn-copy" data-copy="${encodeURIComponent(sopExpr)}" data-label="SOP">Copy</button>
      </div>`;
  }

  const xorDetected = detectXOR(truthTable, varNames);
  if (xorDetected) {
    html += `<div class="result-label">Simplified Form<span class="tag xor">${xorDetected.type} Detected</span></div>
      <div class="expr-box">
        <span class="expr-text">${xorDetected.expr}</span>
        <button class="btn-copy" data-copy="${encodeURIComponent(xorDetected.expr)}" data-label="${xorDetected.type}">Copy</button>
      </div>`;
  }

  if (state.showPOS) {
    const posExpr = computePOS(truthTable, varNames);
    html += `<div class="result-label">POS<span class="tag">Product of Sums</span></div>
      <div class="expr-box">
        <span class="expr-text">${posExpr}</span>
        <button class="btn-copy" data-copy="${encodeURIComponent(posExpr)}" data-label="POS">Copy</button>
      </div>`;
  }

  if (state.showVerilog) {
    const verilogCode = generateVerilog(sopExpr, xorDetected);
    if (verilogCode) {
      html += `<div class="result-label">Verilog<span class="tag">${xorDetected ? 'XOR' : 'SOP'}</span></div>
        <div class="expr-box">
          <span class="expr-text">${verilogCode}</span>
          <button class="btn-copy" data-copy="${encodeURIComponent(verilogCode)}" data-label="Verilog">Copy</button>
        </div>`;
    }
  }

  if (state.showVHDL) {
    const vhdlCode = generateVHDL(sopExpr, xorDetected);
    if (vhdlCode) {
      html += `<div class="result-label">VHDL<span class="tag">${xorDetected ? 'XOR' : 'SOP'}</span></div>
        <div class="expr-box">
          <span class="expr-text">${vhdlCode}</span>
          <button class="btn-copy" data-copy="${encodeURIComponent(vhdlCode)}" data-label="VHDL">Copy</button>
        </div>`;
    }
  }

  const mintermInfo = getMintermInfo(truthTable, varNames);
  html += `<div class="result-label">Canonical Form</div>
    <div class="mint-box">
      <div><span class="sym">\u03a3m</span>(${mintermInfo.minterms.join(', ') || '\u2205'})${mintermInfo.dontcares.length > 0 ? ` + <span class="sym">d</span>(<span class="dc">${mintermInfo.dontcares.join(', ')}</span>)` : ''}</div>
      <div><span class="sym">\u03a0M</span>(${mintermInfo.maxterms.join(', ') || '\u2205'})${mintermInfo.dontcares.length > 0 ? ` + <span class="sym">d</span>(<span class="dc">${mintermInfo.dontcares.join(', ')}</span>)` : ''}</div>
    </div>`;

  if (state.showGroups && groups.length > 0) {
    html += '<div class="group-legend">';
    groups.forEach((g, i) => {
      const allVars = [...kmap.rowVars, ...kmap.colVars];
      const label = allVars.map((v, vi) => {
        const vals = new Set();
        g.cells.forEach(([r, c]) => {
          const code = vi < kmap.rowVars.length ? kmap.rowCodes[r][vi] : kmap.colCodes[c][vi - kmap.rowVars.length];
          vals.add(code);
        });
        if (vals.size === 1) {
          const val = [...vals][0];
          return val === "1" ? v : v + "'";
        }
        return null;
      }).filter(Boolean).join("\u00b7") || "1";

      html += `<div class="group-item">
        <div class="group-swatch" style="background: ${GROUP_COLORS[i % GROUP_COLORS.length]}; border: 2px solid ${GROUP_BORDERS[i % GROUP_BORDERS.length]};"></div>
        ${label}
      </div>`;
    });
    html += '</div>';
  }

  kmapPanel.innerHTML = html;
  kmapPanel.style.display = 'block';

  kmapPanel.querySelectorAll('.km-cell.click').forEach(cell => {
    cell.addEventListener('click', () => {
      handleCellClick(parseInt(cell.dataset.r), parseInt(cell.dataset.c));
    });
  });

  kmapPanel.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      copyText(decodeURIComponent(btn.dataset.copy), btn.dataset.label);
    });
  });

  if (state.showTruth) {
    let ttHtml = '<div class="result-label" style="margin-top: 0;">Truth Table</div>';
    ttHtml += '<div style="overflow-x: auto; max-height: 350px; overflow-y: auto;"><table class="tt"><thead><tr>';
    varNames.forEach(v => { ttHtml += `<th>${v}</th>`; });
    ttHtml += '<th>F</th></tr></thead><tbody>';
    truthTable.forEach(row => {
      ttHtml += '<tr>';
      varNames.forEach(v => { ttHtml += `<td>${row.env[v]}</td>`; });
      const cls = row.result === 1 ? 'o1' : row.result === 'X' ? 'ox' : 'o0';
      ttHtml += `<td class="${cls}">${row.result === 'X' ? 'X' : row.result}</td></tr>`;
    });
    ttHtml += '</tbody></table></div>';
    truthPanel.innerHTML = ttHtml;
    truthPanel.style.display = 'block';
  } else {
    truthPanel.style.display = 'none';
  }
}

/* ═══════════════════════ EVENT LISTENERS ═══════════════════════ */

generateBtn.addEventListener('click', generate);
exprInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });
mintermsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });
maxtermsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });
dcInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });

modeExpr.addEventListener('click', () => setInputMode('expression'));
modeMinterms.addEventListener('click', () => setInputMode('minterms'));
modeMaxterms.addEventListener('click', () => setInputMode('maxterms'));

groupsBtn.addEventListener('click', () => {
  state.showGroups = !state.showGroups;
  groupsBtn.classList.toggle('on', state.showGroups);
  render();
});

posBtn.addEventListener('click', () => {
  state.showPOS = !state.showPOS;
  posBtn.classList.toggle('on', state.showPOS);
  render();
});

truthBtn.addEventListener('click', () => {
  state.showTruth = !state.showTruth;
  truthBtn.classList.toggle('on', state.showTruth);
  render();
});

verilogBtn.addEventListener('click', () => {
  state.showVerilog = !state.showVerilog;
  verilogBtn.classList.toggle('on', state.showVerilog);
  render();
});

vhdlBtn.addEventListener('click', () => {
  state.showVHDL = !state.showVHDL;
  vhdlBtn.classList.toggle('on', state.showVHDL);
  render();
});

generate();
</script>
</body>
</html>
