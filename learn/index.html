function boothWidget(container) {
  let bits = 8;
  let val = 11;

  function parseNum(s) {
    s = s.trim();
    if (/^-/.test(s)) return -parseNum(s.slice(1));
    if (/^0[xX]/.test(s)) return parseInt(s.substring(2), 16);
    if (/^0[bB]/.test(s)) return parseInt(s.substring(2), 2);
    if (/^0[oO]/.test(s)) return parseInt(s.substring(2), 8);
    return parseInt(s, 10);
  }

  function encode(v, n) {
    const digits = [];
    for (let i = 0; i < n; i++) {
      const prev = i === 0 ? 0 : (v >>> (i - 1)) & 1;
      const curr = (v >>> i) & 1;
      digits.push(prev - curr);
    }
    return digits;
  }

  // Build inputs once
  let html = '<div class="widget-label">Try it \u2014 Booth Encoding</div>';
  html += '<div class="booth-input-row">';
  html += '<select class="booth-input" style="width:60px;" id="boothBits">';
  for (const b of [4, 8]) {
    html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
  }
  html += '</select>';
  html += `<input class="booth-input" id="boothVal" value="${val}" placeholder="e.g. 11, 0xFF, 0b1010" type="text">`;
  html += '</div>';
  html += '<div id="boothOutput"></div>';
  container.innerHTML = html;

  const boothOutput = container.querySelector('#boothOutput');

  function updateOutput() {
    const clamped = val & ((1 << bits) - 1);
    const digits = encode(clamped, bits);

    let h = '<div style="margin-bottom:6px;font-size:12px;color:#595959;">Binary:</div>';
    h += '<div class="booth-bits" style="overflow-x:auto;">';
    for (let i = bits - 1; i >= 0; i--) {
      h += `<div class="booth-bit" style="background:rgba(0,0,0,0.04);border:1px solid #ddd;">${(clamped >>> i) & 1}</div>`;
    }
    h += '</div>';
    h += '<div class="booth-bits" style="margin-bottom:8px;">';
    for (let i = bits - 1; i >= 0; i--) {
      h += `<div class="booth-bit-label">b${i}</div>`;
    }
    h += '</div>';

    // Booth encoding
    h += '<div style="margin-bottom:6px;font-size:12px;color:#595959;">Booth encoding (d[i] = b[i\u22121] \u2212 b[i]):</div>';
    h += '<div class="booth-bits" style="overflow-x:auto;">';
    for (let i = bits - 1; i >= 0; i--) {
      const d = digits[i];
      const cls = d === 1 ? 'booth-pos' : d === -1 ? 'booth-neg' : 'booth-zero';
      const label = d === 1 ? '+1' : d === -1 ? '\u22121' : ' 0';
      h += `<div class="booth-bit ${cls}" style="font-size:11px;">${label}</div>`;
    }
    h += '</div>';
    h += '<div class="booth-bits" style="margin-bottom:10px;">';
    for (let i = bits - 1; i >= 0; i--) {
      h += `<div class="booth-bit-label">d${i}</div>`;
    }
    h += '</div>';

    // Operations
    h += '<div class="booth-result-row">';
    const ops = digits.map((d, i) => {
      if (d === 1) return `<span class="booth-pos">+A\u00AB${i}</span>`;
      if (d === -1) return `<span class="booth-neg">\u2212A\u00AB${i}</span>`;
      return null;
    }).filter(Boolean);
    if (ops.length === 0) h += 'All digits zero \u2014 result is 0.';
    else h += 'Operations: ' + ops.join(' ');
    h += '</div>';

    // Booth efficiency note
    const nonZero = digits.filter(d => d !== 0).length;
    const onesInBinary = clamped.toString(2).split('').filter(c => c === '1').length;
    h += '<div class="booth-result-row" style="color:#595959;font-size:11px;margin-top:4px;">';
    if (nonZero < onesInBinary) {
      h += `Booth wins: ${nonZero} op${nonZero !== 1 ? 's' : ''} vs ${onesInBinary} with standard binary. Ideal when bits have long runs of 1s (e.g. 0b0111110), since Booth collapses each run into just a subtract and an add.`;
    } else if (nonZero > onesInBinary) {
      h += `Booth hurts: ${nonZero} ops vs ${onesInBinary} with standard binary. Alternating bit patterns (e.g. 0b01010101) break Booth\u2019s advantage \u2014 every transition creates an operation instead of collapsing runs.`;
    } else {
      h += `Neutral: ${nonZero} ops either way. Booth shines on long runs of 1s; it loses on alternating 0/1 patterns.`;
    }
    h += '</div>';

    boothOutput.innerHTML = h;
  }

  container.querySelector('#boothBits').addEventListener('change', e => {
    bits = parseInt(e.target.value);
    updateOutput();
  });
  container.querySelector('#boothVal').addEventListener('input', e => {
    const v = parseNum(e.target.value);
    if (!isNaN(v)) { val = v; updateOutput(); }
  });

  updateOutput();
}

function overflowWidget(container) {
  let bits = 8;
  let valA = 100;
  let valB = 50;

  function toSigned(v, n) {
    v = v & ((1 << n) - 1);
    if (v >= (1 << (n - 1))) v -= (1 << n);
    return v;
  }

  // Build inputs once
  let html = '<div class="widget-label">Try it \u2014 Overflow Detection</div>';
  html += '<div class="overflow-row">';
  html += `<select class="overflow-input" style="width:60px;" id="ovBits">`;
  for (const b of [4, 8]) {
    html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
  }
  html += '</select>';
  html += `<span style="font-size:12px;">A:</span><input class="overflow-input" id="ovA" value="${valA}" type="number">`;
  html += `<span style="font-size:12px;">B:</span><input class="overflow-input" id="ovB" value="${valB}" type="number">`;
  html += '</div>';
  html += '<div id="ovOutput"></div>';
  container.innerHTML = html;

  const ovOutput = container.querySelector('#ovOutput');

  function renderBits(val, label) {
    let h = `<div style="font-size:12px;color:#595959;margin-bottom:2px;">${label} (signed: ${toSigned(val, bits)}):</div>`;
    h += '<div class="overflow-bits" style="overflow-x:auto;">';
    for (let i = bits - 1; i >= 0; i--) {
      const cls = i === bits - 1 ? ' sign' : '';
      h += `<div class="overflow-bit${cls}">${(val >>> i) & 1}</div>`;
    }
    h += '</div>';
    return h;
  }

  function updateOutput() {
    const mask = (1 << bits) - 1;
    const a = valA & mask;
    const b = valB & mask;
    const sum = (a + b) & mask;
    const signedA = toSigned(a, bits);
    const signedB = toSigned(b, bits);
    const signedSum = toSigned(sum, bits);
    const trueSum = signedA + signedB;
    const overflow = trueSum !== signedSum;

    const msbMask = 1 << (bits - 1);
    const lowerMask = msbMask - 1;
    const lowerSum = (a & lowerMask) + (b & lowerMask);
    const cIn = (lowerSum >> (bits - 1)) & 1;
    const fullSum = a + b;
    const cOut = (fullSum >> bits) & 1;

    let h = renderBits(a, 'A');
    h += renderBits(b, 'B');
    h += '<div style="border-top:1px solid #ddd;margin:6px 0;"></div>';
    h += renderBits(sum, 'A + B');

    h += '<div class="overflow-result">';
    h += `C<sub>in</sub>[MSB] = ${cIn}, C<sub>out</sub>[MSB] = ${cOut}, XOR = ${cIn ^ cOut}<br>`;
    if (overflow) {
      h += `<span class="overflow-bad">Overflow! True result ${trueSum} doesn\u2019t fit in ${bits} bits (range ${-(1<<(bits-1))} to ${(1<<(bits-1))-1}).</span>`;
    } else {
      h += `<span class="overflow-ok">No overflow. Result ${signedSum} is correct.</span>`;
    }
    h += '</div>';

    ovOutput.innerHTML = h;
  }

  container.querySelector('#ovBits').addEventListener('change', e => { bits = parseInt(e.target.value); updateOutput(); });
  container.querySelector('#ovA').addEventListener('input', e => { valA = parseInt(e.target.value) || 0; updateOutput(); });
  container.querySelector('#ovB').addEventListener('input', e => { valB = parseInt(e.target.value) || 0; updateOutput(); });

  updateOutput();
}

function fixedPointWidget(container) {
  let decimal = 3.75;
  let intBits = 4;
  let fracBits = 4;

  // Build inputs once
  let html = '<div class="widget-label">Try it \u2014 Fixed-Point Converter</div>';
  html += '<div class="fp-row">';
  html += `<input class="fp-input" id="fpVal" value="${decimal}" placeholder="decimal" type="text" style="width:100px;">`;
  html += `<select class="fp-select" id="fpFmt">`;
  for (const [m, f] of [[4,4],[8,8],[4,12],[12,4]]) {
    const sel = m === intBits && f === fracBits ? 'selected' : '';
    html += `<option value="${m},${f}" ${sel}>Q${m}.${f} (${m+f}-bit)</option>`;
  }
  html += '</select>';
  html += '</div>';
  html += '<div id="fpOutput"></div>';
  container.innerHTML = html;

  const fpOutput = container.querySelector('#fpOutput');

  function updateOutput() {
    const totalBits = intBits + fracBits;
    const scale = 1 << fracBits;
    const maxVal = (1 << (totalBits - 1)) - 1;
    const minVal = -(1 << (totalBits - 1));
    const maxDecimal = maxVal / scale;
    const minDecimal = minVal / scale;

    let clamped = Math.max(minDecimal, Math.min(maxDecimal, decimal));
    let raw = Math.round(clamped * scale);
    if (raw > maxVal) raw = maxVal;
    if (raw < minVal) raw = minVal;
    const actual = raw / scale;

    const unsigned = raw < 0 ? raw + (1 << totalBits) : raw;

    let h = '<div class="fp-bits" style="overflow-x:auto;">';
    for (let i = totalBits - 1; i >= 0; i--) {
      const bit = (unsigned >>> i) & 1;
      const cls = i >= fracBits ? 'int-part' : 'frac-part';
      h += `<div class="fp-bit ${cls}">${bit}</div>`;
      if (i === fracBits) h += '<span class="fp-radix">.</span>';
    }
    h += '</div>';

    h += '<div class="fp-info">';
    h += `<strong>Q${intBits}.${fracBits}</strong> \u2014 ${intBits} integer bits, ${fracBits} fractional bits (${totalBits} bits total)<br>`;
    h += `Stored integer: ${raw} \u2192 value: ${raw} / 2<sup>${fracBits}</sup> = <strong>${actual}</strong>`;
    if (actual !== clamped || actual !== decimal) h += ` (input ${decimal} quantized)`;
    h += `<br>Range: [${minDecimal}, ${maxDecimal}], resolution: ${(1/scale).toFixed(fracBits <= 8 ? fracBits : 8)}`;
    h += '</div>';

    fpOutput.innerHTML = h;
  }

  container.querySelector('#fpVal').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    if (!isNaN(v)) { decimal = v; updateOutput(); }
  });
  container.querySelector('#fpFmt').addEventListener('change', e => {
    const [m, f] = e.target.value.split(',').map(Number);
    intBits = m; fracBits = f; updateOutput();
  });

  updateOutput();
}

function barrelShifterWidget(container) {
  const n = 8;
  let shift = 5;
  const stages = Math.ceil(Math.log2(n));

  // Build inputs once
  let html = '<div class="widget-label">Barrel Shifter \u2014 8-bit, 3 stages</div>';
  html += '<div id="barrelOutput" style="overflow-x:auto;"></div>';
  html += '<div class="barrel-note">';
  html += `Shift amount: <input class="overflow-input" id="barrelShift" type="number" min="0" max="${n-1}" value="${shift}" style="width:50px;"> `;
  html += `<span id="barrelBinary">= ${shift.toString(2).padStart(stages, '0')}<sub>2</sub></span>`;
  html += `<br>Each stage: if control bit is 1, shift by 2<sup>k</sup>; if 0, pass through. Active stages highlighted.`;
  html += '</div>';
  container.innerHTML = html;

  const barrelOutput = container.querySelector('#barrelOutput');
  const barrelBinary = container.querySelector('#barrelBinary');

  function updateOutput() {
    let h = '<div class="barrel-diagram">';

    // Input row
    h += '<div class="barrel-stage"><div class="barrel-label">Input</div><div class="barrel-muxes">';
    for (let i = n - 1; i >= 0; i--) h += `<div class="barrel-mux pass">d${i}</div>`;
    h += '</div></div>';

    // Each stage
    let current = [];
    for (let i = 0; i < n; i++) current[i] = i;

    for (let s = 0; s < stages; s++) {
      const shiftAmt = 1 << s;
      const active = (shift >> s) & 1;
      const next = [];

      h += `<div class="barrel-stage"><div class="barrel-label">Stage ${s}<br>shift ${shiftAmt}${active ? ' \u2713' : ''}</div><div class="barrel-muxes">`;
      for (let i = n - 1; i >= 0; i--) {
        if (active && i - shiftAmt >= 0) {
          next[i] = current[i - shiftAmt];
          h += `<div class="barrel-mux">d${next[i]}</div>`;
        } else if (active && i - shiftAmt < 0) {
          next[i] = -1;
          h += '<div class="barrel-mux">0</div>';
        } else {
          next[i] = current[i];
          h += `<div class="barrel-mux pass">d${next[i]}</div>`;
        }
      }
      h += '</div></div>';
      current = next;
    }

    // Output row
    h += '<div class="barrel-stage"><div class="barrel-label">Output</div><div class="barrel-muxes">';
    for (let i = n - 1; i >= 0; i--) {
      const v = current[i] < 0 ? '0' : 'd' + current[i];
      h += `<div class="barrel-mux">${v}</div>`;
    }
    h += '</div></div>';
    h += '</div>';

    barrelOutput.innerHTML = h;
    barrelBinary.innerHTML = `= ${shift.toString(2).padStart(stages, '0')}<sub>2</sub>`;
  }

  container.querySelector('#barrelShift').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    if (!isNaN(v) && v >= 0 && v < n) { shift = v; updateOutput(); }
  });

  updateOutput();
}

function ieeeWidget(container) {
  let inputStr = '3.14';

  // Build input once
  let html = '<div class="widget-label">Try it \u2014 IEEE 754 Single Precision</div>';
  html += '<div class="ieee-row">';
  html += `<input class="ieee-input" id="ieeeVal" value="${inputStr}" placeholder="decimal number" type="text">`;
  html += '</div>';
  html += '<div id="ieeeOutput"></div>';
  container.innerHTML = html;

  const ieeeOutput = container.querySelector('#ieeeOutput');

  function updateOutput() {
    const val = parseFloat(inputStr);

    if (isNaN(val) && inputStr.toLowerCase() !== 'nan') {
      ieeeOutput.innerHTML = '<div class="ieee-info">Enter a number, "Infinity", "-Infinity", or "NaN".</div>';
      return;
    }

    // Get the IEEE 754 bits via DataView
    const buf = new ArrayBuffer(4);
    const dv = new DataView(buf);
    if (inputStr.toLowerCase() === 'nan') dv.setFloat32(0, NaN);
    else dv.setFloat32(0, val);
    const bits32 = dv.getUint32(0);

    const sign = (bits32 >>> 31) & 1;
    const exp = (bits32 >>> 23) & 0xFF;
    const mant = bits32 & 0x7FFFFF;

    let h = '';

    // Field labels
    h += '<div class="ieee-field-labels" style="overflow-x:auto;">';
    h += '<div class="ieee-field-label sign">S</div>';
    h += '<div class="ieee-field-label exp">Exponent (8 bits)</div>';
    h += '<div class="ieee-field-label mant">Mantissa (23 bits)</div>';
    h += '</div>';

    // Bit display
    h += '<div class="ieee-bits" style="overflow-x:auto;">';
    h += `<div class="ieee-bit ieee-sign">${sign}</div>`;
    for (let i = 7; i >= 0; i--) {
      h += `<div class="ieee-bit ieee-exp">${(exp >>> i) & 1}</div>`;
    }
    for (let i = 22; i >= 0; i--) {
      h += `<div class="ieee-bit ieee-mant">${(mant >>> i) & 1}</div>`;
    }
    h += '</div>';

    // Interpretation
    h += '<div class="ieee-info">';
    h += `<span style="color:#dc3545;">Sign:</span> ${sign} (${sign ? 'negative' : 'positive'})<br>`;
    h += `<span style="color:#0066cc;">Exponent:</span> ${exp} (biased) = ${exp - 127} (actual)<br>`;
    h += `<span style="color:#28a745;">Mantissa:</span> 0x${mant.toString(16).toUpperCase().padStart(6, '0')} = ${mant} / 2<sup>23</sup><br>`;

    if (exp === 0 && mant === 0) {
      h += `<span class="ieee-special">${sign ? '\u2212' : '+'}0 (zero)</span>`;
    } else if (exp === 0) {
      const denorm = mant / (1 << 23);
      const value = (sign ? -1 : 1) * Math.pow(2, -126) * denorm;
      h += `<span class="ieee-special">Denormalized:</span> (\u22121)<sup>${sign}</sup> \u00D7 2<sup>\u2212126</sup> \u00D7 0.${mant.toString(2).padStart(23,'0')} = ${value.toExponential(6)}`;
    } else if (exp === 255 && mant === 0) {
      h += `<span class="ieee-special">${sign ? '\u2212' : '+'}Infinity</span>`;
    } else if (exp === 255) {
      h += '<span class="ieee-special">NaN (Not a Number)</span>';
    } else {
      const significand = 1 + mant / (1 << 23);
      h += `Value = (\u22121)<sup>${sign}</sup> \u00D7 2<sup>${exp - 127}</sup> \u00D7 ${significand.toFixed(8)} = <strong>${dv.getFloat32(0)}</strong>`;
    }
    h += '</div>';

    ieeeOutput.innerHTML = h;
  }

  container.querySelector('#ieeeVal').addEventListener('input', e => { inputStr = e.target.value; updateOutput(); });

  updateOutput();
}

function comparatorWidget(container) {
  let bits = 8;
  let valA = 183;
  let valB = 170;

  let html = '<div class="widget-label">Try it \u2014 Magnitude Comparator</div>';
  html += '<div class="cmp-input-row">';
  html += '<select class="cmp-input" style="width:60px;" id="cmpBits">';
  for (const b of [4, 8]) html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
  html += '</select>';
  html += '<span style="font-size:12px;">A:</span><input class="cmp-input" id="cmpA" value="' + valA + '" type="number">';
  html += '<span style="font-size:12px;">B:</span><input class="cmp-input" id="cmpB" value="' + valB + '" type="number">';
  html += '</div>';
  html += '<div id="cmpOutput"></div>';
  container.innerHTML = html;

  const cmpOutput = container.querySelector('#cmpOutput');

  function updateOutput() {
    const mask = (1 << bits) - 1;
    const a = valA & mask;
    const b = valB & mask;

    // Find the deciding bit
    let decidingBit = -1;
    for (let i = bits - 1; i >= 0; i--) {
      const aBit = (a >>> i) & 1;
      const bBit = (b >>> i) & 1;
      if (aBit !== bBit) { decidingBit = i; break; }
    }

    let h = '';

    // Render A bits
    h += '<div style="font-size:12px;color:#595959;margin-bottom:2px;">A = ' + a + ':</div>';
    h += '<div class="cmp-bits-row">';
    for (let i = bits - 1; i >= 0; i--) {
      const bit = (a >>> i) & 1;
      let cls = 'cmp-bit';
      if (i === decidingBit) cls += ' deciding';
      else if (decidingBit !== -1 && i < decidingBit) cls += ' skipped';
      else if (decidingBit === -1) cls += ' equal';
      h += '<div class="' + cls + '">' + bit + '</div>';
    }
    h += '</div>';

    // Render B bits
    h += '<div style="font-size:12px;color:#595959;margin-bottom:2px;margin-top:4px;">B = ' + b + ':</div>';
    h += '<div class="cmp-bits-row">';
    for (let i = bits - 1; i >= 0; i--) {
      const bit = (b >>> i) & 1;
      let cls = 'cmp-bit';
      if (i === decidingBit) cls += ' deciding';
      else if (decidingBit !== -1 && i < decidingBit) cls += ' skipped';
      else if (decidingBit === -1) cls += ' equal';
      h += '<div class="' + cls + '">' + bit + '</div>';
    }
    h += '</div>';

    // Step-by-step explanation
    h += '<div class="cmp-step">';
    let steps = [];
    for (let i = bits - 1; i >= 0; i--) {
      const aBit = (a >>> i) & 1;
      const bBit = (b >>> i) & 1;
      if (aBit === bBit) {
        steps.push('Bit ' + i + ': A[' + i + ']=' + aBit + ' = B[' + i + ']=' + bBit + ' \u2192 equal, check next');
        if (i === 0 && decidingBit === -1) {
          steps.push('All bits equal \u2192 A = B');
        }
      } else {
        steps.push('Bit ' + i + ': A[' + i + ']=' + aBit + ' \u2260 B[' + i + ']=' + bBit + ' \u2192 ' + (aBit > bBit ? 'A > B' : 'A < B') + ' (decided!)');
        break;
      }
    }
    h += steps.join('<br>');
    h += '</div>';

    // Result
    h += '<div class="cmp-result">';
    if (a > b) h += '<span class="cmp-gt">A > B</span> \u2014 decided at bit ' + decidingBit + ' (A has 1, B has 0)';
    else if (a < b) h += '<span class="cmp-lt">A < B</span> \u2014 decided at bit ' + decidingBit + ' (A has 0, B has 1)';
    else h += '<span class="cmp-eq">A = B</span> \u2014 all ' + bits + ' bits are identical';
    h += '</div>';

    cmpOutput.innerHTML = h;
  }

  container.querySelector('#cmpBits').addEventListener('change', function(e) { bits = parseInt(e.target.value); updateOutput(); });
  container.querySelector('#cmpA').addEventListener('input', function(e) { valA = parseInt(e.target.value) || 0; updateOutput(); });
  container.querySelector('#cmpB').addEventListener('input', function(e) { valB = parseInt(e.target.value) || 0; updateOutput(); });
  updateOutput();
}

function fifoWidget(container) {
  const SIZE = 8;
  let fifo = new Array(SIZE).fill(null);
  let head = 0;    // read pointer
  let tail = 0;    // write pointer
  let count = 0;
  let nextVal = 1;
  let log = [];

  let html = '<div class="widget-label">Try it \u2014 Circular FIFO (8 slots)</div>';
  html += '<div class="fifo-controls">';
  html += '<input class="fifo-input" id="fifoVal" value="1" type="number" min="0" max="99">';
  html += '<button class="fifo-btn" id="fifoEnq">Enqueue</button>';
  html += '<button class="fifo-btn" id="fifoDeq">Dequeue</button>';
  html += '<button class="fifo-btn" id="fifoReset">Clear</button>';
  html += '</div>';
  html += '<div id="fifoOutput"></div>';
  container.innerHTML = html;

  const fifoOutput = container.querySelector('#fifoOutput');
  const fifoValInput = container.querySelector('#fifoVal');

  function enqueue() {
    if (count >= SIZE) { log.push('FULL \u2014 enqueue rejected'); render(); return; }
    const v = parseInt(fifoValInput.value) || 0;
    fifo[tail] = v;
    log.push('Enqueue ' + v + ' at slot ' + tail);
    tail = (tail + 1) % SIZE;
    count++;
    nextVal = v + 1;
    fifoValInput.value = nextVal;
    render();
  }

  function dequeue() {
    if (count <= 0) { log.push('EMPTY \u2014 dequeue rejected'); render(); return; }
    const v = fifo[head];
    fifo[head] = null;
    log.push('Dequeue ' + v + ' from slot ' + head);
    head = (head + 1) % SIZE;
    count--;
    render();
  }

  function reset() {
    fifo = new Array(SIZE).fill(null);
    head = 0; tail = 0; count = 0; nextVal = 1;
    fifoValInput.value = '1';
    log = ['FIFO cleared'];
    render();
  }

  function render() {
    let h = '';

    // Pointer labels
    h += '<div class="fifo-labels">';
    for (let i = 0; i < SIZE; i++) {
      let lbl = '';
      if (i === head && i === tail) lbl = '<span class="fifo-ptr-label fifo-ptr-rd">H</span><span class="fifo-ptr-label fifo-ptr-wr">T</span>';
      else if (i === head) lbl = '<span class="fifo-ptr-label fifo-ptr-rd">Head</span>';
      else if (i === tail) lbl = '<span class="fifo-ptr-label fifo-ptr-wr">Tail</span>';
      h += '<div class="fifo-label-cell">' + lbl + '</div>';
    }
    h += '</div>';

    // Slots
    h += '<div class="fifo-ring">';
    for (let i = 0; i < SIZE; i++) {
      let cls = 'fifo-slot';
      if (fifo[i] !== null) cls += ' occupied';
      if (i === head && count > 0) cls += ' head-slot';
      if (i === tail) cls += ' tail-slot';
      const display = fifo[i] !== null ? fifo[i] : '\u00B7';
      h += '<div class="' + cls + '">' + display + '</div>';
    }
    h += '</div>';

    // Index labels
    h += '<div class="fifo-labels">';
    for (let i = 0; i < SIZE; i++) h += '<div class="fifo-label-cell">[' + i + ']</div>';
    h += '</div>';

    // Status
    h += '<div class="fifo-status">';
    h += 'Count: <strong>' + count + '/' + SIZE + '</strong>';
    if (count === SIZE) h += ' \u2014 <span class="fifo-status-full">FULL</span>';
    else if (count === 0) h += ' \u2014 <span class="fifo-status-empty">EMPTY</span>';
    h += ' | Head: ' + head + ' | Tail: ' + tail;
    h += '</div>';

    // Log (last 5 entries)
    if (log.length > 0) {
      h += '<div class="fifo-log">';
      const recent = log.slice(-5);
      for (let i = recent.length - 1; i >= 0; i--) h += recent[i] + '<br>';
      h += '</div>';
    }

    fifoOutput.innerHTML = h;

    // Update button states
    container.querySelector('#fifoEnq').disabled = count >= SIZE;
    container.querySelector('#fifoDeq').disabled = count <= 0;
  }

  container.querySelector('#fifoEnq').addEventListener('click', enqueue);
  container.querySelector('#fifoDeq').addEventListener('click', dequeue);
  container.querySelector('#fifoReset').addEventListener('click', reset);
  render();
}

function writePolicyWidget(container) {
  const CACHE_LINES = 4;
  const MEM_SIZE = 8;
  let policy = 'write-through';
  let cache = new Array(CACHE_LINES).fill(null); // {addr, val, dirty}
  let mem = [];
  let log = [];
  let wbCount = 0;
  let memWrites = 0;

  function reset() {
    cache = new Array(CACHE_LINES).fill(null);
    mem = [];
    for (let i = 0; i < MEM_SIZE; i++) mem.push({ addr: i, val: 0 });
    log = [];
    wbCount = 0;
    memWrites = 0;
    render();
  }

  function mapSet(addr) { return addr % CACHE_LINES; }

  function doWrite(addr, val) {
    const set = mapSet(addr);
    const line = cache[set];

    if (line && line.addr === addr) {
      // Write hit
      line.val = val;
      if (policy === 'write-through') {
        mem[addr].val = val;
        memWrites++;
        log.push(`<span style="color:#27ae60">HIT</span> Write addr ${addr} = ${val}. Cache + memory updated. <span style="color:#888">(mem write #${memWrites})</span>`);
      } else {
        line.dirty = true;
        log.push(`<span style="color:#27ae60">HIT</span> Write addr ${addr} = ${val}. Cache updated, marked <strong style="color:#e67e22">dirty</strong>.`);
      }
    } else {
      // Write miss — write-allocate: fetch then write
      if (line && line.dirty) {
        // Evict dirty line: write back
        mem[line.addr].val = line.val;
        memWrites++;
        wbCount++;
        log.push(`<span style="color:#e67e22">EVICT</span> Dirty line addr ${line.addr} written back to memory. <span style="color:#888">(mem write #${memWrites})</span>`);
      }
      // Allocate
      cache[set] = { addr, val, dirty: false };
      if (policy === 'write-through') {
        mem[addr].val = val;
        memWrites++;
        log.push(`<span style="color:#e74c3c">MISS</span> Write addr ${addr} = ${val}. Allocated + memory updated. <span style="color:#888">(mem write #${memWrites})</span>`);
      } else {
        cache[set].dirty = true;
        log.push(`<span style="color:#e74c3c">MISS</span> Write addr ${addr} = ${val}. Allocated, marked <strong style="color:#e67e22">dirty</strong>.`);
      }
    }
    render();
  }

  function render() {
    let h = '<div class="widget-label">Try it \u2014 Write Policies</div>';

    // Policy toggle
    h += '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">';
    h += `<button class="wp-pol btn-t ${policy === 'write-through' ? 'on' : ''}" data-p="write-through">Write-Through</button>`;
    h += `<button class="wp-pol btn-t ${policy === 'write-back' ? 'on' : ''}" data-p="write-back">Write-Back</button>`;
    h += '<span style="margin-left:auto;font-size:12px;color:#888">Memory writes: <strong>' + memWrites + '</strong></span>';
    h += '</div>';

    // Input row
    h += '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
    h += '<label style="font-size:12px;display:flex;align-items:center;gap:4px">Addr <select id="wpAddr" style="font-family:monospace;font-size:13px;padding:3px 6px;border-radius:4px;border:1px solid #ccc;background:inherit;color:inherit">';
    for (let i = 0; i < MEM_SIZE; i++) h += `<option value="${i}">${i}</option>`;
    h += '</select></label>';
    h += '<label style="font-size:12px;display:flex;align-items:center;gap:4px">Value <input id="wpVal" type="number" min="0" max="99" value="1" style="width:50px;font-family:monospace;font-size:13px;padding:3px 6px;border-radius:4px;border:1px solid #ccc;background:inherit;color:inherit"></label>';
    h += '<button class="btn-t" id="wpWrite">Write</button>';
    h += '<button class="btn-t" id="wpReset" style="margin-left:auto">Reset</button>';
    h += '</div>';

    // Cache + Memory side by side
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;font-family:monospace">';

    // Cache
    h += '<div><div style="font-weight:600;margin-bottom:4px;font-family:sans-serif;font-size:12px">Cache <span style="color:#888">(4 lines, direct-mapped)</span></div>';
    h += '<table style="width:100%;border-collapse:collapse">';
    h += '<tr style="font-size:11px;color:#888"><th style="text-align:left;padding:2px 6px">Set</th><th style="text-align:left;padding:2px 6px">Addr</th><th style="text-align:left;padding:2px 6px">Val</th>';
    if (policy === 'write-back') h += '<th style="text-align:left;padding:2px 6px">Dirty</th>';
    h += '</tr>';
    for (let i = 0; i < CACHE_LINES; i++) {
      const line = cache[i];
      const bg = line ? (line.dirty ? 'rgba(230,126,34,0.1)' : 'rgba(39,174,96,0.06)') : 'transparent';
      h += `<tr style="background:${bg};border-bottom:1px solid rgba(128,128,128,0.15)">`;
      h += `<td style="padding:3px 6px;color:#888">${i}</td>`;
      if (line) {
        h += `<td style="padding:3px 6px">${line.addr}</td>`;
        h += `<td style="padding:3px 6px;font-weight:600">${line.val}</td>`;
        if (policy === 'write-back') h += `<td style="padding:3px 6px">${line.dirty ? '<span style="color:#e67e22">1</span>' : '0'}</td>`;
      } else {
        h += '<td style="padding:3px 6px;color:#888">\u2014</td><td style="padding:3px 6px;color:#888">\u2014</td>';
        if (policy === 'write-back') h += '<td style="padding:3px 6px;color:#888">\u2014</td>';
      }
      h += '</tr>';
    }
    h += '</table></div>';

    // Memory
    h += '<div><div style="font-weight:600;margin-bottom:4px;font-family:sans-serif;font-size:12px">Main Memory</div>';
    h += '<table style="width:100%;border-collapse:collapse">';
    h += '<tr style="font-size:11px;color:#888"><th style="text-align:left;padding:2px 6px">Addr</th><th style="text-align:left;padding:2px 6px">Val</th></tr>';
    for (let i = 0; i < MEM_SIZE; i++) {
      // Highlight if cache has a different (dirty) value for this addr
      const set = mapSet(i);
      const line = cache[set];
      const stale = line && line.addr === i && line.dirty && line.val !== mem[i].val;
      const bg = stale ? 'rgba(231,76,60,0.08)' : 'transparent';
      h += `<tr style="background:${bg};border-bottom:1px solid rgba(128,128,128,0.15)">`;
      h += `<td style="padding:3px 6px;color:#888">${i}</td>`;
      h += `<td style="padding:3px 6px">${mem[i].val}${stale ? ' <span style="color:#e74c3c;font-size:10px">(stale)</span>' : ''}</td>`;
      h += '</tr>';
    }
    h += '</table></div>';

    h += '</div>';

    // Log
    if (log.length > 0) {
      h += '<div style="margin-top:10px;font-size:12px;line-height:1.8;max-height:120px;overflow-y:auto;padding:6px 8px;border:1px solid rgba(128,128,128,0.2);border-radius:6px">';
      const recent = log.slice(-6);
      for (let i = recent.length - 1; i >= 0; i--) h += recent[i] + '<br>';
      h += '</div>';
    }

    container.innerHTML = h;

    // Bind events
    container.querySelectorAll('.wp-pol').forEach(btn => {
      btn.addEventListener('click', () => {
        policy = btn.dataset.p;
        // Reset on policy switch to avoid stale dirty state confusion
        reset();
      });
    });
    container.querySelector('#wpWrite').addEventListener('click', () => {
      const addr = parseInt(container.querySelector('#wpAddr').value);
      const val = parseInt(container.querySelector('#wpVal').value) || 0;
      doWrite(addr, val);
    });
    container.querySelector('#wpReset').addEventListener('click', reset);
  }

  reset();
}

function kmapWidget(container) {
  let vars = 2;
  let cells = new Array(4).fill(0); // 0, 1, or 'x'

  function grayOrder(n) {
    if (n === 1) return [0, 1];
    if (n === 2) return [0, 1, 3, 2]; // 00,01,11,10
    return [0, 1, 3, 2];
  }

  function varLabel(idx) { return String.fromCharCode(65 + idx); }

  function cellsForVars(n) { return 1 << n; }

  function reset() {
    cells = new Array(cellsForVars(vars)).fill(0);
    render();
  }

  function getGroups() {
    // Simple grouping for 2-var K-map (4 cells arranged as 2x2)
    // For 3-var: 2x4, For 2-var: 2x2
    // We'll find prime implicants using Quine-McCluskey-like approach for small maps
    const n = cellsForVars(vars);
    const minterms = [];
    const dontcares = [];
    for (let i = 0; i < n; i++) {
      if (cells[i] === 1) minterms.push(i);
      else if (cells[i] === 'x') dontcares.push(i);
    }
    if (minterms.length === 0) return { groups: [], expr: '0' };

    const all = [...minterms, ...dontcares];
    // Find all valid rectangular groups (power-of-2 sized)
    const groups = [];

    function canGroup(indices) {
      // All indices must be 1 or x
      return indices.every(i => cells[i] === 1 || cells[i] === 'x');
    }

    function diffBits(a, b) {
      let d = a ^ b;
      let count = 0;
      while (d) { count += d & 1; d >>= 1; }
      return count;
    }

    // Generate all possible groups: a group is defined by a mask (which bits are fixed)
    // and a value for the fixed bits
    const possibleGroups = [];
    for (let mask = 0; mask < n; mask++) {
      // mask bits = don't care positions within the group
      // Check mask is valid: must have bits only in variable positions
      const fixed = (~mask) & (n - 1);
      const groupSize = 1 << popcount(mask);
      if (groupSize < 1) continue;

      // For each assignment of the fixed bits
      for (let val = 0; val < n; val++) {
        if ((val & mask) !== 0) continue; // fixed bits only
        // Generate all members
        const members = [];
        for (let sub = 0; ; sub = (sub - mask) & mask) {
          members.push(val | sub);
          if (sub === mask) break;
        }
        if (members.length >= 2 && canGroup(members) && members.some(i => cells[i] === 1)) {
          possibleGroups.push({ members: members.sort((a,b) => a-b), mask, val, size: members.length });
        }
      }
    }

    function popcount(x) { let c = 0; while (x) { c += x & 1; x >>= 1; } return c; }

    // Sort by size descending (prefer larger groups)
    possibleGroups.sort((a, b) => b.size - a.size);

    // Greedy cover: pick largest groups that cover uncovered minterms
    const covered = new Set();
    const selected = [];
    for (const g of possibleGroups) {
      const coversNew = g.members.some(m => minterms.includes(m) && !covered.has(m));
      if (coversNew) {
        selected.push(g);
        for (const m of g.members) {
          if (minterms.includes(m)) covered.add(m);
        }
      }
      if (covered.size === minterms.length) break;
    }

    // Also cover any remaining as single cells
    for (const m of minterms) {
      if (!covered.has(m)) {
        selected.push({ members: [m], mask: 0, val: m, size: 1 });
        covered.add(m);
      }
    }

    // Build expression from groups
    const terms = selected.map(g => {
      const term = [];
      for (let i = vars - 1; i >= 0; i--) {
        const bit = 1 << i;
        if (g.mask & bit) continue; // this variable is eliminated
        term.push(g.val & bit ? varLabel(vars - 1 - i) : varLabel(vars - 1 - i) + "'");
      }
      return term.length === 0 ? '1' : term.join('');
    });
    const expr = terms.join(' + ') || '0';

    return { groups: selected, expr };
  }

  function render() {
    let h = '<div class="widget-label">Try it \u2014 K-Map Simplification</div>';

    // Variable count selector
    h += '<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">';
    h += '<span style="font-size:12px;color:#888">Variables:</span>';
    for (const v of [2, 3]) {
      h += `<button class="btn-t km-vars ${vars === v ? 'on' : ''}" data-v="${v}">${v}</button>`;
    }
    h += '<button class="btn-t" id="kmReset" style="margin-left:auto">Reset</button>';
    h += '</div>';

    const n = cellsForVars(vars);
    const { groups, expr } = getGroups();
    const groupColors = ['rgba(52,152,219,0.25)', 'rgba(46,204,113,0.25)', 'rgba(231,76,60,0.25)', 'rgba(155,89,182,0.25)'];

    // Build color map for cells
    const cellColors = new Array(n).fill(null).map(() => []);
    groups.forEach((g, gi) => {
      g.members.forEach(m => cellColors[m].push(groupColors[gi % groupColors.length]));
    });

    if (vars === 2) {
      // 2x2 grid: rows = A (0,1), cols = B (0,1)
      h += '<table style="border-collapse:collapse;margin:0 auto;font-family:monospace;font-size:14px">';
      h += `<tr><td style="padding:4px 10px;font-size:11px;color:#888"></td><td style="padding:4px 10px;font-size:11px;color:#888;text-align:center">${varLabel(1)}=0</td><td style="padding:4px 10px;font-size:11px;color:#888;text-align:center">${varLabel(1)}=1</td></tr>`;
      for (let a = 0; a < 2; a++) {
        h += `<tr><td style="padding:4px 10px;font-size:11px;color:#888">${varLabel(0)}=${a}</td>`;
        for (let b = 0; b < 2; b++) {
          const idx = a * 2 + b;
          const val = cells[idx];
          const bg = cellColors[idx].length > 0 ? cellColors[idx][0] : 'transparent';
          const display = val === 'x' ? 'X' : val;
          h += `<td class="km-cell" data-i="${idx}" style="width:48px;height:48px;text-align:center;border:1px solid rgba(128,128,128,0.3);cursor:pointer;font-weight:600;background:${bg};user-select:none">${display}</td>`;
        }
        h += '</tr>';
      }
      h += '</table>';
    } else {
      // 3-var: 2 rows (A), 4 cols (BC in Gray code: 00,01,11,10)
      const colOrder = [0, 1, 3, 2];
      const colLabels = ['00', '01', '11', '10'];
      h += '<table style="border-collapse:collapse;margin:0 auto;font-family:monospace;font-size:14px">';
      h += `<tr><td style="padding:4px 8px;font-size:11px;color:#888">${varLabel(0)}\\${varLabel(1)}${varLabel(2)}</td>`;
      colLabels.forEach(l => { h += `<td style="padding:4px 10px;font-size:11px;color:#888;text-align:center">${l}</td>`; });
      h += '</tr>';
      for (let a = 0; a < 2; a++) {
        h += `<tr><td style="padding:4px 10px;font-size:11px;color:#888">${a}</td>`;
        for (let ci = 0; ci < 4; ci++) {
          const idx = a * 4 + colOrder[ci];
          const val = cells[idx];
          const bg = cellColors[idx].length > 0 ? cellColors[idx][0] : 'transparent';
          const display = val === 'x' ? 'X' : val;
          h += `<td class="km-cell" data-i="${idx}" style="width:48px;height:48px;text-align:center;border:1px solid rgba(128,128,128,0.3);cursor:pointer;font-weight:600;background:${bg};user-select:none">${display}</td>`;
        }
        h += '</tr>';
      }
      h += '</table>';
    }

    h += '<div style="margin-top:10px;font-size:12px;color:#888;text-align:center">Click cells to cycle: 0 \u2192 1 \u2192 X \u2192 0</div>';

    // Result
    h += `<div style="margin-top:10px;font-size:14px;font-family:monospace;text-align:center;padding:8px;border-radius:6px;background:rgba(128,128,128,0.06)"><strong>SOP:</strong> ${expr}</div>`;

    container.innerHTML = h;

    // Bind events
    container.querySelectorAll('.km-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.i);
        if (cells[i] === 0) cells[i] = 1;
        else if (cells[i] === 1) cells[i] = 'x';
        else cells[i] = 0;
        render();
      });
    });
    container.querySelectorAll('.km-vars').forEach(btn => {
      btn.addEventListener('click', () => {
        vars = parseInt(btn.dataset.v);
        cells = new Array(cellsForVars(vars)).fill(0);
        render();
      });
    });
    container.querySelector('#kmReset').addEventListener('click', reset);
  }

  render();
}

function flipFlopWidget(container) {
  let clk = 0;
  let d = 0;
  let q = 0;
  let history = []; // {clk, d, q}
  const MAX_HISTORY = 12;

  function clockTick() {
    clk = 1;
    q = d; // D flip-flop: Q takes D on rising edge
    history.push({ clk: 1, d, q });
    if (history.length > MAX_HISTORY) history.shift();
    render();
  }

  function toggleD() {
    d = d ? 0 : 1;
    history.push({ clk: 0, d, q });
    if (history.length > MAX_HISTORY) history.shift();
    render();
  }

  function reset() {
    clk = 0; d = 0; q = 0;
    history = [{ clk: 0, d: 0, q: 0 }];
    render();
  }

  function render() {
    let h = '<div class="widget-label">Try it \u2014 D Flip-Flop</div>';

    // Current state
    h += '<div style="display:flex;gap:16px;align-items:center;margin-bottom:12px;flex-wrap:wrap">';
    h += `<button class="btn-t" id="ffToggleD">D = ${d} (click to toggle)</button>`;
    h += `<button class="btn-t on" id="ffClk">\u2191 Rising Edge</button>`;
    h += `<span style="font-family:monospace;font-size:14px;font-weight:600">Q = ${q}</span>`;
    h += '<button class="btn-t" id="ffReset" style="margin-left:auto">Reset</button>';
    h += '</div>';

    // Timing diagram
    if (history.length > 1) {
      const stepW = 30;
      const H = 100;
      const rowH = 24;
      const topPad = 4;
      const svgWidth = 32 + history.length * stepW + 8;

      h += `<div style="overflow-x:auto;max-width:100%">`;
      h += `<svg width="${svgWidth}" height="${H}" style="display:block;font-family:monospace;font-size:11px">`;

      const labels = ['CLK', 'D', 'Q'];
      const keys = ['clk', 'd', 'q'];
      const colors = ['#888', '#3498db', '#e67e22'];

      labels.forEach((label, ri) => {
        const y = topPad + ri * (rowH + 6);
        h += `<text x="0" y="${y + rowH / 2 + 4}" fill="${colors[ri]}" font-size="11">${label}</text>`;

        for (let i = 0; i < history.length; i++) {
          const x = 32 + i * stepW;
          const val = history[i][keys[ri]];
          const highY = y + 2;
          const lowY = y + rowH - 2;
          const curY = val ? highY : lowY;

          // Draw level
          h += `<line x1="${x}" y1="${curY}" x2="${x + stepW}" y2="${curY}" stroke="${colors[ri]}" stroke-width="2"/>`;

          // Draw transition from previous
          if (i > 0) {
            const prevVal = history[i - 1][keys[ri]];
            const prevY = prevVal ? highY : lowY;
            if (prevY !== curY) {
              h += `<line x1="${x}" y1="${prevY}" x2="${x}" y2="${curY}" stroke="${colors[ri]}" stroke-width="2"/>`;
            }
          }

          // Rising edge indicator for CLK
          if (ri === 0 && history[i].clk === 1 && (i === 0 || history[i - 1].clk === 0)) {
            h += `<line x1="${x}" y1="${y - 1}" x2="${x}" y2="${y + rowH + 1}" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>`;
          }
        }
      });

      h += '</svg>';
      h += '</div>';
    }

    h += '<div style="font-size:11px;color:#888;margin-top:6px">Toggle D freely, then click Rising Edge. Q only updates at the clock edge.</div>';

    container.innerHTML = h;

    container.querySelector('#ffToggleD').addEventListener('click', toggleD);
    container.querySelector('#ffClk').addEventListener('click', clockTick);
    container.querySelector('#ffReset').addEventListener('click', reset);
  }

  history = [{ clk: 0, d: 0, q: 0 }];
  render();
}

function fsmWidget(container) {
  // Sequence detector: detects "101" pattern (overlapping)
  // States: S0 (idle), S1 (seen 1), S10 (seen 10), S101 (detected!)
  const states = ['S0', 'S1', 'S10'];
  const stateLabels = {
    S0: 'Idle',
    S1: 'Seen "1"',
    S10: 'Seen "10"',
  };
  // Transition table: state -> { 0: nextState, 1: nextState }
  const transitions = {
    S0:  { 0: 'S0',  1: 'S1' },
    S1:  { 0: 'S10', 1: 'S1' },
    S10: { 0: 'S0',  1: 'S1' }, // S10 + 1 = detected "101", then back to S1 (overlap)
  };
  // Output: 1 when in S10 and input is 1 (Mealy)
  function getOutput(state, input) {
    return state === 'S10' && input === 1 ? 1 : 0;
  }

  let currentState = 'S0';
  let inputHistory = [];
  let stateHistory = ['S0'];
  let outputHistory = [];

  function feedInput(bit) {
    const out = getOutput(currentState, bit);
    currentState = transitions[currentState][bit];
    inputHistory.push(bit);
    stateHistory.push(currentState);
    outputHistory.push(out);
    render();
  }

  function reset() {
    currentState = 'S0';
    inputHistory = [];
    stateHistory = ['S0'];
    outputHistory = [];
    render();
  }

  function render() {
    let h = '<div class="widget-label">Try it \u2014 Sequence Detector FSM (detects "101")</div>';

    // State diagram — triangle layout to avoid overlapping arrows
    const circleR = 28;
    const svgW = Math.min(container.clientWidth - 20, 360);
    const svgH = 170;
    const positions = {
      S0: { x: 60, y: 50 },
      S1: { x: svgW - 60, y: 50 },
      S10: { x: svgW / 2, y: 140 },
    };

    h += `<svg width="${svgW}" height="${svgH}" style="display:block;margin-bottom:10px;font-family:sans-serif">`;

    // Arrow marker (define first so it's available)
    h += '<defs><marker id="fsmArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#888"/></marker></defs>';

    // Helper: draw arrow between two points with offset from circle edge
    function arrow(from, to, label, curveDir) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const nx = dx / dist;
      const ny = dy / dist;
      const sx = from.x + nx * circleR;
      const sy = from.y + ny * circleR;
      const ex = to.x - nx * circleR;
      const ey = to.y - ny * circleR;
      // Perpendicular offset for curve
      const px = -ny * (curveDir || 0);
      const py = nx * (curveDir || 0);
      const mx = (sx + ex) / 2 + px;
      const my = (sy + ey) / 2 + py;
      if (curveDir) {
        h += `<path d="M${sx},${sy} Q${mx},${my} ${ex},${ey}" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#fsmArrow)"/>`;
      } else {
        h += `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="#888" stroke-width="1.5" marker-end="url(#fsmArrow)"/>`;
      }
      // Label along the midpoint
      const lx = curveDir ? mx : (sx + ex) / 2;
      const ly = curveDir ? my : (sy + ey) / 2;
      const offX = -ny * 10;
      const offY = nx * 10;
      h += `<text x="${lx + offX}" y="${ly + offY}" text-anchor="middle" font-size="11" fill="#888">${label}</text>`;
    }

    // Transitions
    arrow(positions.S0, positions.S1, '1', 0);             // S0 --1--> S1 (top, straight)
    arrow(positions.S1, positions.S10, '0', 0);             // S1 --0--> S10 (right side down)
    arrow(positions.S10, positions.S1, '1 / detect', -20);  // S10 --1--> S1 (right side up, curved away)
    arrow(positions.S10, positions.S0, '0', 20);            // S10 --0--> S0 (left side up, curved away)

    // Self loops
    const selfLoops = [
      { state: 'S0', label: '0', side: 'left' },
      { state: 'S1', label: '1', side: 'right' },
    ];
    selfLoops.forEach(sl => {
      const p = positions[sl.state];
      const offX = sl.side === 'left' ? -1 : 1;
      const loopX = p.x + offX * (circleR + 4);
      const loopY = p.y - circleR - 4;
      h += `<path d="M${p.x + offX * 8},${loopY} C${loopX - 8},${loopY - 30} ${loopX + 16 * offX},${loopY - 20} ${p.x + offX * 12},${loopY}" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#fsmArrow)"/>`;
      h += `<text x="${loopX + offX * 6}" y="${loopY - 22}" text-anchor="middle" font-size="11" fill="#888">${sl.label}</text>`;
    });

    // Draw states (circles) — drawn last so they're on top
    states.forEach(s => {
      const p = positions[s];
      const isActive = currentState === s;
      const fill = isActive ? 'rgba(52,152,219,0.2)' : 'rgba(128,128,128,0.05)';
      const stroke = isActive ? '#3498db' : '#888';
      const strokeW = isActive ? 2.5 : 1.5;
      h += `<circle cx="${p.x}" cy="${p.y}" r="${circleR}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>`;
      h += `<text x="${p.x}" y="${p.y + 1}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="${isActive ? 700 : 400}" fill="${isActive ? '#3498db' : '#666'}">${s}</text>`;
      // Labels below for top states, above for bottom state
      const labelY = s === 'S10' ? p.y + circleR + 14 : p.y + circleR + 14;
      h += `<text x="${p.x}" y="${labelY}" text-anchor="middle" font-size="10" fill="#888">${stateLabels[s]}</text>`;
    });

    h += '</svg>';

    // Input buttons
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">';
    h += '<span style="font-size:12px;color:#888">Feed input:</span>';
    h += '<button class="btn-t" id="fsmIn0" style="font-family:monospace;font-weight:600">0</button>';
    h += '<button class="btn-t" id="fsmIn1" style="font-family:monospace;font-weight:600">1</button>';
    h += '<button class="btn-t" id="fsmReset" style="margin-left:auto">Reset</button>';
    h += '</div>';

    // History
    if (inputHistory.length > 0) {
      h += '<div style="font-size:13px;font-family:monospace;line-height:1.8">';
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">';
      h += '<span style="color:#888;font-size:11px;min-width:50px">Input:</span>';
      inputHistory.forEach((b, i) => {
        const detected = outputHistory[i] === 1;
        h += `<span style="display:inline-block;width:22px;text-align:center;${detected ? 'color:#27ae60;font-weight:700' : ''}">${b}</span>`;
      });
      h += '</div>';
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">';
      h += '<span style="color:#888;font-size:11px;min-width:50px">Output:</span>';
      outputHistory.forEach(o => {
        h += `<span style="display:inline-block;width:22px;text-align:center;${o ? 'color:#27ae60;font-weight:700' : 'color:#888'}">${o}</span>`;
      });
      h += '</div>';
      h += '</div>';

      const detections = outputHistory.filter(o => o === 1).length;
      if (detections > 0) {
        h += `<div style="margin-top:6px;font-size:12px;color:#27ae60;font-weight:600">"101" detected ${detections} time${detections > 1 ? 's' : ''}</div>`;
      }
    }

    container.innerHTML = h;

    container.querySelector('#fsmIn0').addEventListener('click', () => feedInput(0));
    container.querySelector('#fsmIn1').addEventListener('click', () => feedInput(1));
    container.querySelector('#fsmReset').addEventListener('click', reset);
  }

  render();
}

function pipelineHazardWidget(container) {
  // 5-stage pipeline: IF, ID, EX, MEM, WB
  const STAGES = ['IF', 'ID', 'EX', 'MEM', 'WB'];
  const presets = [
    {
      name: 'No hazard',
      instructions: [
        { text: 'ADD R1, R2, R3', writes: 'R1', reads: ['R2', 'R3'] },
        { text: 'SUB R4, R5, R6', writes: 'R4', reads: ['R5', 'R6'] },
        { text: 'AND R7, R8, R9', writes: 'R7', reads: ['R8', 'R9'] },
      ],
    },
    {
      name: 'RAW hazard',
      instructions: [
        { text: 'ADD R1, R2, R3', writes: 'R1', reads: ['R2', 'R3'] },
        { text: 'SUB R4, R1, R5', writes: 'R4', reads: ['R1', 'R5'] },
        { text: 'AND R7, R8, R9', writes: 'R7', reads: ['R8', 'R9'] },
      ],
    },
    {
      name: 'Load-use',
      instructions: [
        { text: 'LW  R1, 0(R2)', writes: 'R1', reads: ['R2'], isLoad: true },
        { text: 'ADD R3, R1, R4', writes: 'R3', reads: ['R1', 'R4'] },
        { text: 'SUB R5, R6, R7', writes: 'R5', reads: ['R6', 'R7'] },
      ],
    },
  ];

  let forwarding = true;
  let presetIdx = 1;

  function simulate() {
    const insts = presets[presetIdx].instructions;
    const cycles = [];
    const totalCycles = insts.length + STAGES.length + 2; // extra room for stalls
    const schedule = []; // For each instruction: array of {stage, cycle}
    const stalls = [];   // cycle indices where stalls occur
    const forwards = []; // {fromInst, toInst, fromStage, cycle}

    // Simple pipeline simulation
    let nextStart = 0;
    for (let i = 0; i < insts.length; i++) {
      let startCycle = nextStart;
      let stallCycles = 0;

      // Check for data hazards with previous instructions
      if (i > 0 && forwarding) {
        for (let prev = 0; prev < i; prev++) {
          const prevInst = insts[prev];
          const curInst = insts[i];
          if (curInst.reads.includes(prevInst.writes)) {
            const prevStart = schedule[prev][0].cycle;
            // With forwarding, result available after EX (cycle prevStart+2) or MEM for loads (prevStart+3)
            const availCycle = prevInst.isLoad ? prevStart + 3 : prevStart + 2;
            // Current inst needs it at EX (startCycle + 2)
            const needCycle = startCycle + 2;
            if (needCycle <= availCycle) {
              const needed = availCycle - needCycle + (prevInst.isLoad ? 0 : 0);
              if (prevInst.isLoad && needCycle <= availCycle) {
                stallCycles = Math.max(stallCycles, availCycle - needCycle);
              }
              if (!prevInst.isLoad) {
                // Can forward from EX output
                forwards.push({ fromInst: prev, toInst: i, label: 'FWD', cycle: availCycle });
              }
            }
          }
        }
      } else if (i > 0 && !forwarding) {
        for (let prev = 0; prev < i; prev++) {
          const prevInst = insts[prev];
          const curInst = insts[i];
          if (curInst.reads.includes(prevInst.writes)) {
            const prevStart = schedule[prev][0].cycle;
            // Without forwarding, result available after WB (prevStart + 4)
            const availCycle = prevStart + 4;
            const needCycle = startCycle + 1; // Need at ID
            if (needCycle < availCycle) {
              stallCycles = Math.max(stallCycles, availCycle - needCycle);
            }
          }
        }
      }

      startCycle += stallCycles;
      for (let s = 0; s < stallCycles; s++) stalls.push(nextStart + s);

      const stages = STAGES.map((stage, si) => ({ stage, cycle: startCycle + si }));
      schedule.push(stages);
      nextStart = startCycle + 1;
    }

    return { schedule, stalls, forwards, insts };
  }

  function render() {
    const { schedule, stalls, forwards, insts } = simulate();
    const totalCycles = schedule.length > 0 ? schedule[schedule.length - 1][STAGES.length - 1].cycle + 1 : 5;

    let h = '<div class="widget-label">Try it \u2014 Pipeline Hazards</div>';

    // Controls
    h += '<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">';
    presets.forEach((p, i) => {
      h += `<button class="btn-t ph-preset ${presetIdx === i ? 'on' : ''}" data-i="${i}">${p.name}</button>`;
    });
    h += `<label style="margin-left:auto;font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="phFwd" ${forwarding ? 'checked' : ''}> Forwarding</label>`;
    h += '</div>';

    // Pipeline diagram
    const cellW = 44;
    const cellH = 28;
    const labelW = 140;
    const svgW = labelW + totalCycles * cellW + 10;
    const svgH = insts.length * (cellH + 4) + 30;

    h += `<div style="overflow-x:auto"><svg width="${svgW}" height="${svgH}" style="display:block;font-family:monospace;font-size:11px">`;

    // Cycle headers
    for (let c = 0; c < totalCycles; c++) {
      h += `<text x="${labelW + c * cellW + cellW / 2}" y="12" text-anchor="middle" fill="#888" font-size="10">C${c + 1}</text>`;
    }

    const stageColors = {
      IF: 'rgba(52,152,219,0.18)', ID: 'rgba(46,204,113,0.18)',
      EX: 'rgba(231,76,60,0.18)', MEM: 'rgba(243,156,18,0.18)',
      WB: 'rgba(155,89,182,0.18)',
    };

    schedule.forEach((stages, i) => {
      const y = 20 + i * (cellH + 4);
      // Instruction label
      h += `<text x="2" y="${y + cellH / 2 + 4}" fill="#ccc" font-size="11">${insts[i].text}</text>`;

      // Stall bubbles
      if (i > 0) {
        const prevEnd = schedule[i - 1][0].cycle;
        const curStart = stages[0].cycle;
        for (let c = prevEnd + 1; c < curStart; c++) {
          const x = labelW + c * cellW;
          h += `<rect x="${x + 1}" y="${y}" width="${cellW - 2}" height="${cellH}" rx="4" fill="rgba(231,76,60,0.1)" stroke="rgba(231,76,60,0.3)" stroke-width="1"/>`;
          h += `<text x="${x + cellW / 2}" y="${y + cellH / 2 + 4}" text-anchor="middle" fill="#e74c3c" font-size="10">stall</text>`;
        }
      }

      stages.forEach(({ stage, cycle }) => {
        const x = labelW + cycle * cellW;
        const isHazardStage = forwards.some(f => f.toInst === i && stage === 'EX');
        const strokeColor = isHazardStage ? '#27ae60' : 'transparent';
        h += `<rect x="${x + 1}" y="${y}" width="${cellW - 2}" height="${cellH}" rx="4" fill="${stageColors[stage]}" stroke="${strokeColor}" stroke-width="${isHazardStage ? 2 : 0}"/>`;
        h += `<text x="${x + cellW / 2}" y="${y + cellH / 2 + 4}" text-anchor="middle" fill="#ccc" font-size="11" font-weight="600">${stage}</text>`;
      });
    });

    // Forward arrows
    forwards.forEach(f => {
      const fromY = 20 + f.fromInst * (cellH + 4) + cellH;
      const toY = 20 + f.toInst * (cellH + 4);
      const x = labelW + f.cycle * cellW + cellW / 2;
      h += `<line x1="${x}" y1="${fromY}" x2="${x}" y2="${toY}" stroke="#27ae60" stroke-width="2" marker-end="url(#phArrow)"/>`;
      h += `<text x="${x + 6}" y="${(fromY + toY) / 2 + 3}" fill="#27ae60" font-size="9">FWD</text>`;
    });

    h += '<defs><marker id="phArrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#27ae60"/></marker></defs>';

    h += '</svg></div>';

    // Summary
    const totalClocks = schedule[schedule.length - 1][STAGES.length - 1].cycle + 1;
    const idealClocks = insts.length + STAGES.length - 1;
    const stallCount = totalClocks - idealClocks;
    h += '<div style="font-size:12px;color:#888;margin-top:6px">';
    h += `Total: ${totalClocks} cycles (ideal: ${idealClocks}${stallCount > 0 ? `, <span style="color:#e74c3c">${stallCount} stall${stallCount > 1 ? 's' : ''}</span>` : ', no stalls'})`;
    if (forwards.length > 0) h += ` \u2014 <span style="color:#27ae60">${forwards.length} forward${forwards.length > 1 ? 's' : ''}</span>`;
    h += '</div>';

    container.innerHTML = h;

    container.querySelectorAll('.ph-preset').forEach(btn => {
      btn.addEventListener('click', () => { presetIdx = parseInt(btn.dataset.i); render(); });
    });
    container.querySelector('#phFwd').addEventListener('change', (e) => { forwarding = e.target.checked; render(); });
  }

  render();
}

function endiannessWidget(container) {
  let hexVal = '44332211';
  let bits = 32;

  function getBytes() {
    const val = parseInt(hexVal, 16) || 0;
    const numBytes = bits / 8;
    const bytes = [];
    for (let i = numBytes - 1; i >= 0; i--) {
      bytes.push((val >>> (i * 8)) & 0xFF);
    }
    return bytes;
  }

  function renderBytes() {
    const bytes = getBytes();
    const beContainer = container.querySelector('#enBE');
    const leContainer = container.querySelector('#enLE');
    if (!beContainer || !leContainer) return;

    let beH = '';
    bytes.forEach((b, i) => {
      const isMSB = i === 0;
      const isLSB = i === bytes.length - 1;
      const bg = isMSB ? 'rgba(52,152,219,0.15)' : isLSB ? 'rgba(231,126,34,0.15)' : 'rgba(128,128,128,0.06)';
      beH += `<div style="text-align:center;flex:1;border:1px solid rgba(128,128,128,0.2);border-radius:4px;padding:6px 4px;background:${bg};font-family:monospace">`;
      beH += `<div style="font-size:10px;color:#888">0x${i.toString(16).padStart(2, '0')}</div>`;
      beH += `<div style="font-size:14px;font-weight:600">0x${b.toString(16).toUpperCase().padStart(2, '0')}</div>`;
      beH += '</div>';
    });
    beContainer.innerHTML = beH;

    let leH = '';
    const leBytes = [...bytes].reverse();
    leBytes.forEach((b, i) => {
      const isMSB = b === bytes[0];
      const isLSB = b === bytes[bytes.length - 1];
      const bg = isLSB ? 'rgba(231,126,34,0.15)' : isMSB ? 'rgba(52,152,219,0.15)' : 'rgba(128,128,128,0.06)';
      leH += `<div style="text-align:center;flex:1;border:1px solid rgba(128,128,128,0.2);border-radius:4px;padding:6px 4px;background:${bg};font-family:monospace">`;
      leH += `<div style="font-size:10px;color:#888">0x${i.toString(16).padStart(2, '0')}</div>`;
      leH += `<div style="font-size:14px;font-weight:600">0x${b.toString(16).toUpperCase().padStart(2, '0')}</div>`;
      leH += '</div>';
    });
    leContainer.innerHTML = leH;
  }

  function render() {
    let h = '<div class="widget-label">Try it \u2014 Endianness</div>';

    // Input
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">';
    h += '<span style="font-size:12px;color:#888">Width:</span>';
    for (const b of [16, 32]) {
      h += `<button class="btn-t en-bits ${bits === b ? 'on' : ''}" data-b="${b}">${b}-bit</button>`;
    }
    h += `<label style="font-size:12px;display:flex;align-items:center;gap:4px">0x<input id="enHex" type="text" value="${hexVal}" maxlength="${bits / 4}" style="width:${bits / 4 + 1}ch;font-family:monospace;font-size:14px;padding:3px 6px;border-radius:4px;border:1px solid #ccc;background:inherit;color:inherit"></label>`;
    h += '</div>';

    // Big-endian
    h += '<div style="font-size:12px;font-weight:600;margin-bottom:4px">Big-Endian <span style="font-weight:400;color:#888">(MSB first)</span></div>';
    h += '<div id="enBE" style="display:flex;gap:2px;margin-bottom:12px"></div>';

    // Little-endian
    h += '<div style="font-size:12px;font-weight:600;margin-bottom:4px">Little-Endian <span style="font-weight:400;color:#888">(LSB first)</span></div>';
    h += '<div id="enLE" style="display:flex;gap:2px;margin-bottom:8px"></div>';

    h += '<div style="font-size:11px;color:#888"><span style="color:#3498db">\u25a0</span> MSB &nbsp; <span style="color:#e67e22">\u25a0</span> LSB &nbsp; Address increases left to right</div>';

    container.innerHTML = h;
    renderBytes();

    container.querySelector('#enHex').addEventListener('input', (e) => {
      hexVal = e.target.value.replace(/[^0-9a-fA-F]/g, '').slice(0, bits / 4);
      renderBytes();
    });
    container.querySelectorAll('.en-bits').forEach(btn => {
      btn.addEventListener('click', () => {
        bits = parseInt(btn.dataset.b);
        hexVal = hexVal.slice(0, bits / 4).padStart(bits / 4, '0');
        render();
      });
    });
  }

  render();
}

function replacementPolicyWidget(container) {
  const WAYS = 4;
  const ADDRESSES = [0, 2, 4, 6, 0, 8, 2, 6, 10, 4, 0, 8, 2, 10, 6, 0]; // 6 unique addrs in 4-way cache — evictions from step 5, policies diverge
  let policy = 'lru';
  let step = 0;

  function simulate(pol, maxStep) {
    const cache = []; // array of {addr, age, insertOrder}
    let hits = 0;
    let misses = 0;
    const log = [];
    let insertCounter = 0;
    // Simple LFSR-style for deterministic "random"
    let lfsr = 7;
    function nextRand() { lfsr = ((lfsr >> 1) | ((lfsr ^ (lfsr >> 1)) << 3)) & 0xF; return lfsr % WAYS; }

    for (let i = 0; i < maxStep; i++) {
      const addr = ADDRESSES[i];
      const hitIdx = cache.findIndex(c => c.addr === addr);

      if (hitIdx >= 0) {
        hits++;
        // Update LRU age
        if (pol === 'lru') {
          const hitAge = cache[hitIdx].age;
          cache.forEach(c => { if (c.age < hitAge) c.age++; });
          cache[hitIdx].age = 0;
        }
        log.push({ addr, hit: true, evicted: null });
      } else {
        misses++;
        let evicted = null;
        if (cache.length < WAYS) {
          cache.push({ addr, age: 0, insertOrder: insertCounter++ });
          // Age others for LRU
          cache.forEach((c, ci) => { if (ci < cache.length - 1) c.age++; });
        } else {
          let victimIdx;
          if (pol === 'lru') {
            victimIdx = cache.reduce((max, c, ci) => c.age > cache[max].age ? ci : max, 0);
          } else if (pol === 'fifo') {
            victimIdx = cache.reduce((min, c, ci) => c.insertOrder < cache[min].insertOrder ? ci : min, 0);
          } else {
            victimIdx = nextRand();
          }
          evicted = cache[victimIdx].addr;
          cache.forEach(c => { if (pol === 'lru') c.age++; });
          cache[victimIdx] = { addr, age: 0, insertOrder: insertCounter++ };
        }
        log.push({ addr, hit: false, evicted });
      }
    }

    return { cache: [...cache], hits, misses, log };
  }

  function render() {
    const maxStep = Math.min(step, ADDRESSES.length);
    const result = simulate(policy, maxStep);

    let h = '<div class="widget-label">Try it \u2014 Replacement Policies</div>';

    // Policy toggle
    h += '<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">';
    for (const [key, label] of [['lru', 'LRU'], ['fifo', 'FIFO'], ['random', 'Random']]) {
      h += `<button class="btn-t rp-pol ${policy === key ? 'on' : ''}" data-p="${key}">${label}</button>`;
    }
    h += `<span style="margin-left:auto;font-size:12px;color:#888">Hits: <strong style="color:#27ae60">${result.hits}</strong> Misses: <strong style="color:#e74c3c">${result.misses}</strong></span>`;
    h += '</div>';

    // Access sequence with current position
    h += '<div style="font-size:12px;color:#888;margin-bottom:4px">Access sequence:</div>';
    h += '<div style="display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap">';
    ADDRESSES.forEach((addr, i) => {
      let bg = 'rgba(128,128,128,0.06)';
      let color = '#888';
      let fw = '400';
      if (i < maxStep) {
        bg = result.log[i].hit ? 'rgba(39,174,96,0.15)' : 'rgba(231,76,60,0.15)';
        color = result.log[i].hit ? '#27ae60' : '#e74c3c';
        fw = '600';
      }
      if (i === maxStep) {
        bg = 'rgba(52,152,219,0.2)';
        color = '#3498db';
        fw = '700';
      }
      h += `<span style="display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:4px;background:${bg};color:${color};font-weight:${fw};font-family:monospace;font-size:13px">${addr}</span>`;
    });
    h += '</div>';

    // Cache state
    h += '<div style="font-size:12px;font-weight:600;margin-bottom:4px">Cache (' + WAYS + '-way set):</div>';
    h += '<div style="display:flex;gap:4px;margin-bottom:10px">';
    for (let i = 0; i < WAYS; i++) {
      const line = result.cache[i];
      const bg = line ? 'rgba(128,128,128,0.08)' : 'transparent';
      h += `<div style="flex:1;text-align:center;padding:8px 4px;border:1px solid rgba(128,128,128,0.2);border-radius:4px;font-family:monospace;background:${bg}">`;
      h += line ? `<span style="font-weight:600">${line.addr}</span>` : '<span style="color:#888">\u2014</span>';
      h += '</div>';
    }
    h += '</div>';

    // Step controls
    h += '<div style="display:flex;gap:8px;align-items:center">';
    h += `<button class="btn-t" id="rpPrev" ${step <= 0 ? 'disabled' : ''}>\u2190 Prev</button>`;
    h += `<button class="btn-t" id="rpNext" ${step >= ADDRESSES.length ? 'disabled' : ''}>Next \u2192</button>`;
    h += '<button class="btn-t" id="rpReset">Reset</button>';
    h += `<span style="font-size:12px;color:#888;margin-left:auto">Step ${maxStep}/${ADDRESSES.length}</span>`;
    h += '</div>';

    // Log
    if (result.log.length > 0) {
      const last = result.log[result.log.length - 1];
      h += '<div style="margin-top:8px;font-size:12px;line-height:1.6;padding:6px 8px;border:1px solid rgba(128,128,128,0.2);border-radius:6px">';
      if (last.hit) {
        h += `<span style="color:#27ae60">HIT</span> \u2014 Address ${last.addr} found in cache.`;
      } else {
        h += `<span style="color:#e74c3c">MISS</span> \u2014 Address ${last.addr} loaded.`;
        if (last.evicted !== null) h += ` Evicted address ${last.evicted}.`;
      }
      h += '</div>';
    }

    container.innerHTML = h;

    container.querySelectorAll('.rp-pol').forEach(btn => {
      btn.addEventListener('click', () => { policy = btn.dataset.p; step = 0; render(); });
    });
    container.querySelector('#rpPrev').addEventListener('click', () => { if (step > 0) { step--; render(); } });
    container.querySelector('#rpNext').addEventListener('click', () => { if (step < ADDRESSES.length) { step++; render(); } });
    container.querySelector('#rpReset').addEventListener('click', () => { step = 0; render(); });
  }

  render();
}

/* ═══════════════════════ Rendering ═══════════════════════ */

const TYPE_LABELS = { tool: 'Tool Topic', concept: 'Concept', breakdown: 'Breakdown' };
const TYPE_CLASSES = { tool: 'tag-tool', concept: 'tag-concept', breakdown: 'tag-breakdown' };

function topicById(id) {
  return TOPICS.find(t => t.id === id);
}

function renderLanding(categoryFilter) {
  const content = document.getElementById('content');
  let html = '';

  // Filter bar
  const cats = Object.entries(CATEGORIES).sort((a, b) => a[1].order - b[1].order);
  html += '<div class="filter-bar">';
  html += `<button class="filter-btn ${!categoryFilter ? 'on' : ''}" data-filter="">All</button>`;
  for (const [key, cat] of cats) {
    html += `<button class="filter-btn ${categoryFilter === key ? 'on' : ''}" data-filter="${key}">${cat.name}</button>`;
  }
  html += '</div>';

  // Categories
  for (const [key, cat] of cats) {
    if (categoryFilter && categoryFilter !== key) continue;
    const catTopics = TOPICS.filter(t => t.category === key).sort((a, b) => a.order - b.order);
    if (catTopics.length === 0) continue;

    html += '<div class="section">';
    html += `<h2 class="cat-header">${cat.name}</h2>`;
    if (cat.intro) html += `<p class="cat-intro">${cat.intro}</p>`;

    html += '<div class="card-grid">';
    for (const topic of catTopics) {
      html += `<a class="topic-card" href="#${topic.id}">`;
      html += `<div class="card-title">${topic.title}</div>`;
      html += `<div class="card-desc">${topic.shortDescription}</div>`;
      html += '<div class="card-meta">';
      html += `<span class="tag ${TYPE_CLASSES[topic.type]}">${TYPE_LABELS[topic.type]}</span>`;
      if (topic.tool) {
        html += `<span class="tag tag-tool">${topic.tool}</span>`;
      }
      html += '</div>';
      html += '</a>';
    }
    html += '</div>';
    html += '</div>';
  }

  content.innerHTML = html;

  // Wire filter buttons
  content.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter || null;
      renderLanding(f);
    });
  });
}

function renderTopic(id) {
  const topic = topicById(id);
  if (!topic) {
    renderLanding();
    return;
  }

  const content = document.getElementById('content');
  const c = topic.content;
  let html = '';

  // Back link
  html += '<a href="#" class="back-btn">&larr; All topics</a>';

  html += '<div class="section">';

  // Title + meta
  html += `<h2 class="topic-title">${topic.title}</h2>`;
  html += '<div class="topic-meta">';
  html += `<span class="tag ${TYPE_CLASSES[topic.type]}">${TYPE_LABELS[topic.type]}</span>`;
  if (topic.tool) html += `<span class="tag tag-tool">${topic.tool}</span>`;
  const cat = CATEGORIES[topic.category];
  if (cat) html += `<span>${cat.name}</span>`;
  html += '</div>';

  // Problem
  if (c.problem) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Problem</div>';
    html += `<div class="topic-section-body">${c.problem}</div>`;
    html += '</div>';
  }

  // How It Works
  if (c.howItWorks) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">How It Works</div>';
    html += `<div class="topic-section-body">${c.howItWorks}</div>`;
    html += '</div>';
  }

  // Key Insight
  if (c.keyInsight) {
    html += `<div class="insight-box">\u{1F4A1} <strong>Key insight:</strong> ${c.keyInsight}</div>`;
  }

  // Interactive widget placeholder
  if (topic.interactive) {
    html += '<div class="widget-container" id="widgetMount"></div>';
  }

  // Context (concepts)
  if (c.context) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Context</div>';
    html += `<div class="topic-section-body">${c.context}</div>`;
    html += '</div>';
  }

  // Structure (breakdowns)
  if (c.structure) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Architecture</div>';
    html += `<div class="topic-section-body">${c.structure}</div>`;
    html += '</div>';
  }

  // Sections (breakdowns with multiple parts)
  if (c.sections) {
    for (const sec of c.sections) {
      html += '<div class="topic-section">';
      html += `<div class="topic-section-label">${sec.heading}</div>`;
      html += `<div class="topic-section-body">${sec.body}</div>`;
      html += '</div>';
    }
  }

  // Tradeoffs
  if (c.tradeoffs) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Tradeoffs</div>';
    html += '<div class="tradeoffs-grid">';
    for (const [k, v] of Object.entries(c.tradeoffs)) {
      if (k === 'bestWhen') continue;
      html += `<div class="tradeoff-key">${k}</div>`;
      html += `<div class="tradeoff-val">${v}</div>`;
    }
    if (c.tradeoffs.bestWhen) {
      html += `<div class="tradeoff-best"><strong>Best when:</strong> ${c.tradeoffs.bestWhen}</div>`;
    }
    html += '</div>';
    html += '</div>';
  }

  // Action buttons
  const hasActions = topic.tryItLink || topic.sourceUrl;
  if (hasActions) {
    html += '<div class="action-row">';
    if (topic.tryItLink) {
      html += `<a class="action-btn" href="${topic.tryItLink}">Try it \u2192</a>`;
    }
    if (topic.sourceUrl) {
      html += `<a class="action-btn action-btn-secondary" href="${topic.sourceUrl}" target="_blank">View source \u2192</a>`;
    }
    html += '</div>';
  }

  // Related topics
  if (topic.relatedTopics && topic.relatedTopics.length > 0) {
    html += '<div class="related-section">';
    html += '<div class="related-label">Related</div>';
    html += '<div class="related-list">';
    for (const rid of topic.relatedTopics) {
      const rel = topicById(rid);
      if (rel) {
        html += `<a class="related-link" href="#${rel.id}">${rel.title}</a>`;
      }
    }
    html += '</div>';
    html += '</div>';
  }

  // Feedback
  html += '<div class="feedback-box" id="feedbackMount"></div>';

  html += '</div>'; // close .section

  content.innerHTML = html;

  // Mount interactive widget
  if (topic.interactive) {
    const mount = document.getElementById('widgetMount');
    if (mount) topic.interactive(mount);
  }

  // Mount feedback widget
  mountFeedback(topic.id);

  // Scroll to top
  window.scrollTo(0, 0);
}

/* ═══════════════════════ Router ═══════════════════════ */

function route() {
  const hash = location.hash.slice(1);
  if (!hash) {
    renderLanding();
  } else if (hash.startsWith('category/')) {
    renderLanding(hash.slice(9));
  } else {
    renderTopic(hash);
  }
}

window.addEventListener('hashchange', route);
document.addEventListener('DOMContentLoaded', route);
</script>
