<script>
/* ═══════════════════════ Theme ═══════════════════════ */

function toggleTheme() {
  const body = document.body;
  const themeText = document.getElementById('theme-text');
  if (body.classList.contains('dark')) {
    body.classList.remove('dark');
    themeText.innerHTML = '&#9790;';
    localStorage.setItem('theme', 'light');
  } else {
    body.classList.add('dark');
    themeText.innerHTML = '&#9788;';
    localStorage.setItem('theme', 'dark');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const themeText = document.getElementById('theme-text');
  if (document.body.classList.contains('dark')) {
    themeText.innerHTML = '&#9788;';
  }
});

/* ═══════════════════════ Content Definitions ═══════════════════════ */

/*
 * HOW TO ADD A NEW TOPIC:
 * 1. Add an entry to the TOPICS array below following the schema.
 * 2. If it belongs to a new category, add the category to CATEGORIES first.
 * 3. Set `type` to "tool", "concept", or "breakdown".
 * 4. Fill in whichever `content` fields fit the topic — the renderer adapts.
 * 5. Optionally add an `interactive` function (receives a container DOM element).
 * 6. That's it. No other code changes needed.
 */

const CATEGORIES = {
  foundations: {
    name: 'Building Blocks',
    order: 0,
    intro: 'The fundamental components and conventions used throughout these topics. Start here if terms like "full adder", "gate delay", or "FA-eq" are unfamiliar.',
  },
  timing: {

function boothWidget(container) {
  let bits = 8;
  let val = 11;

  function encode(v, n) {
    const digits = [];
    for (let i = 0; i < n; i++) {
      const prev = i === 0 ? 0 : (v >>> (i - 1)) & 1;
      const curr = (v >>> i) & 1;
      digits.push(prev - curr);
    }
    return digits;
  }

  function render() {
    const clamped = val & ((1 << bits) - 1);
    const digits = encode(clamped, bits);

    let html = '<div class="widget-label">Try it \u2014 Booth Encoding</div>';
    html += '<div class="booth-input-row">';
    html += '<select class="booth-input" style="width:60px;" id="boothBits">';
    for (const b of [4, 8]) {
      html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
    }
    html += '</select>';
    html += `<input class="booth-input" id="boothVal" value="${val}" placeholder="integer" type="number">`;
    html += '</div>';

    // Binary
    html += '<div style="margin-bottom:6px;font-size:12px;color:#767676;">Binary:</div>';
    html += '<div class="booth-bits">';
    for (let i = bits - 1; i >= 0; i--) {
      html += `<div class="booth-bit" style="background:rgba(0,0,0,0.04);border:1px solid #ddd;">${(clamped >>> i) & 1}</div>`;
    }
    html += '</div>';
    html += '<div class="booth-bits" style="margin-bottom:8px;">';
    for (let i = bits - 1; i >= 0; i--) {
      html += `<div class="booth-bit-label">b${i}</div>`;
    }
    html += '</div>';

    // Booth encoding
    html += '<div style="margin-bottom:6px;font-size:12px;color:#767676;">Booth encoding (d[i] = b[i\u22121] \u2212 b[i]):</div>';
    html += '<div class="booth-bits">';
    for (let i = bits - 1; i >= 0; i--) {
      const d = digits[i];
      const cls = d === 1 ? 'booth-pos' : d === -1 ? 'booth-neg' : 'booth-zero';
      const label = d === 1 ? '+1' : d === -1 ? '\u22121' : ' 0';
      html += `<div class="booth-bit ${cls}" style="font-size:11px;">${label}</div>`;
    }
    html += '</div>';
    html += '<div class="booth-bits" style="margin-bottom:10px;">';
    for (let i = bits - 1; i >= 0; i--) {
      html += `<div class="booth-bit-label">d${i}</div>`;
    }
    html += '</div>';

    // Operations
    html += '<div class="booth-result-row">';
    const ops = digits.map((d, i) => {
      if (d === 1) return `<span class="booth-pos">+A\u00AB${i}</span>`;
      if (d === -1) return `<span class="booth-neg">\u2212A\u00AB${i}</span>`;
      return null;
    }).filter(Boolean);
    if (ops.length === 0) html += 'All digits zero \u2014 result is 0.';
    else html += 'Operations: ' + ops.join(' ');
    html += '</div>';

    container.innerHTML = html;

    // Wire events
    container.querySelector('#boothBits').addEventListener('change', e => {
      bits = parseInt(e.target.value);
      render();
    });
    container.querySelector('#boothVal').addEventListener('input', e => {
      val = parseInt(e.target.value) || 0;
      render();
    });
  }

  render();
}

function overflowWidget(container) {
  let bits = 8;
  let valA = 100;
  let valB = 50;

  function toSigned(v, n) {
    v = v & ((1 << n) - 1);
    if (v >= (1 << (n - 1))) v -= (1 << n);
    return v;
  }

  function render() {
    const mask = (1 << bits) - 1;
    const a = valA & mask;
    const b = valB & mask;
    const sum = (a + b) & mask;
    const signedA = toSigned(a, bits);
    const signedB = toSigned(b, bits);
    const signedSum = toSigned(sum, bits);
    const trueSum = signedA + signedB;
    const overflow = trueSum !== signedSum;

    // Carry into MSB and carry out of MSB
    const msbMask = 1 << (bits - 1);
    const lowerMask = msbMask - 1;
    const lowerSum = (a & lowerMask) + (b & lowerMask);
    const cIn = (lowerSum >> (bits - 1)) & 1;
    const fullSum = a + b;
    const cOut = (fullSum >> bits) & 1;

    let html = '<div class="widget-label">Try it \u2014 Overflow Detection</div>';
    html += '<div class="overflow-row">';
    html += `<select class="overflow-input" style="width:60px;" id="ovBits">`;
    for (const b of [4, 8]) {
      html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
    }
    html += '</select>';
    html += `<span style="font-size:12px;">A:</span><input class="overflow-input" id="ovA" value="${valA}" type="number">`;
    html += `<span style="font-size:12px;">B:</span><input class="overflow-input" id="ovB" value="${valB}" type="number">`;
    html += '</div>';

    function renderBits(val, label) {
      let h = `<div style="font-size:12px;color:#767676;margin-bottom:2px;">${label} (signed: ${toSigned(val, bits)}):</div>`;
      h += '<div class="overflow-bits">';
      for (let i = bits - 1; i >= 0; i--) {
        const cls = i === bits - 1 ? ' sign' : '';
        h += `<div class="overflow-bit${cls}">${(val >>> i) & 1}</div>`;
      }
      h += '</div>';
      return h;
    }

    html += renderBits(a, 'A');
    html += renderBits(b, 'B');
    html += '<div style="border-top:1px solid #ddd;margin:6px 0;"></div>';
    html += renderBits(sum, 'A + B');

    html += '<div class="overflow-result">';
    html += `C<sub>in</sub>[MSB] = ${cIn}, C<sub>out</sub>[MSB] = ${cOut}, XOR = ${cIn ^ cOut}<br>`;
    if (overflow) {
      html += `<span class="overflow-bad">Overflow! True result ${trueSum} doesn\u2019t fit in ${bits} bits (range ${-(1<<(bits-1))} to ${(1<<(bits-1))-1}).</span>`;
    } else {
      html += `<span class="overflow-ok">No overflow. Result ${signedSum} is correct.</span>`;
    }
    html += '</div>';

    container.innerHTML = html;

    container.querySelector('#ovBits').addEventListener('change', e => { bits = parseInt(e.target.value); render(); });
    container.querySelector('#ovA').addEventListener('input', e => { valA = parseInt(e.target.value) || 0; render(); });
    container.querySelector('#ovB').addEventListener('input', e => { valB = parseInt(e.target.value) || 0; render(); });
  }
  render();
}

function fixedPointWidget(container) {
  let decimal = 3.75;
  let intBits = 4;
  let fracBits = 4;

  function render() {
    const totalBits = intBits + fracBits;
    const scale = 1 << fracBits;
    const maxVal = (1 << (totalBits - 1)) - 1;
    const minVal = -(1 << (totalBits - 1));
    const maxDecimal = maxVal / scale;
    const minDecimal = minVal / scale;

    // Clamp and quantize
    let clamped = Math.max(minDecimal, Math.min(maxDecimal, decimal));
    let raw = Math.round(clamped * scale);
    if (raw > maxVal) raw = maxVal;
    if (raw < minVal) raw = minVal;
    const actual = raw / scale;

    // Convert to unsigned representation for bit display
    const unsigned = raw < 0 ? raw + (1 << totalBits) : raw;

    let html = '<div class="widget-label">Try it \u2014 Fixed-Point Converter</div>';
    html += '<div class="fp-row">';
    html += `<input class="fp-input" id="fpVal" value="${decimal}" placeholder="decimal" type="text" style="width:100px;">`;
    html += `<select class="fp-select" id="fpFmt">`;
    for (const [m, f] of [[4,4],[8,8],[4,12],[12,4]]) {
      const sel = m === intBits && f === fracBits ? 'selected' : '';
      html += `<option value="${m},${f}" ${sel}>Q${m}.${f} (${m+f}-bit)</option>`;
    }
    html += '</select>';
    html += '</div>';

    // Bit display with radix point
    html += '<div class="fp-bits">';
    for (let i = totalBits - 1; i >= 0; i--) {
      const bit = (unsigned >>> i) & 1;
      const cls = i >= fracBits ? 'int-part' : 'frac-part';
      html += `<div class="fp-bit ${cls}">${bit}</div>`;
      if (i === fracBits) html += '<span class="fp-radix">.</span>';
    }
    html += '</div>';

    html += '<div class="fp-info">';
    html += `<strong>Q${intBits}.${fracBits}</strong> \u2014 ${intBits} integer bits, ${fracBits} fractional bits (${totalBits} bits total)<br>`;
    html += `Stored integer: ${raw} \u2192 value: ${raw} / 2<sup>${fracBits}</sup> = <strong>${actual}</strong>`;
    if (actual !== clamped || actual !== decimal) html += ` (input ${decimal} quantized)`;
    html += `<br>Range: [${minDecimal}, ${maxDecimal}], resolution: ${(1/scale).toFixed(fracBits <= 8 ? fracBits : 8)}`;
    html += '</div>';

    container.innerHTML = html;

    container.querySelector('#fpVal').addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      if (!isNaN(v)) { decimal = v; render(); }
    });
    container.querySelector('#fpFmt').addEventListener('change', e => {
      const [m, f] = e.target.value.split(',').map(Number);
      intBits = m; fracBits = f; render();
    });
  }
  render();
}

function barrelShifterWidget(container) {
  const n = 8;
  let shift = 5;

  function render() {
    const stages = Math.ceil(Math.log2(n));
    let html = '<div class="widget-label">Barrel Shifter \u2014 8-bit, 3 stages</div>';
    html += '<div class="barrel-diagram">';

    // Input row
    html += '<div class="barrel-stage"><div class="barrel-label">Input</div><div class="barrel-muxes">';
    for (let i = n - 1; i >= 0; i--) html += `<div class="barrel-mux pass">d${i}</div>`;
    html += '</div></div>';

    // Each stage
    let current = [];
    for (let i = 0; i < n; i++) current[i] = i;

    for (let s = 0; s < stages; s++) {
      const shiftAmt = 1 << s;
      const active = (shift >> s) & 1;
      const next = [];

      html += `<div class="barrel-stage"><div class="barrel-label">Stage ${s}<br>shift ${shiftAmt}${active ? ' \u2713' : ''}</div><div class="barrel-muxes">`;
      for (let i = n - 1; i >= 0; i--) {
        if (active && i - shiftAmt >= 0) {
          next[i] = current[i - shiftAmt];
          html += `<div class="barrel-mux">d${next[i]}</div>`;
        } else if (active && i - shiftAmt < 0) {
          next[i] = -1;
          html += '<div class="barrel-mux">0</div>';
        } else {
          next[i] = current[i];
          html += `<div class="barrel-mux pass">d${next[i]}</div>`;
        }
      }
      html += '</div></div>';
      current = next;
    }

    // Output row
    html += '<div class="barrel-stage"><div class="barrel-label">Output</div><div class="barrel-muxes">';
    for (let i = n - 1; i >= 0; i--) {
      const v = current[i] < 0 ? '0' : 'd' + current[i];
      html += `<div class="barrel-mux">${v}</div>`;
    }
    html += '</div></div>';
    html += '</div>';

    html += '<div class="barrel-note">';
    html += `Shift amount: <input class="overflow-input" id="barrelShift" type="number" min="0" max="${n-1}" value="${shift}" style="width:50px;"> `;
    html += `= ${shift.toString(2).padStart(stages, '0')}<sub>2</sub>`;
    html += `<br>Each stage: if control bit is 1, shift by 2<sup>k</sup>; if 0, pass through. Active stages highlighted.`;
    html += '</div>';

    container.innerHTML = html;

    container.querySelector('#barrelShift').addEventListener('input', e => {
      const v = parseInt(e.target.value);
      if (!isNaN(v) && v >= 0 && v < n) { shift = v; render(); }
    });
  }
  render();
}

function ieeeWidget(container) {
  let inputStr = '3.14';

  function render() {
    const val = parseFloat(inputStr);
    let html = '<div class="widget-label">Try it \u2014 IEEE 754 Single Precision</div>';
    html += '<div class="ieee-row">';
    html += `<input class="ieee-input" id="ieeeVal" value="${inputStr}" placeholder="decimal number" type="text">`;
    html += '</div>';

    if (isNaN(val) && inputStr.toLowerCase() !== 'nan') {
      html += '<div class="ieee-info">Enter a number, "Infinity", "-Infinity", or "NaN".</div>';
      container.innerHTML = html;
      container.querySelector('#ieeeVal').addEventListener('input', e => { inputStr = e.target.value; render(); });
      return;
    }

    // Get the IEEE 754 bits via DataView
    const buf = new ArrayBuffer(4);
    const dv = new DataView(buf);
    if (inputStr.toLowerCase() === 'nan') dv.setFloat32(0, NaN);
    else dv.setFloat32(0, val);
    const bits32 = dv.getUint32(0);

    const sign = (bits32 >>> 31) & 1;
    const exp = (bits32 >>> 23) & 0xFF;
    const mant = bits32 & 0x7FFFFF;

    // Field labels
    html += '<div class="ieee-field-labels">';
    html += '<div class="ieee-field-label sign">S</div>';
    html += '<div class="ieee-field-label exp">Exponent (8 bits)</div>';
    html += '<div class="ieee-field-label mant">Mantissa (23 bits)</div>';
    html += '</div>';

    // Bit display
    html += '<div class="ieee-bits">';
    html += `<div class="ieee-bit ieee-sign">${sign}</div>`;
    for (let i = 7; i >= 0; i--) {
      html += `<div class="ieee-bit ieee-exp">${(exp >>> i) & 1}</div>`;
    }
    for (let i = 22; i >= 0; i--) {
      html += `<div class="ieee-bit ieee-mant">${(mant >>> i) & 1}</div>`;
    }
    html += '</div>';

    // Interpretation
    html += '<div class="ieee-info">';
    html += `<span style="color:#dc3545;">Sign:</span> ${sign} (${sign ? 'negative' : 'positive'})<br>`;
    html += `<span style="color:#0066cc;">Exponent:</span> ${exp} (biased) = ${exp - 127} (actual)<br>`;
    html += `<span style="color:#28a745;">Mantissa:</span> 0x${mant.toString(16).toUpperCase().padStart(6, '0')} = ${mant} / 2<sup>23</sup><br>`;

    if (exp === 0 && mant === 0) {
      html += `<span class="ieee-special">${sign ? '\u2212' : '+'}0 (zero)</span>`;
    } else if (exp === 0) {
      const denorm = mant / (1 << 23);
      const value = (sign ? -1 : 1) * Math.pow(2, -126) * denorm;
      html += `<span class="ieee-special">Denormalized:</span> (\u22121)<sup>${sign}</sup> \u00D7 2<sup>\u2212126</sup> \u00D7 0.${mant.toString(2).padStart(23,'0')} = ${value.toExponential(6)}`;
    } else if (exp === 255 && mant === 0) {
      html += `<span class="ieee-special">${sign ? '\u2212' : '+'}Infinity</span>`;
    } else if (exp === 255) {
      html += '<span class="ieee-special">NaN (Not a Number)</span>';
    } else {
      const significand = 1 + mant / (1 << 23);
      html += `Value = (\u22121)<sup>${sign}</sup> \u00D7 2<sup>${exp - 127}</sup> \u00D7 ${significand.toFixed(8)} = <strong>${dv.getFloat32(0)}</strong>`;
    }
    html += '</div>';

    container.innerHTML = html;
    container.querySelector('#ieeeVal').addEventListener('input', e => { inputStr = e.target.value; render(); });
  }
  render();
}

/* ═══════════════════════ Rendering ═══════════════════════ */

const TYPE_LABELS = { tool: 'Tool Topic', concept: 'Concept', breakdown: 'Breakdown' };
const TYPE_CLASSES = { tool: 'tag-tool', concept: 'tag-concept', breakdown: 'tag-breakdown' };

function topicById(id) {
  return TOPICS.find(t => t.id === id);
}

function renderLanding(categoryFilter) {
  const content = document.getElementById('content');
  let html = '';

  // Filter bar
  const cats = Object.entries(CATEGORIES).sort((a, b) => a[1].order - b[1].order);
  html += '<div class="filter-bar">';
  html += `<button class="filter-btn ${!categoryFilter ? 'on' : ''}" data-filter="">All</button>`;
  for (const [key, cat] of cats) {
    html += `<button class="filter-btn ${categoryFilter === key ? 'on' : ''}" data-filter="${key}">${cat.name}</button>`;
  }
  html += '</div>';

  // Categories
  for (const [key, cat] of cats) {
    if (categoryFilter && categoryFilter !== key) continue;
    const catTopics = TOPICS.filter(t => t.category === key).sort((a, b) => a.order - b.order);
    if (catTopics.length === 0) continue;

    html += '<div class="section">';
    html += `<h2 class="cat-header">${cat.name}</h2>`;
    if (cat.intro) html += `<p class="cat-intro">${cat.intro}</p>`;

    html += '<div class="card-grid">';
    for (const topic of catTopics) {
      html += `<a class="topic-card" href="#${topic.id}">`;
      html += `<div class="card-title">${topic.title}</div>`;
      html += `<div class="card-desc">${topic.shortDescription}</div>`;
      html += '<div class="card-meta">';
      html += `<span class="tag ${TYPE_CLASSES[topic.type]}">${TYPE_LABELS[topic.type]}</span>`;
      if (topic.tool) {
        html += `<span class="tag tag-tool">${topic.tool}</span>`;
      }
      html += '</div>';
      html += '</a>';
    }
    html += '</div>';
    html += '</div>';
  }

  content.innerHTML = html;

  // Wire filter buttons
  content.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter || null;
      renderLanding(f);
    });
  });
}

function renderTopic(id) {
  const topic = topicById(id);
  if (!topic) {
    renderLanding();
    return;
  }

  const content = document.getElementById('content');
  const c = topic.content;
  let html = '';

  // Back link
  html += '<a href="#" class="back-btn">&larr; All topics</a>';

  html += '<div class="section">';

  // Title + meta
  html += `<h2 class="topic-title">${topic.title}</h2>`;
  html += '<div class="topic-meta">';
  html += `<span class="tag ${TYPE_CLASSES[topic.type]}">${TYPE_LABELS[topic.type]}</span>`;
  if (topic.tool) html += `<span class="tag tag-tool">${topic.tool}</span>`;
  const cat = CATEGORIES[topic.category];
  if (cat) html += `<span>${cat.name}</span>`;
  html += '</div>';

  // Problem
  if (c.problem) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Problem</div>';
    html += `<div class="topic-section-body">${c.problem}</div>`;
    html += '</div>';
  }

  // How It Works
  if (c.howItWorks) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">How It Works</div>';
    html += `<div class="topic-section-body">${c.howItWorks}</div>`;
    html += '</div>';
  }

  // Key Insight
  if (c.keyInsight) {
    html += `<div class="insight-box">\u{1F4A1} <strong>Key insight:</strong> ${c.keyInsight}</div>`;
  }

  // Interactive widget placeholder
  if (topic.interactive) {
    html += '<div class="widget-container" id="widgetMount"></div>';
  }

  // Context (concepts)
  if (c.context) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Context</div>';
    html += `<div class="topic-section-body">${c.context}</div>`;
    html += '</div>';
  }

  // Structure (breakdowns)
  if (c.structure) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Architecture</div>';
    html += `<div class="topic-section-body">${c.structure}</div>`;
    html += '</div>';
  }

  // Sections (breakdowns with multiple parts)
  if (c.sections) {
    for (const sec of c.sections) {
      html += '<div class="topic-section">';
      html += `<div class="topic-section-label">${sec.heading}</div>`;
      html += `<div class="topic-section-body">${sec.body}</div>`;
      html += '</div>';
    }
  }

  // Tradeoffs
  if (c.tradeoffs) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Tradeoffs</div>';
    html += '<div class="tradeoffs-grid">';
    for (const [k, v] of Object.entries(c.tradeoffs)) {
      if (k === 'bestWhen') continue;
      html += `<div class="tradeoff-key">${k}</div>`;
      html += `<div class="tradeoff-val">${v}</div>`;
    }
    if (c.tradeoffs.bestWhen) {
      html += `<div class="tradeoff-best"><strong>Best when:</strong> ${c.tradeoffs.bestWhen}</div>`;
    }
    html += '</div>';
    html += '</div>';
  }

  // Action buttons
  const hasActions = topic.tryItLink || topic.sourceUrl;
  if (hasActions) {
    html += '<div class="action-row">';
    if (topic.tryItLink) {
      html += `<a class="action-btn" href="${topic.tryItLink}">Try it \u2192</a>`;
    }
    if (topic.sourceUrl) {
      html += `<a class="action-btn action-btn-secondary" href="${topic.sourceUrl}" target="_blank">View source \u2192</a>`;
    }
    html += '</div>';
  }

  // Related topics
  if (topic.relatedTopics && topic.relatedTopics.length > 0) {
    html += '<div class="related-section">';
    html += '<div class="related-label">Related</div>';
    html += '<div class="related-list">';
    for (const rid of topic.relatedTopics) {
      const rel = topicById(rid);
      if (rel) {
        html += `<a class="related-link" href="#${rel.id}">${rel.title}</a>`;
      }
    }
    html += '</div>';
    html += '</div>';
  }

  html += '</div>'; // close .section

  content.innerHTML = html;

  // Mount interactive widget
  if (topic.interactive) {
    const mount = document.getElementById('widgetMount');
    if (mount) topic.interactive(mount);
  }

  // Scroll to top
  window.scrollTo(0, 0);
}

/* ═══════════════════════ Router ═══════════════════════ */

function route() {
  const hash = location.hash.slice(1);
  if (!hash) {
    renderLanding();
  } else if (hash.startsWith('category/')) {
    renderLanding(hash.slice(9));
  } else {
    renderTopic(hash);
  }
}

window.addEventListener('hashchange', route);
document.addEventListener('DOMContentLoaded', route);
</script>

</html>
