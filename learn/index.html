<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn hardware architecture concepts — multiplier and adder architectures, digital logic, and computer engineering fundamentals.">
  <meta property="og:title" content="Learn | p14m.com">
  <meta property="og:description" content="Hardware architecture concepts — multiplier and adder design, area-speed tradeoffs, and interactive explanations.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://p14m.com/learn/">
  <title>Learn | p14m.com</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
  <link rel="stylesheet" href="/shared.css">
  <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
  <style>
    /* ── Learn-specific styles ── */

    /* ── Filter Tabs ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #cccccc;
      color: #595959;
      border-radius: 16px;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: #999999; color: #333333; }
    .filter-btn.on { background: #0066cc; color: white; border-color: #0066cc; }
    body.dark .filter-btn { border-color: #444444; color: #888888; }
    body.dark .filter-btn:hover { border-color: #666666; color: #cccccc; }
    body.dark .filter-btn.on { background: #87ceeb; color: #1a1a1a; border-color: #87ceeb; }

    /* ── Category Header ── */
    .cat-header {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px 0;
      padding-bottom: 6px;
      border-bottom: 2px solid #0066cc;
    }
    body.dark .cat-header { border-bottom-color: grey; }

    .cat-intro {
      font-size: 13px;
      color: #595959;
      margin-bottom: 14px;
      line-height: 1.6;
    }
    body.dark .cat-intro { color: #888888; }

    /* ── Topic Cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .topic-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .topic-card:hover { border-color: #0066cc; box-shadow: 0 2px 8px rgba(0,102,204,0.08); }
    .topic-card:visited { color: inherit; }
    body.dark .topic-card { border-color: #333333; }
    body.dark .topic-card:hover { border-color: #87ceeb; box-shadow: 0 2px 8px rgba(135,206,235,0.08); }

    .card-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: #595959;
      line-height: 1.5;
    }
    body.dark .card-desc { color: #888888; }

    .card-meta {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* ── Tags / Badges ── */
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .tag-tool {
      background: rgba(0,102,204,0.08);
      color: #0066cc;
      border: 1px solid rgba(0,102,204,0.2);
    }
    body.dark .tag-tool {
      background: rgba(135,206,235,0.1);
      color: #87ceeb;
      border-color: rgba(135,206,235,0.2);
    }
    .tag-concept {
      background: rgba(40,167,69,0.08);
      color: #28a745;
      border: 1px solid rgba(40,167,69,0.2);
    }
    body.dark .tag-concept {
      background: rgba(76,175,80,0.1);
      color: #4caf50;
      border-color: rgba(76,175,80,0.2);
    }
    .tag-breakdown {
      background: rgba(255,193,7,0.1);
      color: #856404;
      border: 1px solid rgba(255,193,7,0.25);
    }
    body.dark .tag-breakdown {
      background: rgba(255,193,7,0.08);
      color: #ffc107;
      border-color: rgba(255,193,7,0.2);
    }

    /* ── Topic Detail View ── */
    .back-btn {
      font-size: 13px;
      margin-bottom: 16px;
      display: inline-block;
    }

    .topic-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .topic-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 12px;
      color: #767676;
    }
    body.dark .topic-meta { color: #9a9a9a; }

    .topic-section {
      margin-bottom: 18px;
    }
    .topic-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #0066cc;
      margin-bottom: 4px;
    }
    body.dark .topic-section-label { color: #87ceeb; }

    .topic-section-body {
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── Key Insight Box ── */
    .insight-box {
      border-left: 3px solid #0066cc;
      background: rgba(0,102,204,0.04);
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    body.dark .insight-box {
      border-left-color: #87ceeb;
      background: rgba(135,206,235,0.05);
    }

    /* ── Tradeoffs Table ── */
    .tradeoffs-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .tradeoff-key {
      font-weight: 600;
      color: #555555;
      white-space: nowrap;
    }
    body.dark .tradeoff-key { color: #aaaaaa; }
    .tradeoff-val {
      font-family: monospace;
      font-size: 12px;
    }
    .tradeoff-best {
      font-style: italic;
      color: #595959;
      grid-column: 1 / -1;
      margin-top: 4px;
      font-size: 12px;
    }
    body.dark .tradeoff-best { color: #888888; }

    /* ── Action Buttons ── */
    .action-row {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .action-btn:hover { background: #0052a3; text-decoration: none; }
    .action-btn:visited { color: white; }
    body.dark .action-btn { background: #87ceeb; color: #1a1a1a; }
    body.dark .action-btn:hover { background: #6bb8d9; }
    body.dark .action-btn:visited { color: #1a1a1a; }

    .action-btn-secondary {
      background: transparent;
      border: 1px solid #cccccc;
      color: #595959;
    }
    .action-btn-secondary:hover { border-color: #999999; color: #333333; background: transparent; }
    .action-btn-secondary:visited { color: #595959; }
    body.dark .action-btn-secondary { border-color: #444444; color: #888888; background: transparent; }
    body.dark .action-btn-secondary:hover { border-color: #666666; color: #cccccc; background: transparent; }
    body.dark .action-btn-secondary:visited { color: #888888; }

    /* ── Related Topics ── */
    .related-section {
      border-top: 1px solid #e0e0e0;
      padding-top: 16px;
      margin-top: 24px;
    }
    body.dark .related-section { border-top-color: #333333; }
    .related-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #767676;
      margin-bottom: 8px;
    }
    body.dark .related-label { color: #9a9a9a; }
    .related-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .related-link {
      font-size: 13px;
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .related-link:hover { border-color: #0066cc; text-decoration: none; }
    body.dark .related-link { border-color: #333333; }
    body.dark .related-link:hover { border-color: #87ceeb; }

    /* ── Interactive Widget Container ── */
    .widget-container {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 18px;
    }
    body.dark .widget-container { border-color: #333333; }

    .widget-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #0066cc;
      margin-bottom: 10px;
    }
    body.dark .widget-label { color: #87ceeb; }

    /* Booth widget */
    .booth-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .booth-input {
      width: 100px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    .booth-input:focus { border-color: #0066cc; }
    body.dark .booth-input { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    body.dark .booth-input:focus { border-color: #87ceeb; }

    .booth-bits {
      font-family: monospace;
      font-size: 13px;
      display: flex;
      gap: 1px;
    }
    .booth-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
    }
    .booth-bit-label {
      font-size: 9px;
      color: #999999;
      text-align: center;
      width: 22px;
    }
    .booth-result-row {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.6;
    }
    .booth-pos { color: #28a745; }
    .booth-neg { color: #dc3545; }
    .booth-zero { color: #999999; }
    body.dark .booth-pos { color: #4caf50; }
    body.dark .booth-neg { color: #ff6b6b; }

    /* ── Overflow widget ── */
    .overflow-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .overflow-input {
      width: 80px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    .overflow-input:focus { border-color: #0066cc; }
    body.dark .overflow-input { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    body.dark .overflow-input:focus { border-color: #87ceeb; }
    .overflow-bits {
      font-family: monospace;
      font-size: 13px;
      display: flex;
      gap: 1px;
      margin: 4px 0;
    }
    .overflow-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(0,0,0,0.04);
      border: 1px solid #ddd;
    }
    body.dark .overflow-bit { background: rgba(255,255,255,0.04); border-color: #444; }
    .overflow-bit.sign { background: rgba(0,102,204,0.1); border-color: rgba(0,102,204,0.3); }
    body.dark .overflow-bit.sign { background: rgba(135,206,235,0.1); border-color: rgba(135,206,235,0.3); }
    .overflow-result { font-size: 13px; margin-top: 8px; line-height: 1.6; }
    .overflow-ok { color: #28a745; font-weight: 600; }
    .overflow-bad { color: #dc3545; font-weight: 600; }
    body.dark .overflow-ok { color: #4caf50; }
    body.dark .overflow-bad { color: #ff6b6b; }

    /* ── Fixed-point widget ── */
    .fp-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .fp-input {
      width: 120px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    .fp-input:focus { border-color: #0066cc; }
    body.dark .fp-input { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    body.dark .fp-input:focus { border-color: #87ceeb; }
    .fp-select {
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    body.dark .fp-select { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    .fp-bits {
      font-family: monospace;
      font-size: 13px;
      display: flex;
      gap: 1px;
      align-items: center;
    }
    .fp-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(0,0,0,0.04);
      border: 1px solid #ddd;
    }
    body.dark .fp-bit { background: rgba(255,255,255,0.04); border-color: #444; }
    .fp-bit.int-part { background: rgba(0,102,204,0.08); border-color: rgba(0,102,204,0.2); }
    .fp-bit.frac-part { background: rgba(40,167,69,0.08); border-color: rgba(40,167,69,0.2); }
    body.dark .fp-bit.int-part { background: rgba(135,206,235,0.08); border-color: rgba(135,206,235,0.2); }
    body.dark .fp-bit.frac-part { background: rgba(76,175,80,0.08); border-color: rgba(76,175,80,0.2); }
    .fp-radix { font-size: 18px; font-weight: 700; margin: 0 2px; color: #dc3545; }
    .fp-info { font-size: 12px; margin-top: 6px; line-height: 1.6; color: #595959; }
    body.dark .fp-info { color: #888; }

    /* ── Barrel shifter diagram ── */
    .barrel-diagram {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
    }
    .barrel-stage {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .barrel-label {
      width: 80px;
      font-weight: 600;
      font-size: 11px;
      color: #0066cc;
      text-align: right;
      flex-shrink: 0;
    }
    body.dark .barrel-label { color: #87ceeb; }
    .barrel-muxes {
      display: flex;
      gap: 2px;
    }
    .barrel-mux {
      width: 28px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(0,102,204,0.08);
      border: 1px solid rgba(0,102,204,0.2);
      color: #0066cc;
    }
    body.dark .barrel-mux { background: rgba(135,206,235,0.08); border-color: rgba(135,206,235,0.2); color: #87ceeb; }
    .barrel-mux.pass { background: rgba(0,0,0,0.03); border-color: #ddd; color: #999; }
    body.dark .barrel-mux.pass { background: rgba(255,255,255,0.03); border-color: #444; color: #666; }
    .barrel-note {
      font-size: 11px;
      color: #595959;
      margin-top: 4px;
      line-height: 1.5;
    }
    body.dark .barrel-note { color: #888; }

    /* ── Comparator widget ── */
    .cmp-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .cmp-input {
      width: 80px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000;
      outline: none;
    }
    .cmp-input:focus { border-color: #0066cc; }
    body.dark .cmp-input { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    body.dark .cmp-input:focus { border-color: #87ceeb; }
    .cmp-bits-row {
      display: flex;
      gap: 1px;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .cmp-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(0,0,0,0.04);
      border: 1px solid #ddd;
    }
    body.dark .cmp-bit { background: rgba(255,255,255,0.04); border-color: #444; }
    .cmp-bit.deciding { background: rgba(230,126,34,0.15); border-color: rgba(230,126,34,0.4); color: #e67e22; }
    body.dark .cmp-bit.deciding { background: rgba(243,156,18,0.15); border-color: rgba(243,156,18,0.4); color: #f39c12; }
    .cmp-bit.equal { background: rgba(40,167,69,0.08); border-color: rgba(40,167,69,0.2); }
    body.dark .cmp-bit.equal { background: rgba(76,175,80,0.08); border-color: rgba(76,175,80,0.2); }
    .cmp-bit.skipped { opacity: 0.35; }
    .cmp-result { font-size: 12px; margin-top: 8px; line-height: 1.6; }
    .cmp-gt { color: #0066cc; font-weight: 600; }
    .cmp-lt { color: #c0392b; font-weight: 600; }
    .cmp-eq { color: #28a745; font-weight: 600; }
    body.dark .cmp-gt { color: #87ceeb; }
    body.dark .cmp-lt { color: #e74c3c; }
    body.dark .cmp-eq { color: #4caf50; }
    .cmp-step { font-size: 11px; line-height: 1.5; color: #595959; margin-top: 6px; }
    body.dark .cmp-step { color: #888; }

    /* ── FIFO widget ── */
    .fifo-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .fifo-input {
      width: 50px;
      background: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000;
      outline: none;
    }
    .fifo-input:focus { border-color: #0066cc; }
    body.dark .fifo-input { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    .fifo-btn {
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: transparent;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      color: inherit;
      transition: border-color 0.15s;
    }
    .fifo-btn:hover { border-color: #0066cc; }
    body.dark .fifo-btn { border-color: #444; }
    body.dark .fifo-btn:hover { border-color: #87ceeb; }
    .fifo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .fifo-ring {
      display: flex;
      gap: 2px;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .fifo-slot {
      width: 36px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-weight: 600;
      background: rgba(0,0,0,0.03);
      border: 1px solid #ddd;
      position: relative;
      transition: all 0.2s;
    }
    body.dark .fifo-slot { background: rgba(255,255,255,0.03); border-color: #444; }
    .fifo-slot.occupied { background: rgba(0,102,204,0.08); border-color: rgba(0,102,204,0.25); }
    body.dark .fifo-slot.occupied { background: rgba(135,206,235,0.08); border-color: rgba(135,206,235,0.25); }
    .fifo-slot.head-slot { border-bottom: 3px solid #0a7c42; }
    body.dark .fifo-slot.head-slot { border-bottom-color: #2ecc71; }
    .fifo-slot.tail-slot { border-top: 3px solid #0066cc; }
    body.dark .fifo-slot.tail-slot { border-top-color: #87ceeb; }
    .fifo-labels {
      display: flex;
      gap: 2px;
      font-size: 9px;
      color: #999;
      margin-bottom: 8px;
    }
    .fifo-label-cell { width: 36px; text-align: center; }
    .fifo-ptr-label { font-size: 10px; font-weight: 600; }
    .fifo-ptr-rd { color: #0a7c42; }
    .fifo-ptr-wr { color: #0066cc; }
    body.dark .fifo-ptr-rd { color: #2ecc71; }
    body.dark .fifo-ptr-wr { color: #87ceeb; }
    .fifo-status { font-size: 12px; margin-top: 6px; line-height: 1.6; }
    .fifo-status-full { color: #c0392b; font-weight: 600; }
    .fifo-status-empty { color: #e67e22; font-weight: 600; }

function getVote(topicId) {
  return localStorage.getItem('feedback_' + topicId);
}

function setVote(topicId, vote) {
  localStorage.setItem('feedback_' + topicId, vote);
}

function submitFeedback(topicId) {
  if (getVote(topicId)) return;
  setVote(topicId, 'yes');
  const ref = db.collection('feedback').doc(topicId);
  ref.set({ helpful: firebase.firestore.FieldValue.increment(1) }, { merge: true });
}

function mountFeedback(topicId) {
  const mount = document.getElementById('feedbackMount');
  if (!mount) return;

  const voted = getVote(topicId);

  function renderFeedback(count) {
    let html = '';
    if (voted) {
      html += '<div class="feedback-btns">';
      html += `<span class="feedback-btn voted">\uD83D\uDC4D Helpful <span class="feedback-count">${count}</span></span>`;
      html += '</div>';
      html += '<div class="feedback-thanks">Thanks for your feedback!</div>';
    } else {
      html += '<div class="feedback-btns">';
      html += `<button class="feedback-btn" id="helpfulBtn">\uD83D\uDC4D Helpful? <span class="feedback-count">${count}</span></button>`;
      html += '</div>';
    }
    mount.innerHTML = html;

    if (!voted) {
      document.getElementById('helpfulBtn').addEventListener('click', () => {
        submitFeedback(topicId);
        renderFeedback(count + 1);
      });
    }
  }

  if (db) {
    db.collection('feedback').doc(topicId).get().then(doc => {
      const data = doc.exists ? doc.data() : {};
      renderFeedback(data.helpful || 0);
    }).catch(() => {
      renderFeedback(0);
    });
  } else {
    renderFeedback(0);
  }
}

function boothWidget(container) {
  let bits = 8;
  let val = 11;

  function parseNum(s) {
    s = s.trim();
    if (/^-/.test(s)) return -parseNum(s.slice(1));
    if (/^0[xX]/.test(s)) return parseInt(s.substring(2), 16);
    if (/^0[bB]/.test(s)) return parseInt(s.substring(2), 2);
    if (/^0[oO]/.test(s)) return parseInt(s.substring(2), 8);
    return parseInt(s, 10);
  }

  function encode(v, n) {
    const digits = [];
    for (let i = 0; i < n; i++) {
      const prev = i === 0 ? 0 : (v >>> (i - 1)) & 1;
      const curr = (v >>> i) & 1;
      digits.push(prev - curr);
    }
    return digits;
  }

  // Build inputs once
  let html = '<div class="widget-label">Try it \u2014 Booth Encoding</div>';
  html += '<div class="booth-input-row">';
  html += '<select class="booth-input" style="width:60px;" id="boothBits">';
  for (const b of [4, 8]) {
    html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
  }
  html += '</select>';
  html += `<input class="booth-input" id="boothVal" value="${val}" placeholder="e.g. 11, 0xFF, 0b1010" type="text">`;
  html += '</div>';
  html += '<div id="boothOutput"></div>';
  container.innerHTML = html;

  const boothOutput = container.querySelector('#boothOutput');

  function updateOutput() {
    const clamped = val & ((1 << bits) - 1);
    const digits = encode(clamped, bits);

    let h = '<div style="margin-bottom:6px;font-size:12px;color:#767676;">Binary:</div>';
    h += '<div class="booth-bits" style="overflow-x:auto;">';
    for (let i = bits - 1; i >= 0; i--) {
      h += `<div class="booth-bit" style="background:rgba(0,0,0,0.04);border:1px solid #ddd;">${(clamped >>> i) & 1}</div>`;
    }
    h += '</div>';
    h += '<div class="booth-bits" style="margin-bottom:8px;">';
    for (let i = bits - 1; i >= 0; i--) {
      h += `<div class="booth-bit-label">b${i}</div>`;
    }
    h += '</div>';

    // Booth encoding
    h += '<div style="margin-bottom:6px;font-size:12px;color:#767676;">Booth encoding (d[i] = b[i\u22121] \u2212 b[i]):</div>';
    h += '<div class="booth-bits" style="overflow-x:auto;">';
    for (let i = bits - 1; i >= 0; i--) {
      const d = digits[i];
      const cls = d === 1 ? 'booth-pos' : d === -1 ? 'booth-neg' : 'booth-zero';
      const label = d === 1 ? '+1' : d === -1 ? '\u22121' : ' 0';
      h += `<div class="booth-bit ${cls}" style="font-size:11px;">${label}</div>`;
    }
    h += '</div>';
    h += '<div class="booth-bits" style="margin-bottom:10px;">';
    for (let i = bits - 1; i >= 0; i--) {
      h += `<div class="booth-bit-label">d${i}</div>`;
    }
    h += '</div>';

    // Operations
    h += '<div class="booth-result-row">';
    const ops = digits.map((d, i) => {
      if (d === 1) return `<span class="booth-pos">+A\u00AB${i}</span>`;
      if (d === -1) return `<span class="booth-neg">\u2212A\u00AB${i}</span>`;
      return null;
    }).filter(Boolean);
    if (ops.length === 0) h += 'All digits zero \u2014 result is 0.';
    else h += 'Operations: ' + ops.join(' ');
    h += '</div>';

    // Booth efficiency note
    const nonZero = digits.filter(d => d !== 0).length;
    const onesInBinary = clamped.toString(2).split('').filter(c => c === '1').length;
    h += '<div class="booth-result-row" style="color:#767676;font-size:11px;margin-top:4px;">';
    if (nonZero < onesInBinary) {
      h += `Booth wins: ${nonZero} op${nonZero !== 1 ? 's' : ''} vs ${onesInBinary} with standard binary. Ideal when bits have long runs of 1s (e.g. 0b0111110), since Booth collapses each run into just a subtract and an add.`;
    } else if (nonZero > onesInBinary) {
      h += `Booth hurts: ${nonZero} ops vs ${onesInBinary} with standard binary. Alternating bit patterns (e.g. 0b01010101) break Booth\u2019s advantage \u2014 every transition creates an operation instead of collapsing runs.`;
    } else {
      h += `Neutral: ${nonZero} ops either way. Booth shines on long runs of 1s; it loses on alternating 0/1 patterns.`;
    }
    h += '</div>';

    boothOutput.innerHTML = h;
  }

  container.querySelector('#boothBits').addEventListener('change', e => {
    bits = parseInt(e.target.value);
    updateOutput();
  });
  container.querySelector('#boothVal').addEventListener('input', e => {
    const v = parseNum(e.target.value);
    if (!isNaN(v)) { val = v; updateOutput(); }
  });

  updateOutput();
}

function overflowWidget(container) {
  let bits = 8;
  let valA = 100;
  let valB = 50;

  function toSigned(v, n) {
    v = v & ((1 << n) - 1);
    if (v >= (1 << (n - 1))) v -= (1 << n);
    return v;
  }

  // Build inputs once
  let html = '<div class="widget-label">Try it \u2014 Overflow Detection</div>';
  html += '<div class="overflow-row">';
  html += `<select class="overflow-input" style="width:60px;" id="ovBits">`;
  for (const b of [4, 8]) {
    html += `<option value="${b}" ${b === bits ? 'selected' : ''}>${b}-bit</option>`;
  }
  html += '</select>';
  html += `<span style="font-size:12px;">A:</span><input class="overflow-input" id="ovA" value="${valA}" type="number">`;
  html += `<span style="font-size:12px;">B:</span><input class="overflow-input" id="ovB" value="${valB}" type="number">`;
  html += '</div>';
  html += '<div id="ovOutput"></div>';
  container.innerHTML = html;

  const ovOutput = container.querySelector('#ovOutput');

  function renderBits(val, label) {
    let h = `<div style="font-size:12px;color:#767676;margin-bottom:2px;">${label} (signed: ${toSigned(val, bits)}):</div>`;
    h += '<div class="overflow-bits" style="overflow-x:auto;">';
    for (let i = bits - 1; i >= 0; i--) {
      const cls = i === bits - 1 ? ' sign' : '';
      h += `<div class="overflow-bit${cls}">${(val >>> i) & 1}</div>`;
    }
    h += '</div>';
    return h;
  }

  function updateOutput() {
    const mask = (1 << bits) - 1;
    const a = valA & mask;
    const b = valB & mask;
    const sum = (a + b) & mask;
    const signedA = toSigned(a, bits);
    const signedB = toSigned(b, bits);
    const signedSum = toSigned(sum, bits);
    const trueSum = signedA + signedB;
    const overflow = trueSum !== signedSum;

    const msbMask = 1 << (bits - 1);
    const lowerMask = msbMask - 1;
    const lowerSum = (a & lowerMask) + (b & lowerMask);
    const cIn = (lowerSum >> (bits - 1)) & 1;
    const fullSum = a + b;
    const cOut = (fullSum >> bits) & 1;

    let h = renderBits(a, 'A');
    h += renderBits(b, 'B');
    h += '<div style="border-top:1px solid #ddd;margin:6px 0;"></div>';
    h += renderBits(sum, 'A + B');

    h += '<div class="overflow-result">';
    h += `C<sub>in</sub>[MSB] = ${cIn}, C<sub>out</sub>[MSB] = ${cOut}, XOR = ${cIn ^ cOut}<br>`;
    if (overflow) {
      h += `<span class="overflow-bad">Overflow! True result ${trueSum} doesn\u2019t fit in ${bits} bits (range ${-(1<<(bits-1))} to ${(1<<(bits-1))-1}).</span>`;
    } else {
      h += `<span class="overflow-ok">No overflow. Result ${signedSum} is correct.</span>`;
    }
    h += '</div>';

    ovOutput.innerHTML = h;
  }

  container.querySelector('#ovBits').addEventListener('change', e => { bits = parseInt(e.target.value); updateOutput(); });
  container.querySelector('#ovA').addEventListener('input', e => { valA = parseInt(e.target.value) || 0; updateOutput(); });
  container.querySelector('#ovB').addEventListener('input', e => { valB = parseInt(e.target.value) || 0; updateOutput(); });

  updateOutput();
}

function fixedPointWidget(container) {
  let decimal = 3.75;
  let intBits = 4;
  let fracBits = 4;

  // Build inputs once
  let html = '<div class="widget-label">Try it \u2014 Fixed-Point Converter</div>';
  html += '<div class="fp-row">';
  html += `<input class="fp-input" id="fpVal" value="${decimal}" placeholder="decimal" type="text" style="width:100px;">`;
  html += `<select class="fp-select" id="fpFmt">`;
  for (const [m, f] of [[4,4],[8,8],[4,12],[12,4]]) {
    const sel = m === intBits && f === fracBits ? 'selected' : '';
    html += `<option value="${m},${f}" ${sel}>Q${m}.${f} (${m+f}-bit)</option>`;
  }
  html += '</select>';
  html += '</div>';
  html += '<div id="fpOutput"></div>';
  container.innerHTML = html;

  const fpOutput = container.querySelector('#fpOutput');

  function updateOutput() {
    const totalBits = intBits + fracBits;
    const scale = 1 << fracBits;
    const maxVal = (1 << (totalBits - 1)) - 1;
    const minVal = -(1 << (totalBits - 1));
    const maxDecimal = maxVal / scale;
    const minDecimal = minVal / scale;

    let clamped = Math.max(minDecimal, Math.min(maxDecimal, decimal));
    let raw = Math.round(clamped * scale);
    if (raw > maxVal) raw = maxVal;
    if (raw < minVal) raw = minVal;
    const actual = raw / scale;

    const unsigned = raw < 0 ? raw + (1 << totalBits) : raw;

    let h = '<div class="fp-bits" style="overflow-x:auto;">';
    for (let i = totalBits - 1; i >= 0; i--) {
      const bit = (unsigned >>> i) & 1;
      const cls = i >= fracBits ? 'int-part' : 'frac-part';
      h += `<div class="fp-bit ${cls}">${bit}</div>`;
      if (i === fracBits) h += '<span class="fp-radix">.</span>';
    }
    h += '</div>';

    h += '<div class="fp-info">';
    h += `<strong>Q${intBits}.${fracBits}</strong> \u2014 ${intBits} integer bits, ${fracBits} fractional bits (${totalBits} bits total)<br>`;
    h += `Stored integer: ${raw} \u2192 value: ${raw} / 2<sup>${fracBits}</sup> = <strong>${actual}</strong>`;
    if (actual !== clamped || actual !== decimal) h += ` (input ${decimal} quantized)`;
    h += `<br>Range: [${minDecimal}, ${maxDecimal}], resolution: ${(1/scale).toFixed(fracBits <= 8 ? fracBits : 8)}`;
    h += '</div>';

    fpOutput.innerHTML = h;
  }

  container.querySelector('#fpVal').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    if (!isNaN(v)) { decimal = v; updateOutput(); }
  });
  container.querySelector('#fpFmt').addEventListener('change', e => {
    const [m, f] = e.target.value.split(',').map(Number);
    intBits = m; fracBits = f; updateOutput();
  });

  updateOutput();
}

function barrelShifterWidget(container) {
  const n = 8;
  let shift = 5;
  const stages = Math.ceil(Math.log2(n));

  // Build inputs once
  let html = '<div class="widget-label">Barrel Shifter \u2014 8-bit, 3 stages</div>';
  html += '<div id="barrelOutput" style="overflow-x:auto;"></div>';
  html += '<div class="barrel-note">';
  html += `Shift amount: <input class="overflow-input" id="barrelShift" type="number" min="0" max="${n-1}" value="${shift}" style="width:50px;"> `;
  html += `<span id="barrelBinary">= ${shift.toString(2).padStart(stages, '0')}<sub>2</sub></span>`;
  html += `<br>Each stage: if control bit is 1, shift by 2<sup>k</sup>; if 0, pass through. Active stages highlighted.`;
  html += '</div>';
  container.innerHTML = html;

  const barrelOutput = container.querySelector('#barrelOutput');
  const barrelBinary = container.querySelector('#barrelBinary');

  function updateOutput() {
    let h = '<div class="barrel-diagram">';

    // Input row
    h += '<div class="barrel-stage"><div class="barrel-label">Input</div><div class="barrel-muxes">';
    for (let i = n - 1; i >= 0; i--) h += `<div class="barrel-mux pass">d${i}</div>`;
    h += '</div></div>';

    // Each stage
    let current = [];
    for (let i = 0; i < n; i++) current[i] = i;

    for (let s = 0; s < stages; s++) {
      const shiftAmt = 1 << s;
      const active = (shift >> s) & 1;
      const next = [];

      h += `<div class="barrel-stage"><div class="barrel-label">Stage ${s}<br>shift ${shiftAmt}${active ? ' \u2713' : ''}</div><div class="barrel-muxes">`;
      for (let i = n - 1; i >= 0; i--) {
        if (active && i - shiftAmt >= 0) {
          next[i] = current[i - shiftAmt];
          h += `<div class="barrel-mux">d${next[i]}</div>`;
        } else if (active && i - shiftAmt < 0) {
          next[i] = -1;
          h += '<div class="barrel-mux">0</div>';
        } else {
          next[i] = current[i];
          h += `<div class="barrel-mux pass">d${next[i]}</div>`;
        }
      }
      h += '</div></div>';
      current = next;
    }

    // Output row
    h += '<div class="barrel-stage"><div class="barrel-label">Output</div><div class="barrel-muxes">';
    for (let i = n - 1; i >= 0; i--) {
      const v = current[i] < 0 ? '0' : 'd' + current[i];
      h += `<div class="barrel-mux">${v}</div>`;
    }
    h += '</div></div>';
    h += '</div>';

    barrelOutput.innerHTML = h;
    barrelBinary.innerHTML = `= ${shift.toString(2).padStart(stages, '0')}<sub>2</sub>`;
  }

  container.querySelector('#barrelShift').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    if (!isNaN(v) && v >= 0 && v < n) { shift = v; updateOutput(); }
  });

  updateOutput();
}

function ieeeWidget(container) {
  let inputStr = '3.14';

  // Build input once
  let html = '<div class="widget-label">Try it \u2014 IEEE 754 Single Precision</div>';
  html += '<div class="ieee-row">';
  html += `<input class="ieee-input" id="ieeeVal" value="${inputStr}" placeholder="decimal number" type="text">`;
  html += '</div>';
  html += '<div id="ieeeOutput"></div>';
  container.innerHTML = html;

  const ieeeOutput = container.querySelector('#ieeeOutput');

  function updateOutput() {
    const val = parseFloat(inputStr);

    if (isNaN(val) && inputStr.toLowerCase() !== 'nan') {
      ieeeOutput.innerHTML = '<div class="ieee-info">Enter a number, "Infinity", "-Infinity", or "NaN".</div>';
      return;
    }

    // Get the IEEE 754 bits via DataView
    const buf = new ArrayBuffer(4);
    const dv = new DataView(buf);
    if (inputStr.toLowerCase() === 'nan') dv.setFloat32(0, NaN);
    else dv.setFloat32(0, val);
    const bits32 = dv.getUint32(0);

    const sign = (bits32 >>> 31) & 1;
    const exp = (bits32 >>> 23) & 0xFF;
    const mant = bits32 & 0x7FFFFF;

    let h = '';

    // Field labels
    h += '<div class="ieee-field-labels" style="overflow-x:auto;">';
    h += '<div class="ieee-field-label sign">S</div>';
    h += '<div class="ieee-field-label exp">Exponent (8 bits)</div>';
    h += '<div class="ieee-field-label mant">Mantissa (23 bits)</div>';
    h += '</div>';

    // Bit display
    h += '<div class="ieee-bits" style="overflow-x:auto;">';
    h += `<div class="ieee-bit ieee-sign">${sign}</div>`;
    for (let i = 7; i >= 0; i--) {
      h += `<div class="ieee-bit ieee-exp">${(exp >>> i) & 1}</div>`;
    }
    for (let i = 22; i >= 0; i--) {
      h += `<div class="ieee-bit ieee-mant">${(mant >>> i) & 1}</div>`;
    }
    h += '</div>';

    // Interpretation
    h += '<div class="ieee-info">';
    h += `<span style="color:#dc3545;">Sign:</span> ${sign} (${sign ? 'negative' : 'positive'})<br>`;
    h += `<span style="color:#0066cc;">Exponent:</span> ${exp} (biased) = ${exp - 127} (actual)<br>`;
    h += `<span style="color:#28a745;">Mantissa:</span> 0x${mant.toString(16).toUpperCase().padStart(6, '0')} = ${mant} / 2<sup>23</sup><br>`;

    if (exp === 0 && mant === 0) {
      h += `<span class="ieee-special">${sign ? '\u2212' : '+'}0 (zero)</span>`;
    } else if (exp === 0) {
      const denorm = mant / (1 << 23);
      const value = (sign ? -1 : 1) * Math.pow(2, -126) * denorm;
      h += `<span class="ieee-special">Denormalized:</span> (\u22121)<sup>${sign}</sup> \u00D7 2<sup>\u2212126</sup> \u00D7 0.${mant.toString(2).padStart(23,'0')} = ${value.toExponential(6)}`;
    } else if (exp === 255 && mant === 0) {
      h += `<span class="ieee-special">${sign ? '\u2212' : '+'}Infinity</span>`;
    } else if (exp === 255) {
      h += '<span class="ieee-special">NaN (Not a Number)</span>';
    } else {
      const significand = 1 + mant / (1 << 23);
      h += `Value = (\u22121)<sup>${sign}</sup> \u00D7 2<sup>${exp - 127}</sup> \u00D7 ${significand.toFixed(8)} = <strong>${dv.getFloat32(0)}</strong>`;
    }
    h += '</div>';

    ieeeOutput.innerHTML = h;
  }

  container.querySelector('#ieeeVal').addEventListener('input', e => { inputStr = e.target.value; updateOutput(); });

  updateOutput();
}

  html += '<div id="cmpOutput"></div>';
  container.innerHTML = html;

  const cmpOutput = container.querySelector('#cmpOutput');

  function updateOutput() {
    const mask = (1 << bits) - 1;
    const a = valA & mask;
    const b = valB & mask;

    // Find the deciding bit
    let decidingBit = -1;
    for (let i = bits - 1; i >= 0; i--) {
      const aBit = (a >>> i) & 1;
      const bBit = (b >>> i) & 1;
      if (aBit !== bBit) { decidingBit = i; break; }
    }

    let h = '';

    // Render A bits
    h += '<div style="font-size:12px;color:#767676;margin-bottom:2px;">A = ' + a + ':</div>';
    h += '<div class="cmp-bits-row">';
    for (let i = bits - 1; i >= 0; i--) {
      const bit = (a >>> i) & 1;
      let cls = 'cmp-bit';
      if (i === decidingBit) cls += ' deciding';
      else if (decidingBit !== -1 && i < decidingBit) cls += ' skipped';
      else if (decidingBit === -1) cls += ' equal';
      h += '<div class="' + cls + '">' + bit + '</div>';
    }
    h += '</div>';

    // Render B bits
    h += '<div style="font-size:12px;color:#767676;margin-bottom:2px;margin-top:4px;">B = ' + b + ':</div>';
    h += '<div class="cmp-bits-row">';
    for (let i = bits - 1; i >= 0; i--) {
      const bit = (b >>> i) & 1;
      let cls = 'cmp-bit';
      if (i === decidingBit) cls += ' deciding';
      else if (decidingBit !== -1 && i < decidingBit) cls += ' skipped';
      else if (decidingBit === -1) cls += ' equal';
      h += '<div class="' + cls + '">' + bit + '</div>';
    }
    h += '</div>';

    // Step-by-step explanation
    h += '<div class="cmp-step">';
    let steps = [];
    for (let i = bits - 1; i >= 0; i--) {
      const aBit = (a >>> i) & 1;
      const bBit = (b >>> i) & 1;
      if (aBit === bBit) {
        steps.push('Bit ' + i + ': A[' + i + ']=' + aBit + ' = B[' + i + ']=' + bBit + ' \u2192 equal, check next');
        if (i === 0 && decidingBit === -1) {
          steps.push('All bits equal \u2192 A = B');
        }
      } else {
        steps.push('Bit ' + i + ': A[' + i + ']=' + aBit + ' \u2260 B[' + i + ']=' + bBit + ' \u2192 ' + (aBit > bBit ? 'A > B' : 'A < B') + ' (decided!)');
        break;
      }
    }
    h += steps.join('<br>');
    h += '</div>';

    // Result
    h += '<div class="cmp-result">';
    if (a > b) h += '<span class="cmp-gt">A > B</span> \u2014 decided at bit ' + decidingBit + ' (A has 1, B has 0)';
    else if (a < b) h += '<span class="cmp-lt">A < B</span> \u2014 decided at bit ' + decidingBit + ' (A has 0, B has 1)';
    else h += '<span class="cmp-eq">A = B</span> \u2014 all ' + bits + ' bits are identical';
    h += '</div>';

    cmpOutput.innerHTML = h;
  }

  container.querySelector('#cmpBits').addEventListener('change', function(e) { bits = parseInt(e.target.value); updateOutput(); });
  container.querySelector('#cmpA').addEventListener('input', function(e) { valA = parseInt(e.target.value) || 0; updateOutput(); });
  container.querySelector('#cmpB').addEventListener('input', function(e) { valB = parseInt(e.target.value) || 0; updateOutput(); });
  updateOutput();
}

function fifoWidget(container) {
  const SIZE = 8;
  let fifo = new Array(SIZE).fill(null);
  let head = 0;    // read pointer
  let tail = 0;    // write pointer
  let count = 0;
  let nextVal = 1;
  let log = [];

  let html = '<div class="widget-label">Try it \u2014 Circular FIFO (8 slots)</div>';
  html += '<div class="fifo-controls">';
  html += '<input class="fifo-input" id="fifoVal" value="1" type="number" min="0" max="99">';
  html += '<button class="fifo-btn" id="fifoEnq">Enqueue</button>';
  html += '<button class="fifo-btn" id="fifoDeq">Dequeue</button>';
  html += '<button class="fifo-btn" id="fifoReset">Clear</button>';
  html += '</div>';
  html += '<div id="fifoOutput"></div>';
  container.innerHTML = html;

  const fifoOutput = container.querySelector('#fifoOutput');
  const fifoValInput = container.querySelector('#fifoVal');

  function enqueue() {
    if (count >= SIZE) { log.push('FULL \u2014 enqueue rejected'); render(); return; }
    const v = parseInt(fifoValInput.value) || 0;
    fifo[tail] = v;
    log.push('Enqueue ' + v + ' at slot ' + tail);
    tail = (tail + 1) % SIZE;
    count++;
    nextVal = v + 1;
    fifoValInput.value = nextVal;
    render();
  }

  function dequeue() {
    if (count <= 0) { log.push('EMPTY \u2014 dequeue rejected'); render(); return; }
    const v = fifo[head];
    fifo[head] = null;
    log.push('Dequeue ' + v + ' from slot ' + head);
    head = (head + 1) % SIZE;
    count--;
    render();
  }

  function reset() {
    fifo = new Array(SIZE).fill(null);
    head = 0; tail = 0; count = 0; nextVal = 1;
    fifoValInput.value = '1';
    log = ['FIFO cleared'];
    render();
  }

  function render() {
    let h = '';

    // Pointer labels
    h += '<div class="fifo-labels">';
    for (let i = 0; i < SIZE; i++) {
      let lbl = '';
      if (i === head && i === tail) lbl = '<span class="fifo-ptr-label fifo-ptr-rd">H</span><span class="fifo-ptr-label fifo-ptr-wr">T</span>';
      else if (i === head) lbl = '<span class="fifo-ptr-label fifo-ptr-rd">Head</span>';
      else if (i === tail) lbl = '<span class="fifo-ptr-label fifo-ptr-wr">Tail</span>';
      h += '<div class="fifo-label-cell">' + lbl + '</div>';
    }
    h += '</div>';

    // Slots
    h += '<div class="fifo-ring">';
    for (let i = 0; i < SIZE; i++) {
      let cls = 'fifo-slot';
      if (fifo[i] !== null) cls += ' occupied';
      if (i === head && count > 0) cls += ' head-slot';
      if (i === tail) cls += ' tail-slot';
      const display = fifo[i] !== null ? fifo[i] : '\u00B7';
      h += '<div class="' + cls + '">' + display + '</div>';
    }
    h += '</div>';

    // Index labels
    h += '<div class="fifo-labels">';
    for (let i = 0; i < SIZE; i++) h += '<div class="fifo-label-cell">[' + i + ']</div>';
    h += '</div>';

    // Status
    h += '<div class="fifo-status">';
    h += 'Count: <strong>' + count + '/' + SIZE + '</strong>';
    if (count === SIZE) h += ' \u2014 <span class="fifo-status-full">FULL</span>';
    else if (count === 0) h += ' \u2014 <span class="fifo-status-empty">EMPTY</span>';
    h += ' | Head: ' + head + ' | Tail: ' + tail;
    h += '</div>';

    // Log (last 5 entries)
    if (log.length > 0) {
      h += '<div class="fifo-log">';
      const recent = log.slice(-5);
      for (let i = recent.length - 1; i >= 0; i--) h += recent[i] + '<br>';
      h += '</div>';
    }

    fifoOutput.innerHTML = h;

    // Update button states
    container.querySelector('#fifoEnq').disabled = count >= SIZE;
    container.querySelector('#fifoDeq').disabled = count <= 0;
  }

  container.querySelector('#fifoEnq').addEventListener('click', enqueue);
  container.querySelector('#fifoDeq').addEventListener('click', dequeue);
  container.querySelector('#fifoReset').addEventListener('click', reset);
  render();
}

/* ═══════════════════════ Rendering ═══════════════════════ */

const TYPE_LABELS = { tool: 'Tool Topic', concept: 'Concept', breakdown: 'Breakdown' };
const TYPE_CLASSES = { tool: 'tag-tool', concept: 'tag-concept', breakdown: 'tag-breakdown' };

function topicById(id) {
  return TOPICS.find(t => t.id === id);
}

function renderLanding(categoryFilter) {
  const content = document.getElementById('content');
  let html = '';

  // Filter bar
  const cats = Object.entries(CATEGORIES).sort((a, b) => a[1].order - b[1].order);
  html += '<div class="filter-bar">';
  html += `<button class="filter-btn ${!categoryFilter ? 'on' : ''}" data-filter="">All</button>`;
  for (const [key, cat] of cats) {
    html += `<button class="filter-btn ${categoryFilter === key ? 'on' : ''}" data-filter="${key}">${cat.name}</button>`;
  }
  html += '</div>';

  // Categories
  for (const [key, cat] of cats) {
    if (categoryFilter && categoryFilter !== key) continue;
    const catTopics = TOPICS.filter(t => t.category === key).sort((a, b) => a.order - b.order);
    if (catTopics.length === 0) continue;

    html += '<div class="section">';
    html += `<h2 class="cat-header">${cat.name}</h2>`;
    if (cat.intro) html += `<p class="cat-intro">${cat.intro}</p>`;

    html += '<div class="card-grid">';
    for (const topic of catTopics) {
      html += `<a class="topic-card" href="#${topic.id}">`;
      html += `<div class="card-title">${topic.title}</div>`;
      html += `<div class="card-desc">${topic.shortDescription}</div>`;
      html += '<div class="card-meta">';
      html += `<span class="tag ${TYPE_CLASSES[topic.type]}">${TYPE_LABELS[topic.type]}</span>`;
      if (topic.tool) {
        html += `<span class="tag tag-tool">${topic.tool}</span>`;
      }
      html += '</div>';
      html += '</a>';
    }
    html += '</div>';
    html += '</div>';
  }

  content.innerHTML = html;

  // Wire filter buttons
  content.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter || null;
      renderLanding(f);
    });
  });
}

function renderTopic(id) {
  const topic = topicById(id);
  if (!topic) {
    renderLanding();
    return;
  }

  const content = document.getElementById('content');
  const c = topic.content;
  let html = '';

  // Back link
  html += '<a href="#" class="back-btn">&larr; All topics</a>';

  html += '<div class="section">';

  // Title + meta
  html += `<h2 class="topic-title">${topic.title}</h2>`;
  html += '<div class="topic-meta">';
  html += `<span class="tag ${TYPE_CLASSES[topic.type]}">${TYPE_LABELS[topic.type]}</span>`;
  if (topic.tool) html += `<span class="tag tag-tool">${topic.tool}</span>`;
  const cat = CATEGORIES[topic.category];
  if (cat) html += `<span>${cat.name}</span>`;
  html += '</div>';

  // Problem
  if (c.problem) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Problem</div>';
    html += `<div class="topic-section-body">${c.problem}</div>`;
    html += '</div>';
  }

  // How It Works
  if (c.howItWorks) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">How It Works</div>';
    html += `<div class="topic-section-body">${c.howItWorks}</div>`;
    html += '</div>';
  }

  // Key Insight
  if (c.keyInsight) {
    html += `<div class="insight-box">\u{1F4A1} <strong>Key insight:</strong> ${c.keyInsight}</div>`;
  }

  // Interactive widget placeholder
  if (topic.interactive) {
    html += '<div class="widget-container" id="widgetMount"></div>';
  }

  // Context (concepts)
  if (c.context) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Context</div>';
    html += `<div class="topic-section-body">${c.context}</div>`;
    html += '</div>';
  }

  // Structure (breakdowns)
  if (c.structure) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Architecture</div>';
    html += `<div class="topic-section-body">${c.structure}</div>`;
    html += '</div>';
  }

  // Sections (breakdowns with multiple parts)
  if (c.sections) {
    for (const sec of c.sections) {
      html += '<div class="topic-section">';
      html += `<div class="topic-section-label">${sec.heading}</div>`;
      html += `<div class="topic-section-body">${sec.body}</div>`;
      html += '</div>';
    }
  }

  // Tradeoffs
  if (c.tradeoffs) {
    html += '<div class="topic-section">';
    html += '<div class="topic-section-label">Tradeoffs</div>';
    html += '<div class="tradeoffs-grid">';
    for (const [k, v] of Object.entries(c.tradeoffs)) {
      if (k === 'bestWhen') continue;
      html += `<div class="tradeoff-key">${k}</div>`;
      html += `<div class="tradeoff-val">${v}</div>`;
    }
    if (c.tradeoffs.bestWhen) {
      html += `<div class="tradeoff-best"><strong>Best when:</strong> ${c.tradeoffs.bestWhen}</div>`;
    }
    html += '</div>';
    html += '</div>';
  }

  // Action buttons
  const hasActions = topic.tryItLink || topic.sourceUrl;
  if (hasActions) {
    html += '<div class="action-row">';
    if (topic.tryItLink) {
      html += `<a class="action-btn" href="${topic.tryItLink}">Try it \u2192</a>`;
    }
    if (topic.sourceUrl) {
      html += `<a class="action-btn action-btn-secondary" href="${topic.sourceUrl}" target="_blank">View source \u2192</a>`;
    }
    html += '</div>';
  }

  // Related topics
  if (topic.relatedTopics && topic.relatedTopics.length > 0) {
    html += '<div class="related-section">';
    html += '<div class="related-label">Related</div>';
    html += '<div class="related-list">';
    for (const rid of topic.relatedTopics) {
      const rel = topicById(rid);
      if (rel) {
        html += `<a class="related-link" href="#${rel.id}">${rel.title}</a>`;
      }
    }
    html += '</div>';
    html += '</div>';
  }

  // Feedback
  html += '<div class="feedback-box" id="feedbackMount"></div>';

  html += '</div>'; // close .section

  content.innerHTML = html;

  // Mount interactive widget
  if (topic.interactive) {
    const mount = document.getElementById('widgetMount');
    if (mount) topic.interactive(mount);
  }

  // Mount feedback widget
  mountFeedback(topic.id);

  // Scroll to top
  window.scrollTo(0, 0);
}

/* ═══════════════════════ Router ═══════════════════════ */

function route() {
  const hash = location.hash.slice(1);
  if (!hash) {
    renderLanding();
  } else if (hash.startsWith('category/')) {
    renderLanding(hash.slice(9));
  } else {
    renderTopic(hash);
  }
}

window.addEventListener('hashchange', route);
document.addEventListener('DOMContentLoaded', route);
</script>
