<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn hardware architecture concepts — multiplier and adder architectures, digital logic, and computer engineering fundamentals.">
  <meta property="og:title" content="Learn | p14m.com">
  <meta property="og:description" content="Hardware architecture concepts — multiplier and adder design, area-speed tradeoffs, and interactive explanations.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://p14m.com/learn/">
  <title>Learn | p14m.com</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* ── Learn-specific styles ── */

    /* ── Filter Tabs ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #cccccc;
      color: #595959;
      border-radius: 16px;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: #999999; color: #333333; }
    .filter-btn.on { background: #0066cc; color: white; border-color: #0066cc; }
    body.dark .filter-btn { border-color: #444444; color: #9a9a9a; }
    body.dark .filter-btn:hover { border-color: #666666; color: #cccccc; }
    body.dark .filter-btn.on { background: #87ceeb; color: #1a1a1a; border-color: #87ceeb; }

    /* ── Category Header ── */
    .cat-header {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px 0;
      padding-bottom: 6px;
      border-bottom: 2px solid #0066cc;
    }
    body.dark .cat-header { border-bottom-color: grey; }

    .cat-intro {
      font-size: 13px;
      color: #595959;
      margin-bottom: 14px;
      line-height: 1.6;
    }
    body.dark .cat-intro { color: #9a9a9a; }

    /* ── Topic Cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .topic-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .topic-card:hover { border-color: #0066cc; box-shadow: 0 2px 8px rgba(0,102,204,0.08); }
    .topic-card:visited { color: inherit; }
    body.dark .topic-card { border-color: #333333; }
    body.dark .topic-card:hover { border-color: #87ceeb; box-shadow: 0 2px 8px rgba(135,206,235,0.08); }

    .card-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: #595959;
      line-height: 1.5;
    }
    body.dark .card-desc { color: #9a9a9a; }

    .card-meta {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* ── Tags / Badges ── */
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .tag-tool {
      background: rgba(0,102,204,0.08);
      color: #0066cc;
      border: 1px solid rgba(0,102,204,0.2);
    }
    body.dark .tag-tool {
      background: rgba(135,206,235,0.1);
      color: #87ceeb;
      border-color: rgba(135,206,235,0.2);
    }
    .tag-concept {
      background: rgba(30,126,52,0.08);
      color: #1e7e34;
      border: 1px solid rgba(30,126,52,0.2);
    }
    body.dark .tag-concept {
      background: rgba(76,175,80,0.1);
      color: #4caf50;
      border-color: rgba(76,175,80,0.2);
    }
    .tag-breakdown {
      background: rgba(255,193,7,0.1);
      color: #856404;
      border: 1px solid rgba(255,193,7,0.25);
    }
    body.dark .tag-breakdown {
      background: rgba(255,193,7,0.08);
      color: #ffc107;
      border-color: rgba(255,193,7,0.2);
    }

    /* ── Topic Detail View ── */
    .back-btn {
      font-size: 13px;
      margin-bottom: 16px;
      display: inline-block;
    }

    .topic-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .topic-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 12px;
      color: #595959;
    }
    body.dark .topic-meta { color: #9a9a9a; }

    .topic-section {
      margin-bottom: 18px;
    }
    .topic-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #0066cc;
      margin-bottom: 4px;
    }
    body.dark .topic-section-label { color: #87ceeb; }

    .topic-section-body {
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── Key Insight Box ── */
    .insight-box {
      border-left: 3px solid #0066cc;
      background: rgba(0,102,204,0.04);
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    body.dark .insight-box {
      border-left-color: #87ceeb;
      background: rgba(135,206,235,0.05);
    }

    /* ── Tradeoffs Table ── */
    .tradeoffs-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .tradeoff-key {
      font-weight: 600;
      color: #555555;
      white-space: nowrap;
    }
    body.dark .tradeoff-key { color: #aaaaaa; }
    .tradeoff-val {
      font-family: monospace;
      font-size: 12px;
    }
    .tradeoff-best {
      font-style: italic;
      color: #595959;
      grid-column: 1 / -1;
      margin-top: 4px;
      font-size: 12px;
    }
    body.dark .tradeoff-best { color: #9a9a9a; }

    /* ── Action Buttons ── */
    .action-row {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .action-btn:hover { background: #0052a3; text-decoration: none; }
    .action-btn:visited { color: white; }
    body.dark .action-btn { background: #87ceeb; color: #1a1a1a; }
    body.dark .action-btn:hover { background: #6bb8d9; }
    body.dark .action-btn:visited { color: #1a1a1a; }

    .action-btn-secondary {
      background: transparent;
      border: 1px solid #cccccc;
      color: #595959;
    }
    .action-btn-secondary:hover { border-color: #999999; color: #333333; background: transparent; }
    .action-btn-secondary:visited { color: #595959; }
    body.dark .action-btn-secondary { border-color: #444444; color: #9a9a9a; background: transparent; }
    body.dark .action-btn-secondary:hover { border-color: #666666; color: #cccccc; background: transparent; }
    body.dark .action-btn-secondary:visited { color: #9a9a9a; }

    /* ── Related Topics ── */
    .related-section {
      border-top: 1px solid #e0e0e0;
      padding-top: 16px;
      margin-top: 24px;
    }
    body.dark .related-section { border-top-color: #333333; }
    .related-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #595959;
      margin-bottom: 8px;
    }
    body.dark .related-label { color: #9a9a9a; }
    .related-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .related-link {
      font-size: 13px;
      padding: 4px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .related-link:hover { border-color: #0066cc; text-decoration: none; }
    body.dark .related-link { border-color: #333333; }
    body.dark .related-link:hover { border-color: #87ceeb; }

    /* ── Interactive Widget Container ── */
    .widget-container {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 18px;
    }
    body.dark .widget-container { border-color: #333333; }

    .widget-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #0066cc;
      margin-bottom: 10px;
    }
    body.dark .widget-label { color: #87ceeb; }

    /* Booth widget */
    .booth-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .booth-input {
      width: 100px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    .booth-input:focus { border-color: #0066cc; }
    body.dark .booth-input { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    body.dark .booth-input:focus { border-color: #87ceeb; }

    .booth-bits {
      font-family: monospace;
      font-size: 13px;
      display: flex;
      gap: 1px;
    }
    .booth-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
    }
    .booth-bit-label {
      font-size: 9px;
      color: #595959;
      text-align: center;
      width: 22px;
    }
    .booth-result-row {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.6;
    }
    .booth-pos { color: #28a745; }
    .booth-neg { color: #dc3545; }
    .booth-zero { color: #595959; }
    body.dark .booth-pos { color: #4caf50; }
    body.dark .booth-neg { color: #ff6b6b; }

    /* ── Overflow widget ── */
    .overflow-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .overflow-input {
      width: 80px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    .overflow-input:focus { border-color: #0066cc; }
    body.dark .overflow-input { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    body.dark .overflow-input:focus { border-color: #87ceeb; }
    .overflow-bits {
      font-family: monospace;
      font-size: 13px;
      display: flex;
      gap: 1px;
      margin: 4px 0;
    }
    .overflow-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(0,0,0,0.04);
      border: 1px solid #ddd;
    }
    body.dark .overflow-bit { background: rgba(255,255,255,0.04); border-color: #444; }
    .overflow-bit.sign { background: rgba(0,102,204,0.1); border-color: rgba(0,102,204,0.3); }
    body.dark .overflow-bit.sign { background: rgba(135,206,235,0.1); border-color: rgba(135,206,235,0.3); }
    .overflow-result { font-size: 13px; margin-top: 8px; line-height: 1.6; }
    .overflow-ok { color: #28a745; font-weight: 600; }
    .overflow-bad { color: #dc3545; font-weight: 600; }
    body.dark .overflow-ok { color: #4caf50; }
    body.dark .overflow-bad { color: #ff6b6b; }

    /* ── Fixed-point widget ── */
    .fp-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .fp-input {
      width: 120px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    .fp-input:focus { border-color: #0066cc; }
    body.dark .fp-input { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    body.dark .fp-input:focus { border-color: #87ceeb; }
    .fp-select {
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000000;
      outline: none;
    }
    body.dark .fp-select { background: #2a2a2a; border-color: #444444; color: #e0e0e0; }
    .fp-bits {
      font-family: monospace;
      font-size: 13px;
      display: flex;
      gap: 1px;
      align-items: center;
    }
    .fp-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(0,0,0,0.04);
      border: 1px solid #ddd;
    }
    body.dark .fp-bit { background: rgba(255,255,255,0.04); border-color: #444; }
    .fp-bit.int-part { background: rgba(0,102,204,0.08); border-color: rgba(0,102,204,0.2); }
    .fp-bit.frac-part { background: rgba(40,167,69,0.08); border-color: rgba(40,167,69,0.2); }
    body.dark .fp-bit.int-part { background: rgba(135,206,235,0.08); border-color: rgba(135,206,235,0.2); }
    body.dark .fp-bit.frac-part { background: rgba(76,175,80,0.08); border-color: rgba(76,175,80,0.2); }
    .fp-radix { font-size: 18px; font-weight: 700; margin: 0 2px; color: #dc3545; }
    .fp-info { font-size: 12px; margin-top: 6px; line-height: 1.6; color: #595959; }
    body.dark .fp-info { color: #9a9a9a; }

    /* ── Barrel shifter diagram ── */
    .barrel-diagram {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
    }
    .barrel-stage {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .barrel-label {
      width: 80px;
      font-weight: 600;
      font-size: 11px;
      color: #0066cc;
      text-align: right;
      flex-shrink: 0;
    }
    body.dark .barrel-label { color: #87ceeb; }
    .barrel-muxes {
      display: flex;
      gap: 2px;
    }
    .barrel-mux {
      width: 28px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(0,102,204,0.08);
      border: 1px solid rgba(0,102,204,0.2);
      color: #0066cc;
    }
    body.dark .barrel-mux { background: rgba(135,206,235,0.08); border-color: rgba(135,206,235,0.2); color: #87ceeb; }
    .barrel-mux.pass { background: rgba(0,0,0,0.03); border-color: #ddd; color: #595959; }
    body.dark .barrel-mux.pass { background: rgba(255,255,255,0.03); border-color: #444; color: #9a9a9a; }
    .barrel-note {
      font-size: 11px;
      color: #595959;
      margin-top: 4px;
      line-height: 1.5;
    }
    body.dark .barrel-note { color: #9a9a9a; }

    /* ── Comparator widget ── */
    .cmp-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .cmp-input {
      width: 80px;
      background: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000;
      outline: none;
    }
    .cmp-input:focus { border-color: #0066cc; }
    body.dark .cmp-input { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    body.dark .cmp-input:focus { border-color: #87ceeb; }
    .cmp-bits-row {
      display: flex;
      gap: 1px;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .cmp-bit {
      width: 22px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(0,0,0,0.04);
      border: 1px solid #ddd;
    }
    body.dark .cmp-bit { background: rgba(255,255,255,0.04); border-color: #444; }
    .cmp-bit.deciding { background: rgba(230,126,34,0.15); border-color: rgba(230,126,34,0.4); color: #e67e22; }
    body.dark .cmp-bit.deciding { background: rgba(243,156,18,0.15); border-color: rgba(243,156,18,0.4); color: #f39c12; }
    .cmp-bit.equal { background: rgba(40,167,69,0.08); border-color: rgba(40,167,69,0.2); }
    body.dark .cmp-bit.equal { background: rgba(76,175,80,0.08); border-color: rgba(76,175,80,0.2); }
    .cmp-bit.skipped { opacity: 0.35; }
    .cmp-result { font-size: 12px; margin-top: 8px; line-height: 1.6; }
    .cmp-gt { color: #0066cc; font-weight: 600; }
    .cmp-lt { color: #c0392b; font-weight: 600; }
    .cmp-eq { color: #28a745; font-weight: 600; }
    body.dark .cmp-gt { color: #87ceeb; }
    body.dark .cmp-lt { color: #e74c3c; }
    body.dark .cmp-eq { color: #4caf50; }
    .cmp-step { font-size: 11px; line-height: 1.5; color: #595959; margin-top: 6px; }
    body.dark .cmp-step { color: #9a9a9a; }

    /* ── FIFO widget ── */
    .fifo-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .fifo-input {
      width: 50px;
      background: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #000;
      outline: none;
    }
    .fifo-input:focus { border-color: #0066cc; }
    body.dark .fifo-input { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    .fifo-btn {
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: transparent;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      color: inherit;
      transition: border-color 0.15s;
    }
    .fifo-btn:hover { border-color: #0066cc; }
    body.dark .fifo-btn { border-color: #444; }
    body.dark .fifo-btn:hover { border-color: #87ceeb; }
    .fifo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .fifo-ring {
      display: flex;
      gap: 2px;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .fifo-slot {
      width: 36px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-weight: 600;
      background: rgba(0,0,0,0.03);
      border: 1px solid #ddd;
      position: relative;
      transition: all 0.2s;
    }
    body.dark .fifo-slot { background: rgba(255,255,255,0.03); border-color: #444; }
    .fifo-slot.occupied { background: rgba(0,102,204,0.08); border-color: rgba(0,102,204,0.25); }
    body.dark .fifo-slot.occupied { background: rgba(135,206,235,0.08); border-color: rgba(135,206,235,0.25); }
    .fifo-slot.head-slot { border-bottom: 3px solid #0a7c42; }
    body.dark .fifo-slot.head-slot { border-bottom-color: #2ecc71; }
    .fifo-slot.tail-slot { border-top: 3px solid #0066cc; }
    body.dark .fifo-slot.tail-slot { border-top-color: #87ceeb; }
    .fifo-labels {
      display: flex;
      gap: 2px;
      font-size: 9px;
      color: #595959;
      margin-bottom: 8px;
    }
    .fifo-label-cell { width: 36px; text-align: center; }
    .fifo-ptr-label { font-size: 10px; font-weight: 600; }
    .fifo-ptr-rd { color: #0a7c42; }
    .fifo-ptr-wr { color: #0066cc; }
    body.dark .fifo-ptr-rd { color: #2ecc71; }
    body.dark .fifo-ptr-wr { color: #87ceeb; }
    .fifo-status { font-size: 12px; margin-top: 6px; line-height: 1.6; }
    .fifo-status-full { color: #c0392b; font-weight: 600; }
    .fifo-status-empty { color: #e67e22; font-weight: 600; }
    body.dark .fifo-status-full { color: #e74c3c; }
    body.dark .fifo-status-empty { color: #f39c12; }

function getVote(topicId) {
  return localStorage.getItem('feedback_' + topicId);
}

function setVote(topicId, vote) {
  localStorage.setItem('feedback_' + topicId, vote);
}

function submitFeedback(topicId) {
  if (getVote(topicId)) return;
  setVote(topicId, 'yes');
  var ref = db.collection('feedback').doc(topicId);
  ref.set({ helpful: firebase.firestore.FieldValue.increment(1) }, { merge: true });
}

function mountFeedback(topicId) {
  var mount = document.getElementById('feedbackMount');
  if (!mount) return;

  var voted = getVote(topicId);

  function renderFeedback(count) {
    var html = '';
    if (voted) {
      html += '<div class="feedback-btns">';
      html += '<span class="feedback-btn voted">\uD83D\uDC4D Helpful <span class="feedback-count">' + count + '</span></span>';
      html += '</div>';
      html += '<div class="feedback-thanks">Thanks for your feedback!</div>';
    } else {
      html += '<div class="feedback-btns">';
      html += '<button class="feedback-btn" id="helpfulBtn">\uD83D\uDC4D Helpful? <span class="feedback-count">' + count + '</span></button>';
      html += '</div>';
    }
    mount.innerHTML = html;

    if (!voted) {
      document.getElementById('helpfulBtn').addEventListener('click', function() {
        submitFeedback(topicId);
        renderFeedback(count + 1);
      });
    }
  }

  loadFirebase().then(function() {
    if (db) {
      db.collection('feedback').doc(topicId).get().then(function(doc) {
        var data = doc.exists ? doc.data() : {};
        renderFeedback(data.helpful || 0);
      }).catch(function() {
        renderFeedback(0);
      });
    } else {
      renderFeedback(0);
    }
  });
}

      howItWorks: '<strong>The cache</strong> is a small, fast SRAM buffer between the CPU and main memory. When the processor reads address A, it checks the cache first. If the data is there (a <strong>hit</strong>), it returns in 1\u20134 cycles. If not (a <strong>miss</strong>), it fetches a whole <strong>block</strong> of data from memory and stores it in the cache for next time.<br><br>'
        + '<strong>Address breakdown:</strong> Every memory address is split into three fields: <strong style="color:#3498db">tag</strong> | <strong style="color:#27ae60">index</strong> | <strong style="color:#e67e22">offset</strong>. The <strong>index</strong> bits select which <strong>set</strong> (row) in the cache to check. The <strong>tag</strong> bits identify which memory block is stored there. The <strong>offset</strong> bits select the byte within the block. This is the core of cache lookup \u2014 it\'s just bit slicing.<br><br>'
        + '<strong>Direct-mapped:</strong> Each address maps to exactly one cache line (1 way per set). Simple and fast, but two addresses that map to the same set evict each other \u2014 this is a <strong>conflict miss</strong>.<br><br>'

      howItWorks: '<strong>Write-through:</strong> Every write updates both the cache <em>and</em> main memory at the same time. The cache and memory always agree. Simple, but every store instruction generates a memory bus transaction, even if the same address is written repeatedly. A <strong>write buffer</strong> (small FIFO queue) helps: writes are posted to the buffer and drained to memory in the background, so the CPU doesn\'t stall on every store. If the buffer fills, the CPU must wait.<br><br>'

        + '<strong>Write-allocate vs no-write-allocate:</strong> What happens on a <strong>write miss</strong> (the address isn\'t cached)? <strong>Write-allocate</strong> fetches the block into the cache first, then writes to it \u2014 betting on future accesses to the same block (spatial/temporal locality). <strong>No-write-allocate</strong> writes directly to memory without caching the block. Write-back caches almost always use write-allocate. Write-through caches can go either way.<br><br>'
        + '<strong>Common pairings:</strong><br>'
        + '\u2022 <strong>Write-back + write-allocate</strong> \u2014 most L1/L2 caches in modern CPUs. Minimizes memory traffic by absorbing repeated writes and caching on miss.<br>'
        + '\u2022 <strong>Write-through + no-write-allocate</strong> \u2014 simpler, used in some embedded or GPU caches. Every write goes to memory; write misses skip the cache entirely.',
      keyInsight: 'Write-back trades a 1-bit cost per cache line (the dirty bit) for a massive reduction in memory bus traffic. If a loop writes to the same array element 1000 times, write-through generates 1000 memory writes; write-back generates 1. This is why virtually every modern CPU cache uses write-back.',
    },
    interactive: writePolicyWidget,
    tryItLink: '/cache/',
    relatedTopics: ['cache-fundamentals', 'fifo-queue'],
    order: 2,
  },

    title: 'Cache Replacement Policies',
    shortDescription: 'LRU, FIFO, and Random \u2014 how caches decide which line to evict.',
    type: 'concept',
    tags: ['cache', 'memory', 'eviction', 'LRU', 'FIFO'],
    category: 'memory',
    content: {
      problem: 'When a cache set is full and a new block must be loaded, one existing line must be evicted. Which one? The choice directly affects hit rate, and the hardware cost varies dramatically between policies.',
      howItWorks: '<strong>LRU (Least Recently Used):</strong> evicts the line that hasn\'t been accessed the longest. Bets on temporal locality \u2014 recently used data is likely to be used again soon. For 2-way caches, LRU is trivial: a single bit per set tracks which way was accessed last. For 4-way, you need to track a full ordering of 4 items (4! = 24 states, 5 bits). For 8-way, exact LRU requires tracking 8! orderings \u2014 prohibitively expensive. Real 8+ way caches use <strong>pseudo-LRU</strong> (tree-based approximation with 7 bits for 8 ways).<br><br>'
        + '<strong>FIFO (First In, First Out):</strong> evicts the line that was <em>loaded</em> earliest, regardless of whether it was accessed recently. Simpler hardware: just a counter per set pointing to the next victim. Downside: FIFO can evict hot data that was loaded long ago but is still being used frequently. This causes <strong>Belady\'s anomaly</strong> \u2014 more cache ways can actually <em>increase</em> misses for some access patterns (unlike LRU, which is immune to this).<br><br>'
        + '<strong>Random:</strong> picks a victim at random. Essentially free hardware (just an LFSR or counter). No tracking state per set at all. Surprisingly competitive: for high-associativity caches (8+ ways), random is within 1\u20132% of LRU\'s hit rate on most workloads. This is why some real designs (ARM Cortex-A series L2) use random replacement.<br><br>'
        + '<strong>Practical considerations:</strong><br>'
